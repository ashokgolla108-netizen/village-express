<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Village Express - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto space-y-8">
        <h1 class="text-2xl font-black italic">ADMIN PANEL</h1>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <h2 class="font-black text-xs text-slate-400 uppercase mb-4">1. Add Category</h2>
            <input type="text" id="cat-name" placeholder="Category Name (e.g. Food)" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            <input type="text" id="cat-img" placeholder="Image URL" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none">
            <button onclick="addCat()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">Save Category</button>
        </div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <h2 class="font-black text-xs text-slate-400 uppercase mb-4">2. Add Sub-Category (Restaurant)</h2>
            <select id="sub-parent" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none"></select>
            <input type="text" id="sub-name" placeholder="Sub-Name (e.g. KFC)" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            <input type="text" id="sub-img" placeholder="Image URL" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none">
            <button onclick="addSub()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Save Sub-Category</button>
        </div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <h2 class="font-black text-xs text-slate-400 uppercase mb-4">3. Add Product</h2>
            <select id="prod-cat" onchange="loadSubs(this.value)" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none"></select>
            <select id="prod-sub" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none"><option value="">Select Sub (Optional)</option></select>
            <input type="text" id="prod-name" placeholder="Product Name" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            <input type="number" id="prod-price" placeholder="Price" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            <input type="text" id="prod-img" placeholder="Image URL" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none">
            <button onclick="addProd()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Save Product</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Populate Category Dropdowns
        db.collection("categories").onSnapshot(snap => {
            const selects = [document.getElementById('sub-parent'), document.getElementById('prod-cat')];
            selects.forEach(s => {
                s.innerHTML = `<option value="">Select Category</option>`;
                snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
            });
        });

        async function loadSubs(catId) {
            const select = document.getElementById('prod-sub');
            select.innerHTML = `<option value="">Select Sub (Optional)</option>`;
            const snap = await db.collection("subcategories").where("parentId", "==", catId).get();
            snap.forEach(doc => select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        }

        async function addCat() { await db.collection("categories").add({ name: document.getElementById('cat-name').value, image: document.getElementById('cat-img').value }); alert("Done"); }
        async function addSub() { await db.collection("subcategories").add({ parentId: document.getElementById('sub-parent').value, name: document.getElementById('sub-name').value, image: document.getElementById('sub-img').value }); alert("Done"); }
        async function addProd() {
            await db.collection("products").add({
                categoryId: document.getElementById('prod-cat').value,
                subId: document.getElementById('prod-sub').value,
                name: document.getElementById('prod-name').value,
                price: parseFloat(document.getElementById('prod-price').value),
                image: document.getElementById('prod-img').value,
                inStock: true
            });
            alert("Product Added");
        }
    </script>
</body>
</html>
