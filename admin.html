<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase">UPI Income</p>
            <h2 id="upi-rev" class="text-2xl font-black text-blue-600">₹0</h2>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase">Cash Income</p>
            <h2 id="cash-rev" class="text-2xl font-black text-orange-600">₹0</h2>
        </div>
    </div>

    <h3 class="font-black text-[10px] uppercase text-slate-400 mb-4">Payout Requests</h3>
    <div id="payout-list" class="space-y-3 mb-10"></div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", authDomain: "village-quick-commerce-e27f6.firebaseapp.com", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        db.collection("orders").where("status", "==", "Delivered").onSnapshot(snap => {
            let u = 0, c = 0;
            snap.forEach(doc => { const d = doc.data(); if(d.payment === "UPI") u += d.total; else c += d.total; });
            document.getElementById('upi-rev').innerText = `₹${u}`;
            document.getElementById('cash-rev').innerText = `₹${c}`;
        });

        db.collection("withdrawals").where("status", "==", "Pending").onSnapshot(snap => {
            const list = document.getElementById('payout-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <p class="font-black text-sm">₹${d.amount} (${d.riderPhone})</p>
                    <button onclick="db.collection('withdrawals').doc('${doc.id}').update({status:'Paid'})" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Paid</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
