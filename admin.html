<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">
    <header class="bg-white p-6 border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Village Express</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kalyandurg Operations</p>
        </div>
        <div class="flex gap-2">
            <button onclick="showSection('stats')" class="p-3 bg-slate-100 rounded-xl text-slate-600"><i class="fa-solid fa-chart-line"></i></button>
            <button onclick="showSection('inventory')" class="p-3 bg-slate-100 rounded-xl text-slate-600"><i class="fa-solid fa-boxes-stacked"></i></button>
            <button onclick="showSection('history')" class="p-3 bg-slate-100 rounded-xl text-slate-600"><i class="fa-solid fa-history"></i></button>
        </div>
    </header>

    <section id="sec-stats" class="p-4 space-y-4">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] font-black opacity-50 uppercase mb-1">Total Sales</p>
                <h2 id="total-revenue" class="text-4xl font-black italic mb-6">₹0</h2>
                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div><p class="text-[9px] font-bold opacity-50 uppercase">Profit (10%)</p><p id="total-profit" class="text-xl font-black text-green-400">₹0</p></div>
                    <div><p class="text-[9px] font-bold opacity-50 uppercase">Delivery Fees</p><p id="total-delivery-fees" class="text-xl font-black text-blue-400">₹0</p></div>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="font-black text-xs uppercase text-slate-400 mb-4 px-2">Rider Payout Requests</h3>
            <div id="payout-list" class="space-y-3"></div>
        </div>
    </section>

    <section id="sec-inventory" class="p-4 hidden">
        <div class="bg-white p-6 rounded-3xl border mb-6 shadow-sm">
            <h3 class="font-black text-sm uppercase mb-4">Add New Product</h3>
            <div class="space-y-3">
                <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="p-price" placeholder="Price" class="p-4 bg-slate-50 rounded-2xl text-sm outline-none border">
                    <select id="p-cat" class="p-4 bg-slate-50 rounded-2xl text-sm outline-none border font-bold">
                        <option value="Vegetables & Fruits">Vegetables & Fruits</option>
                        <option value="Chicken, Meat & Fish">Chicken, Meat & Fish</option>
                        <option value="Snacks & Drinks">Snacks & Drinks</option>
                        <option value="Rice & Groceries">Rice & Groceries</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                <input type="text" id="p-img" placeholder="Image URL (Direct link)" class="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border">
                <button onclick="addProduct()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs tracking-widest">SAVE PRODUCT</button>
            </div>
        </div>

        <h3 class="font-black text-xs uppercase text-slate-400 mb-4 px-2">Manage Store</h3>
        <div id="admin-product-list" class="space-y-3"></div>
    </section>

    <section id="sec-history" class="p-4 hidden">
        <div id="order-history-list" class="space-y-3"></div>
    </section>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        // 1. PRODUCT MANAGEMENT
        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = Number(document.getElementById('p-price').value);
            const cat = document.getElementById('p-cat').value;
            const img = document.getElementById('p-img').value;

            if(!name || !price) return alert("Fill Name and Price");

            await db.collection("products").add({
                name, price, category: cat, image: img, inStock: true, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Product Added!");
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
        }

        db.collection("products").onSnapshot(snap => {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover bg-slate-100">
                            <div>
                                <p class="text-xs font-black">${p.name}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase">${p.category} | ₹${p.price}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleStock('${doc.id}', ${p.inStock})" class="p-2 rounded-lg ${p.inStock ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} text-[10px] font-black uppercase">
                                ${p.inStock ? 'In Stock' : 'Out Stock'}
                            </button>
                            <button onclick="deleteProduct('${doc.id}')" class="p-2 bg-slate-100 text-slate-400 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });

        async function toggleStock(id, status) { await db.collection("products").doc(id).update({ inStock: !status }); }
        async function deleteProduct(id) { if(confirm("Delete item?")) await db.collection("products").doc(id).delete(); }

        // 2. STATS & HISTORY (Simplified & Fixed)
        db.collection("orders").onSnapshot(snap => {
            let totalRev = 0, deliveryFees = 0, netProfit = 0, upi = 0, cash = 0;
            const historyList = document.getElementById('order-history-list');
            historyList.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                if(d.status === "DELIVERED") {
                    const orderTotal = Number(d.total);
                    totalRev += orderTotal;
                    deliveryFees += 15;
                    netProfit += ((orderTotal - 15) * 0.10);
                    d.payment === "UPI" ? upi += orderTotal : cash += orderTotal;
                }
                historyList.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border mb-2">
                        <div class="flex justify-between font-black text-[10px]">
                            <span>#${d.orderId}</span>
                            <span class="${d.status === 'DELIVERED' ? 'text-green-600' : 'text-orange-500'} uppercase">${d.status}</span>
                        </div>
                        <p class="text-xs font-bold mt-1">₹${d.total} (${d.payment})</p>
                    </div>`;
            });
            document.getElementById('total-revenue').innerText = `₹${totalRev}`;
            document.getElementById('total-profit').innerText = `₹${netProfit.toFixed(0)}`;
            document.getElementById('total-delivery-fees').innerText = `₹${deliveryFees}`;
        });

        // 3. RIDERS PAYOUT (Unchanged)
        db.collection("withdrawals").where("status", "==", "Pending").onSnapshot(snap => {
            const list = document.getElementById('payout-list');
            list.innerHTML = snap.empty ? `<div class="text-center py-10 text-slate-400 font-bold text-xs italic">No pending requests</div>` : "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm">
                        <div><p class="text-xs font-black">₹${d.amount}</p><p class="text-[9px] font-bold text-blue-500">${d.riderPhone}</p></div>
                        <button onclick="approvePayout('${doc.id}')" class="bg-green-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Paid</button>
                    </div>`;
            });
        });

        function approvePayout(id) { if(confirm("Confirm payment?")) db.collection("withdrawals").doc(id).update({ status: "Paid" }); }
        
        function showSection(type) {
            document.getElementById('sec-stats').classList.toggle('hidden', type !== 'stats');
            document.getElementById('sec-inventory').classList.toggle('hidden', type !== 'inventory');
            document.getElementById('sec-history').classList.toggle('hidden', type !== 'history');
        }
    </script>
</body>
</html>
