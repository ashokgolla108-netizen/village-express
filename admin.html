<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Village Express - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-6 pb-20">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-2xl font-black">Store Control</h1>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <h2 class="font-black text-xs text-slate-400 uppercase mb-4">Add New Item</h2>
            <select id="prod-cat" onchange="loadSubs(this.value)" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none"></select>
            <select id="prod-sub" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none"><option value="">Sub-Category (Optional)</option></select>
            <input type="text" id="prod-name" placeholder="Item Name" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            <input type="number" id="prod-price" placeholder="Price (₹)" class="w-full p-4 bg-slate-100 rounded-xl mb-2 outline-none">
            
            <input type="file" id="prod-file" accept="image/*" class="hidden" onchange="document.getElementById('st').innerText='Photo Ready'">
            <button onclick="document.getElementById('prod-file').click()" class="w-full p-4 bg-blue-50 text-blue-600 font-bold rounded-xl mb-2 border border-blue-100"><i class="fa-solid fa-camera mr-2"></i> Select Product Photo</button>
            <p id="st" class="text-[10px] text-center mb-4 font-bold text-slate-400"></p>
            
            <button onclick="saveProd(this)" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Upload & Add Product</button>
        </div>

        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <h2 class="font-black text-xs text-slate-400 uppercase mb-4">Manage Inventory</h2>
            <div id="inventory-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        db.collection("categories").onSnapshot(snap => {
            const s = document.getElementById('prod-cat');
            s.innerHTML = `<option value="">Select Category</option>`;
            snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        });

        async function loadSubs(id) {
            const s = document.getElementById('prod-sub'); s.innerHTML = `<option value="">Sub (Optional)</option>`;
            const snap = await db.collection("subcategories").where("parentId", "==", id).get();
            snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        }

        async function saveProd(btn) {
            const file = document.getElementById('prod-file').files[0];
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const catId = document.getElementById('prod-cat').value;
            const subId = document.getElementById('prod-sub').value;
            
            if(!file || !name || !price || !catId) return alert("Fill all fields");
            
            btn.disabled = true; btn.innerText = "Uploading...";
            const ref = storage.ref(`products/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            
            await db.collection("products").add({ name, price: parseFloat(price), image: url, categoryId: catId, subId, inStock: true });
            alert("Added!"); location.reload();
        }

        db.collection("products").onSnapshot(snap => {
            const list = document.getElementById('inventory-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border">
                    <span class="text-xs font-bold truncate w-1/2">${p.name}</span>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleStock('${doc.id}', ${p.inStock})" class="px-3 py-1 rounded-full text-[9px] font-black ${p.inStock ? 'bg-green-100 text-green-700':'bg-red-100 text-red-700'} uppercase">
                            ${p.inStock ? 'In Stock':'Out'}
                        </button>
                        <button onclick="deleteDoc('products', '${doc.id}')" class="text-red-300 ml-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            });
        });

        async function toggleStock(id, s) { await db.collection("products").doc(id).update({ inStock: !s }); }
        async function deleteDoc(col, id) { if(confirm("Delete?")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
