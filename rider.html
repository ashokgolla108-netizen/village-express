<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express - Rider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-[#1a1f2c] p-6 text-white rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black italic tracking-tight">Rider Portal</h1>
            <button onclick="handleLogout()" class="bg-white/10 p-3 rounded-2xl"><i class="fa-solid fa-power-off text-red-400"></i></button>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <p id="rider-name" class="text-[10px] font-black uppercase tracking-widest text-gray-400">Golla Ashok</p>
        </div>
    </header>

    <div class="flex px-6 mt-6 border-b bg-white sticky top-0 z-10">
        <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-4 font-black text-[10px] uppercase border-b-2 border-green-500 text-green-500">Active Tasks</button>
        <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 font-black text-[10px] uppercase text-gray-400">Earnings History</button>
    </div>

    <main id="order-list" class="p-4 space-y-4"></main>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentRider = JSON.parse(localStorage.getItem('rider_session'));
        let currentTab = 'active';

        window.onload = () => { 
            if(!currentRider) location.href = "login.html"; // Ensure rider is logged in
            else { 
                document.getElementById('rider-name').innerText = currentRider.name; 
                startLiveTracking(); 
                loadOrders(); 
            }
        };

        // TRACKS RIDER & UPDATES ACTIVE ORDER DOCUMENT
        function startLiveTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                // Update Rider's personal position
                db.collection("riders").doc(currentRider.id).update({ lat, lng });
                
                // If I have an accepted job, update that order too so the user sees me moving
                db.collection("orders").where("riderId", "==", currentRider.id).where("status", "==", "ACCEPTED").get().then(s => {
                    s.forEach(doc => doc.ref.update({ riderLat: lat, riderLng: lng }));
                });
            }, null, {enableHighAccuracy: true});
        }

        function loadOrders() {
            db.collection("orders").onSnapshot(snap => {
                const list = document.getElementById('order-list'); list.innerHTML = "";
                const hasMyActive = snap.docs.find(doc => doc.data().riderId === currentRider.id && doc.data().status === "ACCEPTED");

                snap.docs.forEach(doc => {
                    const d = doc.data();
                    // FILTERING LOGIC
                    if(hasMyActive && d.status === "PENDING") return; // Don't show new jobs if I'm busy
                    if(d.status === "ACCEPTED" && d.riderId !== currentRider.id) return; // Hide jobs of other riders
                    
                    const isHistory = (d.status === "DELIVERED" || d.status === "CANCELLED");
                    if(currentTab === 'active' && isHistory) return;
                    if(currentTab === 'history' && !isHistory) return;

                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-[40px] border shadow-sm">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black text-gray-300">#${d.orderId}</span>
                                <span class="bg-slate-100 px-3 py-1 rounded-full text-[9px] font-black uppercase text-slate-500">${d.status}</span>
                            </div>
                            <h3 class="font-black text-xl mb-4 italic text-slate-800">${Object.values(d.items).map(i => i.name).join(', ')}</h3>
                            
                            <div class="bg-slate-50 p-5 rounded-3xl border border-gray-100 mb-6">
                                <div class="flex justify-between items-center mb-2">
                                    <p class="font-black text-sm text-slate-800">${d.customer.name}</p>
                                    <a href="tel:${d.customer.phone}" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-phone-alt"></i></a>
                                </div>
                                <p class="text-[11px] font-bold text-gray-500 leading-relaxed">${d.address}</p>
                            </div>

                            <div class="flex gap-2">
                                <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address)}', '_blank')" class="flex-1 bg-slate-800 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest">Open Maps</button>
                                ${d.status === 'PENDING' ? `<button onclick="acceptOrder('${doc.id}')" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-black text-xs uppercase">Accept Job</button>` : ''}
                                ${d.status === 'ACCEPTED' ? `<button onclick="updateStatus('${doc.id}', 'DELIVERED')" class="flex-1 bg-green-600 text-white p-4 rounded-2xl font-black text-xs uppercase">Mark Delivered</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        async function acceptOrder(id) {
            await db.collection("orders").doc(id).update({
                status: "ACCEPTED",
                riderId: currentRider.id,
                riderName: currentRider.name,
                riderPhone: currentRider.phone
            });
        }

        async function updateStatus(id, s) { await db.collection("orders").doc(id).update({ status: s }); }
        function switchTab(t) { 
            currentTab = t; 
            document.getElementById('tab-active').className = t === 'active' ? 'flex-1 py-4 font-black text-[10px] uppercase border-b-2 border-green-500 text-green-500' : 'flex-1 py-4 font-black text-[10px] uppercase text-gray-400';
            document.getElementById('tab-history').className = t === 'history' ? 'flex-1 py-4 font-black text-[10px] uppercase border-b-2 border-green-500 text-green-500' : 'flex-1 py-4 font-black text-[10px] uppercase text-gray-400';
            loadOrders(); 
        }
        function handleLogout() { localStorage.removeItem('rider_session'); location.reload(); }
    </script>
</body>
</html>
