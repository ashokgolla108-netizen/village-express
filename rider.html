<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VE Rider - Delivery Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen pb-10">
    <header class="p-6 text-white">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">Rider Portal</h1>
                <p class="text-green-400 text-[10px] font-bold uppercase tracking-widest">Live Delivery Feed</p>
            </div>
            <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700">
                <i class="fa-solid fa-motorcycle text-slate-400"></i>
            </div>
        </div>
    </header>

    <main class="px-4">
        <div id="order-list" class="space-y-4">
            <div class="text-center py-20 text-slate-500 font-bold">Waiting for new orders...</div>
        </div>
    </main>

    <script>
        const config = { 
            apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", 
            authDomain: "village-quick-commerce-e27f6.firebaseapp.com", 
            projectId: "village-quick-commerce-e27f6" 
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        // Listen for new "Pending" orders
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            
            if(snap.empty) {
                list.innerHTML = `<div class="text-center py-20 text-slate-500 font-bold uppercase text-xs">No active deliveries</div>`;
                return;
            }

            snap.forEach(doc => {
                const order = doc.data();
                const id = doc.id;
                const items = Object.values(order.items).map(i => `${i.name} (x${i.qty})`).join(", ");
                
                // Color coding based on status
                const isDone = order.status === "Delivered";
                
                list.innerHTML += `
                    <div class="bg-slate-800 rounded-[2rem] p-6 border border-slate-700 shadow-2xl transition-all ${isDone ? 'opacity-50 grayscale' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-slate-700 text-slate-300 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">#${order.orderId || 'NEW'}</span>
                            <span class="text-green-400 font-black text-lg">₹${order.total}</span>
                        </div>
                        
                        <div class="mb-6">
                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Items to Pack</p>
                            <p class="text-white font-bold text-sm leading-relaxed">${items}</p>
                        </div>

                        <div class="mb-6 bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50">
                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Customer Address</p>
                            <p class="text-white font-medium text-xs italic">"${order.address}"</p>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="openMap(${order.location.lat}, ${order.location.lng})" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase flex items-center justify-center active:scale-95 transition-all">
                                <i class="fa-solid fa-location-arrow mr-2"></i> Navigate
                            </button>
                            
                            <button onclick="markDelivered('${id}')" class="flex-1 ${isDone ? 'bg-slate-700' : 'bg-green-600'} text-white font-black py-4 rounded-2xl text-[10px] uppercase active:scale-95 transition-all">
                                <i class="fa-solid fa-check-double mr-2"></i> ${isDone ? 'Finished' : 'Mark Delivered'}
                            </button>
                        </div>
                        
                        <div class="mt-4 flex items-center justify-center text-[9px] font-black uppercase tracking-tighter ${order.payment === 'CASH' ? 'text-orange-400' : 'text-blue-400'}">
                            <i class="fa-solid fa-credit-card mr-2"></i> Mode: ${order.payment}
                        </div>
                    </div>`;
            });
        });

        function openMap(lat, lng) {
            // This opens the coordinates directly in Google Maps
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        }

        function markDelivered(id) {
            if(confirm("Complete this delivery?")) {
                db.collection("orders").doc(id).update({ status: "Delivered" });
            }
        }
    </script>
</body>
</html>
