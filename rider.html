<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VE Rider Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen pb-10">
    <header class="p-6 text-white text-center">
        <h1 class="text-2xl font-black italic uppercase italic">Rider Dashboard</h1>
    </header>

    <main class="px-4 space-y-4" id="rider-feed"></main>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", authDomain: "village-quick-commerce-e27f6.firebaseapp.com", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let watchId = null;

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const feed = document.getElementById('rider-feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                const items = Object.values(data.items).map(i => `${i.name} (x${i.qty})`).join(", ");
                const isAccepted = data.status === "Accepted";
                
                feed.innerHTML += `
                    <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl ${data.status === 'Delivered' ? 'hidden' : ''}">
                        <div class="flex justify-between mb-4"><span class="text-slate-500 font-bold text-[10px]">#${data.orderId}</span><span class="text-green-400 font-black">₹${data.total}</span></div>
                        <p class="text-white font-bold text-sm mb-4">${items}</p>
                        <div class="bg-slate-900 p-4 rounded-xl mb-6"><p class="text-[10px] text-slate-500 font-bold mb-1">DESTINATION</p><p class="text-white text-xs italic">"${data.address}"</p></div>
                        <div class="flex gap-2">
                            <button onclick="window.open('https://www.google.com/maps?q=${data.location.lat},${data.location.lng}')" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl text-[10px] uppercase"><i class="fa-solid fa-map mr-1"></i> Map</button>
                            ${!isAccepted ? `<button onclick="acceptOrder('${id}')" class="flex-1 bg-orange-500 text-white font-black py-4 rounded-xl text-[10px] uppercase">Accept</button>` : 
                            `<button onclick="markDelivered('${id}')" class="flex-1 bg-green-600 text-white font-black py-4 rounded-xl text-[10px] uppercase">Delivered</button>`}
                        </div>
                    </div>`;
            });
        });

        function acceptOrder(id) {
            db.collection("orders").doc(id).update({ status: "Accepted", riderName: "Golla Ashok", riderPhone: "7075226826" });
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    db.collection("orders").doc(id).update({ riderLocation: { lat: pos.coords.latitude, lng: pos.coords.longitude } });
                }, null, {enableHighAccuracy: true});
            }
        }

        function markDelivered(id) {
            if(confirm("Delivered?")) {
                db.collection("orders").doc(id).update({ status: "Delivered" });
                if(watchId) navigator.geolocation.clearWatch(watchId);
            }
        }
    </script>
</body>
</html>
