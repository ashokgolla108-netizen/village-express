<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Rider Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pending-bg { background-color: #FEF3C7; color: #92400E; }
        .accepted-bg { background-color: #DBEAFE; color: #1E40AF; }
        .delivered-bg { background-color: #D1FAE5; color: #065F46; }
        .cancelled-bg { background-color: #FEE2E2; color: #991B1B; }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl rounded-b-[30px]">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black italic">Rider Portal</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Golla Ashok</p>
            </div>
            <button onclick="toggleAlerts()" id="alert-toggle" class="bg-white/10 p-3 rounded-full border border-white/20 active:scale-90 transition-all">
                <i id="bell-icon" class="fa-solid fa-bell-slash text-red-400"></i>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                <p class="text-[9px] font-black text-slate-400 uppercase">Today's Earnings</p>
                <p id="today-revenue" class="text-xl font-black text-green-400">₹0</p>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                <p class="text-[9px] font-black text-slate-400 uppercase">Completed</p>
                <p id="today-count" class="text-xl font-black text-white">0 Orders</p>
            </div>
        </div>

        <div class="flex border-t border-white/10 mt-2">
            <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-3 text-[11px] font-black uppercase tab-active transition-all">Active</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 text-[11px] font-black uppercase text-slate-500 transition-all">History</button>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <div id="rider-order-list" class="space-y-4">
            </div>
    </main>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentTab = 'active';
        let alertsEnabled = false;
        let lastPendingCount = 0;
        let allOrders = [];

        function toggleAlerts() {
            alertsEnabled = !alertsEnabled;
            const icon = document.getElementById('bell-icon');
            icon.className = alertsEnabled ? "fa-solid fa-bell text-green-400" : "fa-solid fa-bell-slash text-red-400";
            if(alertsEnabled) {
                document.getElementById('notif-sound').play().catch(() => {});
                alert("Alerts Enabled! Sound will play for new orders.");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-active').classList.toggle('tab-active', tab === 'active');
            document.getElementById('tab-history').classList.toggle('tab-active', tab === 'history');
            document.getElementById('tab-active').classList.toggle('text-slate-500', tab !== 'active');
            document.getElementById('tab-history').classList.toggle('text-slate-500', tab !== 'history');
            renderOrders();
        }

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Calculate Stats
            let revenue = 0;
            let completed = 0;
            let pendingNow = 0;

            allOrders.forEach(o => {
                const status = o.status.toUpperCase();
                if (status === 'PENDING') pendingNow++;
                if (status === 'DELIVERED') { revenue += o.total; completed++; }
            });

            // Notification Logic
            if (alertsEnabled && pendingNow > lastPendingCount) {
                document.getElementById('notif-sound').play();
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
            lastPendingCount = pendingNow;

            document.getElementById('today-revenue').innerText = `₹${revenue}`;
            document.getElementById('today-count').innerText = `${completed} Order${completed !== 1 ? 's' : ''}`;
            
            renderOrders();
        });

        function renderOrders() {
            const list = document.getElementById('rider-order-list');
            list.innerHTML = "";

            const filtered = allOrders.filter(o => {
                const s = o.status.toUpperCase();
                if (currentTab === 'active') return s === 'PENDING' || s === 'ACCEPTED';
                return s === 'DELIVERED' || s === 'CANCELLED';
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold text-sm">No ${currentTab} orders</div>`;
                return;
            }

            filtered.forEach(d => {
                const status = d.status.toUpperCase();
                const itemNames = Object.values(d.items).map(i => `${i.name} (x${i.qty})`).join(", ");

                list.innerHTML += `
                    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                        <div class="flex justify-between items-start">
                            <p class="text-[10px] font-black text-slate-400 uppercase">#${d.orderId}</p>
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${status === 'PENDING' ? 'pending-bg' : status === 'ACCEPTED' ? 'accepted-bg' : status === 'DELIVERED' ? 'delivered-bg' : 'cancelled-bg'}">
                                ${status}
                            </span>
                        </div>
                        
                        <p class="text-xs font-black text-slate-800 leading-tight">${itemNames}</p>

                        <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
                            <div class="flex items-center justify-between">
                                <p class="text-xs font-black"><i class="fa-solid fa-user mr-2 text-slate-400"></i>${d.customer?.name}</p>
                                <a href="tel:${d.customer?.phone}" class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-phone text-xs"></i></a>
                            </div>
                            <p class="text-[11px] font-bold text-slate-600 leading-snug"><i class="fa-solid fa-location-dot mr-2 text-red-500"></i>${d.address}</p>
                            ${status !== 'DELIVERED' ? `
                                <button onclick="openMaps('${d.address}')" class="w-full text-[10px] font-black text-white uppercase py-3 rounded-xl bg-slate-800 flex justify-center gap-2">
                                    <i class="fa-solid fa-diamond-turn-right"></i> Navigate
                                </button>
                            ` : ''}
                        </div>

                        <div class="flex justify-between items-center text-xs font-black px-2">
                            <span class="text-slate-400 uppercase text-[9px]">Total: ₹${d.total} (${d.paymentMethod})</span>
                            ${status === 'PENDING' ? `<button onclick="updateStatus('${d.id}', 'ACCEPTED')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px]">Accept</button>` : ''}
                            ${status === 'ACCEPTED' ? `<button onclick="updateStatus('${d.id}', 'DELIVERED')" class="bg-green-600 text-white px-5 py-2 rounded-xl text-[10px]">Deliver</button>` : ''}
                        </div>
                    </div>`;
            });
        }

        function openMaps(address) { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`, '_blank'); }
        async function updateStatus(docId, newStatus) { await db.collection("orders").doc(docId).update({ status: newStatus }); }
    </script>
</body>
</html>
