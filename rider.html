<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rider</title>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

</head>

<body>

<input id="phone" placeholder="phone">
<input id="pass" placeholder="pass">
<button onclick="login()">Login</button>

<div id="orders"></div>

<script>

firebase.initializeApp({
apiKey:"YOUR_KEY",
projectId:"village-quick-commerce-e27f6"
});

const db = firebase.firestore();
let rider = JSON.parse(localStorage.getItem("rider"));

if(rider) load();

async function login(){
    const p = phone.value;
    const pw = btoa(pass.value);

    const s = await db.collection("riders")
    .where("phone","==",p)
    .where("pass","==",pw)
    .get();

    if(s.empty) return alert("Wrong");

    rider = {id:s.docs[0].id,...s.docs[0].data()};
    localStorage.setItem("rider",JSON.stringify(rider));
    location.reload();
}

function load(){

db.collection("orders").onSnapshot(snap=>{
    let html="";

    snap.forEach(doc=>{
        const d = doc.data();

        if(d.status==="PENDING"){
            html+=`
            <div>
                ${d.customer.name} ₹${d.total}
                <button onclick="accept('${doc.id}')">Accept</button>
            </div>`;
        }

        if(d.status==="ACCEPTED" && d.riderId===rider.id){
            html+=`
            <div>
                Active Order ₹${d.total}
                <button onclick="done('${doc.id}')">Done</button>
            </div>`;
        }
    });

    orders.innerHTML=html;
});
}

async function accept(id){
    const ref = db.collection("orders").doc(id);

    await db.runTransaction(async t=>{
        const doc = await t.get(ref);

        if(doc.data().status!=="PENDING") throw "taken";

        t.update(ref,{
            status:"ACCEPTED",
            riderId:rider.id
        });
    });
}

function done(id){
    db.collection("orders").doc(id).update({
        status:"DELIVERED"
    });
}

</script>
</body>
</html>
