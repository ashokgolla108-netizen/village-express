<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Village Express - Rider</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');  
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0F172A; color: white; -webkit-tap-highlight-color: transparent; }  
        .order-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2.5rem; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin-bottom: 1.5rem; }  
        .hidden { display: none !important; }  
    </style>  
</head>  

<body class="min-h-screen pb-24">  

<div id="auth-overlay" class="fixed inset-0 bg-white z-[2000] p-8 flex flex-col justify-center items-center text-slate-900">  
    <div class="w-full max-w-sm space-y-6 text-center">  
        <h1 class="text-4xl font-black italic tracking-tighter">RIDER<span class="text-orange-500">PORTAL</span></h1>  
        <input type="tel" id="login-phone" placeholder="Mobile" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">  
        <input type="password" id="login-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">  
        <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-2xl">START SHIFT</button>  
    </div>  
</div>  

<div id="main-app" class="hidden">  
    <header class="p-6 bg-slate-800/40 border-b border-white/5 sticky top-0 z-50 flex justify-between items-center backdrop-blur-md">  
        <div><h2 id="rider-name" class="text-xl font-black italic text-white">---</h2><p class="text-[10px] font-bold text-green-400 uppercase mt-1">● Online</p></div>  
        <button onclick="handleLogout()" class="w-12 h-12 rounded-2xl bg-red-500/10 text-red-500 flex items-center justify-center border border-red-500/20"><i class="fa-solid fa-power-off"></i></button>  
    </header>  

    <div class="flex p-4 gap-3">  
        <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-orange-500 text-white shadow-lg">Active Jobs</button>  
        <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-slate-800 text-slate-400">History</button>  
    </div>  

    <main id="order-list" class="p-4 space-y-6"></main>  
</div>  

<script>  
const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };  
firebase.initializeApp(config);  
const db = firebase.firestore();  

let currentRider = JSON.parse(localStorage.getItem('rider_session')) || null;  
let currentTab = 'active', locationWatcher = null;  

window.onload = () => {  
    if(currentRider) initRider();  
};  

async function handleLogin() {  
    const p = document.getElementById('login-phone').value;  
    const pw = document.getElementById('login-pass').value;  
    const s = await db.collection("riders").where("phone","==",p).where("pass","==",pw).get();  

    if(s.empty) return alert("Incorrect login credentials.");  

    currentRider = { id: s.docs[0].id, ...s.docs[0].data() };  
    localStorage.setItem('rider_session', JSON.stringify(currentRider));  
    initRider();  
}  

function initRider() {  
    document.getElementById('auth-overlay').style.display = 'none';  
    document.getElementById('main-app').classList.remove('hidden');  
    document.getElementById('rider-name').innerText = currentRider.name;  
    loadOrders();  
}  

function loadOrders() {  
    db.collection("orders").onSnapshot(snap => {  
        const list = document.getElementById('order-list');  
        list.innerHTML = "";  
        const allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));  

        if (currentTab === 'active') {  
            // Check if THIS rider already has a job in progress
            const myJob = allOrders.find(o => o.status === 'OUT FOR DELIVERY' && o.riderId === currentRider.id);  

            if (myJob) {  
                renderOrderCard(myJob, list);  
                startSharingLocation(myJob.id); // Resume sharing if page reloads
            } else {  
                // Show available PENDING orders to pick up
                const pending = allOrders.filter(o => o.status === 'PENDING');  
                if(pending.length === 0) {  
                    list.innerHTML = `<div class="p-20 text-center opacity-20 font-black italic">SEARCHING FOR NEW JOBS...</div>`;  
                } else {  
                    pending.forEach(o => renderOrderCard(o, list));  
                }  
            }  
        } else {  
            // HISTORY TAB: Show only DELIVERED orders for this rider
            allOrders  
                .filter(o => o.status === 'DELIVERED' && o.riderId === currentRider.id)  
                .forEach(o => renderOrderCard(o, list));  
        }  
    });  
}  

function renderOrderCard(d, container) {  
    let itemsHtml = "";  
    Object.values(d.items || {}).forEach(item => {  
        itemsHtml += `  
        <div class="flex justify-between items-center py-2 border-b border-white/5 last:border-0">  
            <div class="flex items-center gap-3">  
                <span class="w-6 h-6 rounded-lg bg-orange-500/20 flex items-center justify-center text-[10px] font-black text-orange-400">${item.qty}x</span>  
                <p class="text-[11px] font-bold text-slate-200">${item.name}</p>  
            </div>  
        </div>`;  
    });  

    // Google Maps Navigation Link
    let gpsLink = "#";  
    if(d.address.includes("GPS: ")) {  
        const coords = d.address.split("GPS: ")[1];  
        gpsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(coords)}`;  
    }  

    container.innerHTML += `  
    <div class="order-card">  
        <div class="flex justify-between items-center mb-4">  
            <span class="text-[9px] font-black text-slate-500 uppercase">Order #${d.orderId}</span>  
            <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${d.status === 'DELIVERED' ? 'bg-slate-700' : 'bg-blue-500'} text-white">  
                ${d.status}  
            </span>  
        </div>  
          
        <h4 class="text-lg font-black italic text-white">${d.customer.name}</h4>  
        <p class="text-[11px] text-slate-400 mb-4"><i class="fa-solid fa-location-dot text-orange-500"></i> ${d.address.split('|')[0]}</p>  

        <div class="bg-slate-900/40 rounded-2xl p-4 mb-4 border border-white/5">  
            ${itemsHtml}  
        </div>  

        <div class="flex justify-between items-end mb-6">  
            <div>  
                <p class="text-[8px] font-black text-slate-500 uppercase">Total Bill</p>  
                <p class="text-2xl font-black text-green-400">₹${d.total}</p>  
            </div>  
            <div class="flex gap-2">  
                <a href="tel:${d.customer.phone}" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-blue-400 border border-white/5"><i class="fa-solid fa-phone"></i></a>  
                <a href="${gpsLink}" target="_blank" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-orange-400 border border-white/5"><i class="fa-solid fa-map-location-dot"></i></a>  
            </div>  
        </div>  

        ${d.status === 'PENDING' ? `<button onclick="acceptJob('${d.id}')" class="w-full bg-orange-500 py-5 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">Accept Job</button>` : ''}  
        ${d.status === 'OUT FOR DELIVERY' ? `<button onclick="markDelivered('${d.id}')" class="w-full bg-green-600 py-5 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all">Mark as Delivered</button>` : ''}  
    </div>`;  
}  

async function acceptJob(id) {  
    try {  
        await db.collection("orders").doc(id).update({  
            riderId: currentRider.id,  
            riderPhone: currentRider.phone,  
            status: "OUT FOR DELIVERY"  
        });  
        startSharingLocation(id);  
    } catch(e) { alert("Error accepting job"); }  
}  

async function markDelivered(id) {  
    if(locationWatcher) navigator.geolocation.clearWatch(locationWatcher);  
    await db.collection("orders").doc(id).update({ status: "DELIVERED" });  
}  

function startSharingLocation(orderDocId) {  
    if (navigator.geolocation) {  
        if(locationWatcher) navigator.geolocation.clearWatch(locationWatcher);  

        locationWatcher = navigator.geolocation.watchPosition(pos => {  
            db.collection("orders").doc(orderDocId).update({  
                riderLocation: {  
                    lat: pos.coords.latitude,  
                    lng: pos.coords.longitude  
                }  
            }).catch(e => console.error("Location update failed", e));  
        }, (err) => console.error("GPS Error", err), { enableHighAccuracy: true });  
    } else {  
        alert("GPS is not supported on this device.");  
    }  
}  

function switchTab(t) {  
    currentTab = t;  
    const actBtn = document.getElementById('tab-active');  
    const histBtn = document.getElementById('tab-history');  
    
    if(t === 'active') {  
        actBtn.className = "flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-orange-500 text-white shadow-lg";  
        histBtn.className = "flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-slate-800 text-slate-400";  
    } else {  
        histBtn.className = "flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-orange-500 text-white shadow-lg";  
        actBtn.className = "flex-1 py-4 rounded-2xl font-black text-[10px] uppercase bg-slate-800 text-slate-400";  
    }  
    loadOrders();  
}  

function handleLogout() {  
    localStorage.removeItem('rider_session');  
    location.reload();  
}  
</script>  

</body>  
</html>
