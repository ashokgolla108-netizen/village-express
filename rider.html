<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express - Rider Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dark-navy { background-color: #1a1f2c; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="dark-navy p-6 text-white rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic">Rider Portal</h1>
                <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">Golla Ashok</p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl">
                <i class="fa-solid fa-bell-slash text-gray-400"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Today's Earnings</p>
                <p id="total-earnings" class="text-2xl font-black text-green-400">₹0</p>
            </div>
            <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Completed</p>
                <p id="total-orders" class="text-2xl font-black">0 Orders</p>
            </div>
        </div>
    </header>

    <div class="flex px-6 mt-6 border-b bg-white sticky top-0 z-10">
        <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-4 font-black text-xs uppercase tab-active">Active</button>
        <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 font-black text-xs uppercase text-gray-400">History</button>
    </div>

    <main id="rider-list" class="p-4 space-y-4"></main>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentTab = 'active';

        // FIXED NAVIGATION: Uses standard Google Maps URL scheme
        function openNavigation(addressString) {
            // Extracts coordinates from your address string "GPS: 14.550403, 77.017540"
            const coordsMatch = addressString.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
            
            if (coordsMatch) {
                const lat = coordsMatch[1];
                const lon = coordsMatch[2];
                // Using standard Google Maps Search API URL
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                window.open(mapUrl, '_blank');
            } else {
                // Fallback to text search
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addressString)}`;
                window.open(mapUrl, '_blank');
            }
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-active').className = t === 'active' ? 'flex-1 py-4 font-black text-xs uppercase tab-active' : 'flex-1 py-4 font-black text-xs uppercase text-gray-400';
            document.getElementById('tab-history').className = t === 'history' ? 'flex-1 py-4 font-black text-xs uppercase tab-active' : 'flex-1 py-4 font-black text-xs uppercase text-gray-400';
            loadOrders();
        }

        function loadOrders() {
            db.collection("orders").onSnapshot(snap => {
                const list = document.getElementById('rider-list');
                list.innerHTML = "";
                let earnings = 0, count = 0;

                const sortedDocs = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp);

                sortedDocs.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "DELIVERED") { earnings += (d.total - 5); count++; }

                    const isHistory = (d.status === "DELIVERED" || d.status === "CANCELLED");
                    if(currentTab === 'active' && isHistory) return;
                    if(currentTab === 'history' && !isHistory) return;

                    const itemsText = Object.values(d.items).map(i => `${i.name} (x${i.qty})`).join(', ');

                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-[32px] card-shadow border border-gray-100">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[9px] font-bold text-gray-300 uppercase">#${d.orderId}</p>
                                    <h3 class="font-black text-lg text-slate-800">${itemsText}</h3>
                                </div>
                                <span class="bg-orange-50 text-orange-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">${d.status}</span>
                            </div>

                            <div class="bg-slate-50 p-4 rounded-2xl space-y-3 mb-6">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                                            <i class="fa-solid fa-user text-xs"></i>
                                        </div>
                                        <p class="font-black text-sm">${d.customer.name}</p>
                                    </div>
                                    <a href="tel:${d.customer.phone}" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg">
                                        <i class="fa-solid fa-phone-alt text-xs"></i>
                                    </a>
                                </div>
                                <div class="flex items-start gap-3 pt-2 border-t border-gray-200/50">
                                    <i class="fa-solid fa-location-dot text-red-500 mt-1"></i>
                                    <p class="text-[11px] font-bold text-gray-500">${d.address}</p>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button onclick="openNavigation('${d.address}')" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-location-arrow"></i> Navigate
                                </button>
                                ${d.status === 'PENDING' ? `
                                    <button onclick="updateStatus('${doc.id}', 'ACCEPTED')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase">Accept</button>
                                ` : d.status === 'ACCEPTED' ? `
                                    <button onclick="updateStatus('${doc.id}', 'DELIVERED')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-xs uppercase">Mark Delivered</button>
                                ` : ''}
                            </div>
                        </div>`;
                });

                document.getElementById('total-earnings').innerText = `₹${earnings}`;
                document.getElementById('total-orders').innerText = `${count} Orders`;
            });
        }

        async function updateStatus(id, s) { await db.collection("orders").doc(id).update({ status: s }); }
        window.onload = loadOrders;
    </script>
</body>
</html>
