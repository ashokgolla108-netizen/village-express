<!-- USER APP -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

</head>
<body class="bg-gray-50">

<div class="p-4">
    <h1 class="text-xl font-black mb-4">Village Express</h1>
    <div id="items"></div>
</div>

<div class="fixed bottom-4 left-4 right-4">
    <button onclick="placeOrder()" class="bg-green-700 text-white w-full p-4 rounded-xl">Place Order</button>
</div>

<script>
const config = { apiKey: "AIza...", projectId: "village-quick-commerce-e27f6" };
firebase.initializeApp(config);
const db = firebase.firestore();

let cart = {};
let currentUser = { name: "Test User", phone: "9999999999" };

const riders = [
  { name: "Ashok", phone: "8328016917" },
  { name: "Ravi", phone: "9000000001" },
  { name: "Naresh", phone: "9000000002" }
];

db.collection("products").onSnapshot(snap => {
    const el = document.getElementById("items");
    el.innerHTML = "";
    snap.forEach(doc => {
        const p = doc.data();
        el.innerHTML += `
        <div class="bg-white p-3 mb-2 rounded">
            <p>${p.name} - ₹${p.price}</p>
            <button onclick="add('${doc.id}', ${p.price}, '${p.name}')" class="bg-green-600 text-white px-3 py-1">Add</button>
        </div>`;
    });
});

function add(id, price, name){
    if(!cart[id]) cart[id] = {name, price, qty:0};
    cart[id].qty++;
}

async function placeOrder(){
    let sub = 0;
    Object.values(cart).forEach(i => sub += i.price * i.qty);

    const rider = riders[Math.floor(Math.random()*riders.length)];

    const order = {
        orderId: "ORD" + Math.floor(100000 + Math.random()*900000),
        customer: currentUser,
        rider: rider,
        items: cart,
        total: sub + 5,
        deliveryFee: 5,
        payment: "COD",
        address: "Test Address",
        gps: "Not Provided",
        status: "PENDING",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection("orders").add(order);
    alert("Order Placed");
    cart = {};
}
</script>
</body>
</html>
