<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

<style>
.auth-screen{display:none;position:fixed;inset:0;background:white;z-index:2000;padding:20px}
.auth-screen.active{display:block}
input,textarea{border:1px solid #ddd;padding:10px;border-radius:10px;width:100%}
.btn{background:#15803d;color:#fff;padding:12px;border-radius:12px;width:100%}
</style>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="auth-overlay" class="auth-screen">
<div id="login-view">
<h2>Login</h2>
<input id="login-phone" placeholder="Phone">
<input id="login-pass" placeholder="Password">
<button onclick="handleLogin()" class="btn">Login</button>
</div>
</div>

<!-- ITEMS -->
<div id="items-grid" class="p-4 grid grid-cols-2 gap-4"></div>

<!-- CART -->
<div id="cart-bar" class="fixed bottom-5 left-5 right-5 hidden">
<button onclick="openCheckout()" class="btn">Checkout ₹<span id="cart-total-bar">0</span></button>
</div>

<!-- CHECKOUT -->
<div id="checkout-view" class="hidden p-4">
<h2>Checkout</h2>
<div id="checkout-summary"></div>
<input id="order-name" placeholder="Name">
<input id="order-phone" placeholder="Phone">
<input id="order-building" placeholder="Building">
<textarea id="order-address" placeholder="Address"></textarea>
<input type="hidden" id="gps-coords">
<button onclick="placeOrder()" class="btn">Place Order</button>
</div>

<!-- PROFILE -->
<div id="profile-view" class="hidden p-4">
<h2>Orders</h2>
<div id="history-list"></div>
</div>

<script>
const config={apiKey:"AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",projectId:"village-quick-commerce-e27f6"};
firebase.initializeApp(config);
const db=firebase.firestore();

let currentUser=JSON.parse(localStorage.getItem('user_session'))||null;
let allProducts=[],cart={};

window.onload=()=>{if(!currentUser)showAuth('login');else initApp();}

function showAuth(v){
document.getElementById('auth-overlay').classList.add('active');
document.getElementById('login-view').style.display="block";
}

async function handleLogin(){
const p=document.getElementById('login-phone').value;
const pw=document.getElementById('login-pass').value;
const s=await db.collection("users").where("phone","==",p).where("pass","==",pw).get();
if(s.empty)return alert("Invalid");
currentUser=s.docs[0].data();
localStorage.setItem('user_session',JSON.stringify(currentUser));
location.reload();
}

function initApp(){
document.getElementById('auth-overlay').classList.remove('active');

db.collection("products").onSnapshot(snap=>{
allProducts=snap.docs.map(d=>({id:d.id,...d.data()}));
renderItems(allProducts);
});

loadHistory();
}

function renderItems(list){
const grid=document.getElementById('items-grid');grid.innerHTML="";
list.forEach(p=>{
const q=cart[p.id]?.qty||0;
grid.innerHTML+=`
<div class="bg-white p-3 rounded shadow">
<p>${p.name}</p>
<p>₹${p.price}</p>
<button onclick="updateQty('${p.id}',1)">+</button>
<button onclick="updateQty('${p.id}',-1)">-</button>
(${q})
</div>`;
});
}

function updateQty(id,c){
const p=allProducts.find(x=>x.id===id);
if(!cart[id])cart[id]={name:p.name,price:p.price,qty:0};
cart[id].qty+=c;
if(cart[id].qty<=0)delete cart[id];
updateCartUI();renderItems(allProducts);
}

function updateCartUI(){
let t=0,c=0;
Object.values(cart).forEach(i=>{t+=i.price*i.qty;c+=i.qty});
document.getElementById('cart-bar').classList.toggle('hidden',c==0);
document.getElementById('cart-total-bar').innerText=t+5;
}

function openCheckout(){
let sub=0;
Object.values(cart).forEach(i=>sub+=i.price*i.qty);

document.getElementById('checkout-summary').innerHTML=`
Subtotal: ₹${sub}<br>
Delivery: ₹5<br>
<b>Total: ₹${sub+5}</b>`;

document.getElementById('checkout-view').classList.remove('hidden');
}

async function placeOrder(){
const b=document.getElementById('order-building').value;
const a=document.getElementById('order-address').value;

let sub=0;
Object.values(cart).forEach(i=>sub+=i.price*i.qty);

const order={
orderId:"ORD"+Math.floor(Math.random()*100000),
customer:{name:currentUser.name,phone:currentUser.phone,user_phone:currentUser.phone},
address:b+", "+a,
items:cart,
total:sub+5,
status:"PENDING",
rider:{
name:"Ashok",
phone:"8328016917",
live:"https://maps.google.com/?q=14.5677,77.0196"
},
timestamp:firebase.firestore.FieldValue.serverTimestamp()
};

await db.collection("orders").add(order);

cart={};
updateCartUI();
document.getElementById('checkout-view').classList.add('hidden');
openProfile();
}

function openProfile(){
document.getElementById('profile-view').classList.remove('hidden');
}

async function cancelOrder(id){
await db.collection("orders").doc(id).update({status:"CANCELLED"});
}

function loadHistory(){
db.collection("orders").where("customer.user_phone","==",currentUser.phone)
.onSnapshot(snap=>{
const list=document.getElementById('history-list');
list.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();

let items="";
Object.values(d.items).forEach(i=>{
items+=`${i.name} x${i.qty} - ₹${i.price*i.qty}<br>`;
});

list.innerHTML+=`
<div class="bg-white p-3 mb-3 rounded shadow">
<b>${d.orderId}</b><br>
Status: ${d.status}<br>
${items}
Total: ₹${d.total}<br>

${d.status!="DELIVERED"?`<button onclick="cancelOrder('${doc.id}')">Cancel</button>`:""}

${d.status!="PENDING"?`
<div>
Rider: ${d.rider.name} (${d.rider.phone})<br>
<a href="${d.rider.live}" target="_blank">Live Location</a>
</div>`:""}

</div>`;
});
});
}
</script>

</body>
</html>
