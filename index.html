<!-- ONLY SHOWING UPDATED SCRIPT PART (rest remains SAME) -->
<script>
const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
firebase.initializeApp(config);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let allProducts = [], cart = {};

window.onload = () => { if(!currentUser) showAuth('login'); else initApp(); };

function showAuth(v) { document.getElementById('auth-overlay').classList.add('active'); ['login','register','forgot'].forEach(id => document.getElementById(id+'-view').classList.add('hidden')); document.getElementById(v+'-view').classList.remove('hidden'); }

async function handleLogin() {
    const p = document.getElementById('login-phone').value, pw = document.getElementById('login-pass').value;
    const s = await db.collection("users").where("phone","==",p).where("pass","==",pw).get();
    if(s.empty) return alert("Error"); currentUser = s.docs[0].data(); localStorage.setItem('user_session', JSON.stringify(currentUser)); location.reload();
}

async function handleRegister() {
    const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value, d = document.getElementById('reg-dob').value, pw = document.getElementById('reg-pass').value;
    await db.collection("users").add({ name:n, phone:p, dob:d, pass:pw }); alert("Success"); showAuth('login');
}

async function handleForgot() {
    const p = document.getElementById('f-phone').value, n = document.getElementById('f-name').value, d = document.getElementById('f-dob').value;
    const s = await db.collection("users").where("phone","==",p).where("name","==",n).where("dob","==",d).get();
    if(s.empty) return alert("Not Found"); alert("Password: " + s.docs[0].data().pass);
}

function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }

function initApp() {
    document.getElementById('auth-overlay').classList.remove('active');
    db.collection("products").onSnapshot(snap => { allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); renderItems(allProducts); });
    loadHistory();
}

function renderItems(list) {
    const grid = document.getElementById('items-grid'); grid.innerHTML = "";
    list.forEach(p => {
        const qty = cart[p.id]?.qty || 0;
        grid.innerHTML += `
        <div class="bg-white border rounded-2xl p-3 shadow-sm">
            <div class="aspect-square bg-slate-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                <img src="${p.image || ''}" class="w-full h-full object-contain p-2">
            </div>
            <p class="font-black text-[11px] truncate">${p.name}</p>
            <div class="flex justify-between items-center mt-1">
                <p class="text-[12px] font-black">₹${p.price}</p>
                ${qty === 0 ? `<button onclick="updateQty('${p.id}', 1)" class="border border-green-700 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black">ADD</button>` :
                `<div class="flex items-center gap-2 bg-green-700 text-white px-2 py-1 rounded-lg font-black text-[10px]">
                    <button onclick="updateQty('${p.id}', -1)">-</button>
                    <span>${qty}</span>
                    <button onclick="updateQty('${p.id}', 1)">+</button>
                </div>`}
            </div>
        </div>`;
    });
}

function updateQty(id, change) {
    const p = allProducts.find(x => x.id === id);
    if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
    cart[id].qty += change; if (cart[id].qty <= 0) delete cart[id];
    updateCartUI(); renderItems(allProducts);
}

function updateCartUI() {
    let sub = 0, count = 0;
    Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
    document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
    document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
    document.getElementById('cart-count').innerText = `${count} ITEMS`;
}

function openCheckout() {
    document.getElementById('order-name').value = currentUser.name;
    document.getElementById('order-phone').value = currentUser.phone;

    let sub = 0;
    Object.values(cart).forEach(i => sub += i.price * i.qty);

    document.getElementById('checkout-summary').innerHTML = `
        <div class="flex justify-between"><span>Subtotal</span><span>₹${sub}</span></div>
        <div class="flex justify-between"><span>Delivery</span><span>₹5</span></div>
        <div class="flex justify-between font-black text-green-700"><span>Total</span><span>₹${sub+5}</span></div>
    `;

    document.getElementById('checkout-view').classList.remove('hidden');
}

function getCurrentLocation(btn) {
    if (navigator.geolocation) {
        btn.innerHTML = "...";
        navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById('gps-coords').value = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            btn.innerHTML = "GPS Saved ✅";
        });
    }
}

async function placeOrder() {
    const b = document.getElementById('order-building').value, a = document.getElementById('order-address').value;
    if(!b || !a) return alert("Address Required");

    let sub = 0;
    Object.values(cart).forEach(i => sub += i.price * i.qty);

    const order = {
        orderId: "ORD" + Math.floor(100000 + Math.random() * 900000),
        customer: { name: currentUser.name, phone: currentUser.phone, user_phone: currentUser.phone },
        address: `${b}, ${a}`,
        gps: document.getElementById('gps-coords').value,
        items: cart,
        total: sub + 5,
        status: "PENDING",
        rider: {
            name: "Golla Ashok",
            phone: "8328016917",
            live: "https://maps.google.com/?q=14.5677,77.0196"
        },
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection("orders").add(order);
    alert("Order Placed!");
    cart = {};
    updateCartUI();
    closeCheckout();
    openProfile();
}

/* CANCEL ORDER */
async function cancelOrder(id) {
    if(!confirm("Cancel this order?")) return;
    await db.collection("orders").doc(id).update({ status: "CANCELLED" });
}

/* HISTORY */
function loadHistory() {
    db.collection("orders").where("customer.user_phone", "==", currentUser.phone)
    .onSnapshot(snap => {
        const list = document.getElementById('history-list');
        list.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();

            let itemsList = Object.values(d.items)
            .map(i => `<div class="flex justify-between text-xs font-bold mb-1">
                <span>${i.name} x${i.qty}</span>
                <span>₹${i.price * i.qty}</span>
            </div>`).join('');

            let riderUI = "";
            if(d.status !== "PENDING"){
                riderUI = `
                <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-blue-500 uppercase">Rider</p>
                        <p class="text-xs font-black">${d.rider.name} (${d.rider.phone})</p>
                    </div>
                    <a href="${d.rider.live}" target="_blank" class="text-xs text-blue-600 font-black">Live</a>
                </div>`;
            }

            list.innerHTML += `
            <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-4">
                <div class="flex justify-between">
                    <div>
                        <p class="text-[9px] font-black text-gray-400 uppercase">${d.orderId}</p>
                        <p class="text-lg font-black text-green-700">${d.status}</p>
                    </div>
                    ${d.status !== "DELIVERED" ? `<button onclick="cancelOrder('${doc.id}')" class="text-red-500 text-[9px] font-black">Cancel</button>` : ""}
                </div>

                <div>${itemsList}</div>

                <div class="bg-gray-50 p-3 rounded-xl flex justify-between font-black">
                    <span>Total</span><span>₹${d.total}</span>
                </div>

                ${riderUI}
            </div>`;
        });
    });
}

function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
</script>
