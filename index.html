<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; }
.product-card { background: white; border-radius: 24px; padding: 12px; border: 1px solid #f1f5f9; }
.hidden { display: none !important; }
</style>
</head>

<body class="pb-32">

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">
        <h1 class="text-4xl font-black italic text-green-700 uppercase">
            Village<span class="text-orange-500">Express</span>
        </h1>

        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl mb-4">
        </div>

        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl">

        <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-2xl">Login</button>
        <button onclick="toggleAuthMode()" id="toggle-link" class="text-sm">
            New here? Create Account
        </button>
    </div>
</div>

<!-- MAIN -->
<div id="main-app" class="hidden">

<header class="p-6 flex justify-between">
    <h2 id="display-name"></h2>
    <button onclick="handleLogout()">Logout</button>
</header>

<main id="items-grid" class="px-4 grid grid-cols-2 gap-4"></main>

</div>

<script>
const RUPEE = "₹";

const firebaseConfig = {
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
    projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let cart = {}, gps = "", isSignup = false;

window.onload = () => {
    if(currentUser) showMainApp();
};

function toggleAuthMode() {
    isSignup = !isSignup;
    document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
}

async function handleAuth() {
    const phone = document.getElementById('auth-phone').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();

    if(isSignup) {
        const name = document.getElementById('reg-name').value.trim();
        const user = { name, phone, pass };
        await db.collection("users").add(user);
        loginUser(user);
    } else {
        const s = await db.collection("users")
            .where("phone","==",phone)
            .where("pass","==",pass)
            .get();

        if(!s.empty) loginUser(s.docs[0].data());
        else alert("Invalid Login");
    }
}

function loginUser(u) {
    localStorage.setItem('user_session', JSON.stringify(u));
    location.reload();
}

function handleLogout() {
    localStorage.removeItem('user_session');
    location.reload();
}

function showMainApp() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
    renderCategories();
}

function renderCategories() {
    const grid = document.getElementById('items-grid');
    grid.innerHTML = `<p>Browse</p>`;

    db.collection("categories").onSnapshot(snap => {
        snap.forEach(doc => {
            grid.innerHTML += `
            <div onclick="renderProducts('${doc.id}')" class="product-card">
                <p>${doc.data().name}</p>
            </div>`;
        });
    });
}

function renderProducts(catId) {
    const grid = document.getElementById('items-grid');
    grid.innerHTML = `<button onclick="renderCategories()">Back</button>`;

    db.collection("products")
    .where("categoryId", "==", catId)
    .onSnapshot(snap => {
        snap.forEach(doc => {
            const p = doc.data();
            grid.innerHTML += `
            <div class="product-card">
                <p>${p.name}</p>
                <p>${RUPEE}${p.price}</p>
                <button onclick="addToCart('${doc.id}', ${p.price}, '${p.name}')">Add</button>
            </div>`;
        });
    });
}

function addToCart(id, price, name) {
    if(!cart[id]) cart[id] = {id, price, name, qty:0};
    cart[id].qty++;
    console.log(cart);
}
</script>

</body>
</html>
