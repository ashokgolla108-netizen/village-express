<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Kalyandurg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-dot { animation: pulse-green 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot"></i>
                <div class="overflow-hidden">
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p id="addr-display" class="text-[10px] font-bold truncate w-32">Kalyandurg, Anantapur</p>
                </div>
            </div>
            <button onclick="openProfile()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search "milk" or "tomato"' class="w-full outline-none text-sm font-medium bg-transparent">
        </div>
    </header>

    <div id="live-status-bar" class="hidden m-4 p-4 bg-white border-2 border-green-500 rounded-2xl flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-truck-fast text-green-600 text-xl live-dot"></i>
            <div>
                <p class="text-[10px] font-black uppercase text-green-700">Order is Active</p>
                <p id="active-order-id" class="text-[9px] text-gray-400 font-bold">#ORD...</p>
            </div>
        </div>
        <button onclick="openProfile()" class="text-[9px] font-black bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Details</button>
    </div>

    <div class="flex gap-3 p-4 overflow-x-auto hide-scroll bg-white shadow-sm">
        <button onclick="filterItems('All')" class="px-6 py-2 rounded-full border text-[10px] font-black uppercase bg-green-50 border-green-200">All</button>
        <button onclick="filterItems('Vegetables')" class="px-6 py-2 rounded-full border text-[10px] font-black uppercase">Vegetables</button>
        <button onclick="filterItems('Fruits')" class="px-6 py-2 rounded-full border text-[10px] font-black uppercase">Fruits</button>
        <button onclick="filterItems('Dairy')" class="px-6 py-2 rounded-full border text-[10px] font-black uppercase">Dairy & Milk</button>
    </div>

    <main class="p-4">
        <h3 id="cat-title" class="text-sm font-black italic mb-4">Fresh Items</h3>
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="profile-view" class="fixed inset-0 bg-gray-50 z-[100] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white z-10">
            <button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Account Details</h2>
        </div>
        <div class="p-6 text-center bg-white mb-2">
            <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl text-slate-400">
                <i class="fa-solid fa-user"></i>
            </div>
            <p class="text-[12px] font-bold text-gray-400">8328016917</p>
        </div>

        <div class="bg-white mb-2 divide-y">
            <div onclick="toggleAddressBook()" class="p-4 flex items-center justify-between active:bg-gray-50">
                <div class="flex items-center gap-4 text-sm font-bold"><i class="fa-solid fa-address-book text-gray-400"></i> Address Book</div>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
            <div id="address-list-container" class="hidden p-4 bg-gray-50 text-xs font-bold space-y-2">
                <div class="p-3 bg-white border rounded-xl flex justify-between items-center shadow-sm">
                    <span>🏠 Home: Kalyandurg Madakasira Road</span>
                    <i class="fa-solid fa-circle-check text-green-600"></i>
                </div>
            </div>
        </div>

        <div id="history-list" class="bg-white p-4 space-y-4 mb-20">
            <h3 class="text-[10px] font-black uppercase text-gray-400">Past Orders</h3>
        </div>
    </div>

    <div id="order-detail-view" class="fixed inset-0 bg-white z-[150] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center justify-between sticky top-0 bg-white shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="closeOrderDetail()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black">Order Summary</h2>
            </div>
            <button id="cancel-btn-main" class="text-red-500 text-[10px] font-black uppercase hidden" onclick="cancelOrder()">Cancel Order</button>
        </div>
        <div id="detail-content" class="p-4 space-y-6"></div>
    </div>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-4 rounded-2xl font-black shadow-2xl items-center">
            <div class="text-left leading-none">
                <p id="cart-count" class="text-[9px] mb-1 uppercase tracking-tighter">0 ITEMS</p>
                <p id="cart-total-bar" class="text-sm">₹0</p>
            </div>
            <span class="text-xs font-black">PROCEED TO PAY <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[120] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white">
            <button onclick="hideCheckout()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-sm">Final Step</h2>
        </div>
        
        <div class="p-4 space-y-6 pb-32">
            <div id="checkout-items" class="space-y-3 text-xs font-bold border-b pb-4"></div>

            <div class="bg-gray-50 p-5 rounded-2xl space-y-2">
                <h3 class="text-[10px] font-black uppercase text-gray-400 mb-2">Bill Details</h3>
                <div class="flex justify-between text-xs font-bold text-gray-600"><span>Item Total</span><span id="bill-sub">₹0</span></div>
                <div class="flex justify-between text-xs font-bold text-gray-600"><span>Handling charge</span><span>+₹5</span></div>
                <div class="flex justify-between text-base font-black text-slate-900 pt-3 border-t mt-2">
                    <span>Total Bill</span><span id="bill-grand">₹0</span>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black uppercase text-gray-400">Deliver To</h3>
                    <button onclick="fetchCurrentLocation()" class="text-[9px] font-black text-blue-600 uppercase"><i class="fa-solid fa-location-crosshairs mr-1"></i> Use Current Location</button>
                </div>
                <input type="text" id="cust-name" placeholder="Receiver's Name" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none focus:border-green-600">
                <input type="tel" id="cust-phone" placeholder="Mobile Number" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none focus:border-green-600">
                <textarea id="manual-address" placeholder="Building Name / House No / Street Name" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none focus:border-green-600" rows="3"></textarea>
            </div>

            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-gray-400">Payment Method</h3>
                <label class="flex items-center justify-between p-4 border rounded-xl bg-blue-50/30 border-blue-100">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-mobile-screen-button text-blue-600"></i>
                        <span class="text-xs font-bold">Pay via UPI</span>
                    </div>
                    <input type="radio" name="pay-method" value="UPI" checked class="accent-blue-600 w-4 h-4">
                </label>
                <label class="flex items-center justify-between p-4 border rounded-xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-hand-holding-dollar text-gray-400"></i>
                        <span class="text-xs font-bold">Cash on Delivery</span>
                    </div>
                    <input type="radio" name="pay-method" value="COD" class="accent-green-600 w-4 h-4">
                </label>
            </div>

            <button id="confirm-btn" onclick="placeOrder()" class="w-full bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-wider active:scale-95 transition-all">Confirm Order</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        let allProducts = [], cart = {}, currentViewingDocId = null;

        window.onload = () => {
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts);
            });
            checkActiveOrder();
        };

        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 flex flex-col justify-between shadow-sm">
                        <div class="aspect-square bg-gray-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                            <img src="${p.image || ''}" class="w-full h-full object-contain p-2">
                        </div>
                        <p class="font-black text-[11px] h-8 overflow-hidden">${p.name}</p>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[12px] font-black">₹${p.price}</p>
                            ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="border border-green-600 text-green-600 px-4 py-1 rounded-lg text-[10px] font-black uppercase">Add</button>` :
                            `<div class="flex items-center gap-3 bg-green-600 text-white px-2 py-1 rounded-lg font-black text-[10px]">
                                <button onclick="updateQty('${p.id}', -1)">-</button><span>${qty}</span><button onclick="updateQty('${p.id}', 1)">+</button>
                            </div>`}
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI();
            renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function showCheckout() {
            const list = document.getElementById('checkout-items');
            list.innerHTML = "";
            let sub = 0;
            Object.keys(cart).forEach(id => {
                const i = cart[id]; sub += (i.price * i.qty);
                list.innerHTML += `<div class="flex justify-between text-[11px] font-black"><span>${i.name} (x${i.qty})</span><span>₹${i.price * i.qty}</span></div>`;
            });
            document.getElementById('bill-sub').innerText = `₹${sub}`;
            document.getElementById('bill-grand').innerText = `₹${sub + 5}`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('manual-address').value;
            const method = document.querySelector('input[name="pay-method"]:checked').value;
            const total = parseInt(document.getElementById('bill-grand').innerText.replace('₹',''));
            const oid = "ORD" + Math.floor(100000 + Math.random() * 900000);

            if(!name || !phone || !address) return alert("Please fill Name, Phone and Address.");

            await db.collection("orders").add({
                orderId: oid, items: cart, total: total, status: "ACCEPTED",
                paymentMethod: method, customer: { name, phone },
                timestamp: firebase.firestore.FieldValue.serverTimestamp(), address: address
            });

            localStorage.setItem('active_order', oid);
            if(method === "UPI") {
                window.location.href = `upi://pay?pa=g.ashok14@ibl&pn=VillageExpress&am=${total}&cu=INR&tn=${oid}`;
            } else {
                alert("Order Placed (COD)!");
                location.reload();
            }
        }

        async function showOrderDetail(docId) {
            const doc = await db.collection("orders").doc(docId).get();
            const d = doc.data();
            currentViewingDocId = docId;

            // STRICT CANCEL FILTER: Only show for specific active statuses
            const cancellable = ['ACCEPTED', 'PENDING', 'CONFIRMED'].includes(d.status.toUpperCase());
            document.getElementById('cancel-btn-main').classList.toggle('hidden', !cancellable);
            
            let itemsHtml = Object.values(d.items).map(i => `<div class="flex justify-between text-xs py-1 border-b border-dashed"><span>${i.name} x${i.qty}</span><span>₹${i.price * i.qty}</span></div>`).join('');
            
            document.getElementById('detail-content').innerHTML = `
                <div class="bg-white p-4 rounded-2xl border shadow-sm">
                    <p class="text-[10px] font-black uppercase text-gray-400">Order ID: ${d.orderId}</p>
                    <h3 class="text-xl font-black ${d.status === 'CANCELLED' ? 'text-red-600' : 'text-green-700'}">${d.status}</h3>
                    <p class="text-[9px] font-bold text-gray-400">Payment: ${d.paymentMethod || 'UPI'}</p>
                </div>

                <div class="space-y-1">${itemsHtml}</div>

                <div class="bg-gray-50 p-4 rounded-xl flex justify-between text-xs font-bold"><span>Total Bill</span><span>₹${d.total}</span></div>

                <div class="p-4 bg-blue-50 border border-blue-100 rounded-2xl flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 uppercase">Rider</p><p class="text-xs font-black">Golla Ashok (8328016917)</p></div>
                    <a href="tel:8328016917" class="bg-blue-600 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center"><i class="fa-solid fa-phone"></i></a>
                </div>

                <div>
                    <h4 class="text-[10px] font-black uppercase text-gray-400 mb-1">Deliver To</h4>
                    <p class="text-xs font-bold text-gray-700 leading-relaxed">${d.customer.name} • ${d.customer.phone}<br>${d.address}</p>
                </div>`;
            document.getElementById('order-detail-view').classList.remove('hidden');
        }

        async function cancelOrder() {
            if(confirm("Cancel this order?")) {
                await db.collection("orders").doc(currentViewingDocId).update({ status: "CANCELLED" });
                localStorage.removeItem('active_order');
                location.reload();
            }
        }

        function fetchCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('manual-address').value = `📍 GPS: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)} (Kalyandurg)`;
                }, () => alert("Location access denied."));
            }
        }

        function toggleAddressBook() { document.getElementById('address-list-container').classList.toggle('hidden'); }
        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); openHistory(); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function closeOrderDetail() { document.getElementById('order-detail-view').classList.add('hidden'); }
        function hideCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
        function filterItems(c) { 
            document.getElementById('cat-title').innerText = c;
            renderItems(c === 'All' ? allProducts : allProducts.filter(p => p.category === c)); 
        }

        function openHistory() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = `<h3 class="text-[10px] font-black uppercase text-gray-400">Past Orders</h3>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div onclick="showOrderDetail('${doc.id}')" class="bg-gray-50 p-4 rounded-2xl border flex justify-between items-center mb-2">
                        <div><p class="text-[10px] font-black ${d.status === 'CANCELLED' ? 'text-red-500' : 'text-green-600'} uppercase">${d.status}</p><p class="text-xs font-black">₹${d.total} • ${d.orderId}</p></div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    </div>`;
                });
            });
        }

        function checkActiveOrder() {
            const id = localStorage.getItem('active_order');
            if(id) { document.getElementById('live-status-bar').classList.remove('hidden'); document.getElementById('active-order-id').innerText = "#" + id; }
        }
    </script>
</body>
    </html>
