<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express - Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-900 pb-32">

    <header class="glass sticky top-0 z-[100] p-4 border-b border-slate-100">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-green-700 italic">VILLAGE<span class="text-orange-500">EXPRESS</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kalyandurg Delivery</p>
            </div>
            <button onclick="openProfile()" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-600">
                <i class="fa-solid fa-user-circle text-xl"></i>
            </button>
        </div>
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" oninput="handleSearch(this.value)" placeholder="Search milk, bread, snacks..." 
                   class="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-11 pr-4 text-sm focus:ring-2 ring-green-500 transition-all outline-none">
        </div>
    </header>

    <div class="flex gap-3 overflow-x-auto p-4 no-scrollbar">
        <button class="px-6 py-2 bg-green-700 text-white rounded-full text-xs font-bold whitespace-nowrap">All Items</button>
        <button class="px-6 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-600 whitespace-nowrap">Groceries</button>
        <button class="px-6 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-600 whitespace-nowrap">Snacks</button>
        <button class="px-6 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-600 whitespace-nowrap">Essentials</button>
    </div>

    <main class="px-4">
        <div id="items-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 z-[100] hidden transform transition-all hover:scale-[1.02]">
        <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-[2rem] shadow-2xl ring-4 ring-white">
            <div class="flex items-center gap-3">
                <div class="bg-green-500 w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-basket-shopping text-white"></i>
                </div>
                <div class="text-left">
                    <p id="cart-count" class="text-[10px] font-bold text-slate-400 uppercase">0 Items</p>
                    <p id="cart-total-bar" class="text-lg font-black italic">₹0</p>
                </div>
            </div>
            <span class="bg-green-600 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-wider">Checkout</span>
        </button>
    </div>

    <script>
        // ... Keep your Firebase Config ...
        
        function renderItems(list) {
            const grid = document.getElementById('items-grid'); 
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-slate-100 flex flex-col items-center text-center">
                        <div class="w-full aspect-square bg-slate-50 rounded-[2rem] mb-3 flex items-center justify-center overflow-hidden">
                            <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-3/4 h-3/4 object-contain">
                        </div>
                        <h3 class="font-bold text-[13px] text-slate-800 leading-tight mb-1">${p.name}</h3>
                        <p class="text-lg font-black text-slate-900 mb-3">₹${p.price}</p>
                        
                        ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="w-full py-3 bg-white border-2 border-slate-100 rounded-2xl text-[10px] font-black uppercase text-green-700 hover:border-green-500">Add to Cart</button>` :
                            `<div class="w-full flex items-center justify-between bg-green-700 text-white p-1 rounded-2xl">
                                <button onclick="updateQty('${p.id}', -1)" class="w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-minus"></i></button>
                                <span class="font-black">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
                            </div>`
                        }
                    </div>`;
            });
        }
    </script>
</body>
</html>
