<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Kalyandurg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-cat { border: 2px solid #15803d !important; background-color: #f0fdf4; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-dot { animation: pulse-green 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2" onclick="getCurrentLocation()">
                <i class="fa-solid fa-location-dot"></i>
                <div class="overflow-hidden">
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p id="addr-display" class="text-[10px] font-bold truncate w-32">Kalyandurg...</p>
                </div>
            </div>
            <button onclick="openProfile()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search items in Kalyandurg...' class="w-full outline-none text-sm font-medium bg-transparent">
        </div>
    </header>

    <div id="live-status-bar" class="hidden m-4 p-4 bg-white border-2 border-green-500 rounded-2xl flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="relative">
                <i class="fa-solid fa-truck-fast text-green-600 text-xl"></i>
                <div class="absolute -top-1 -right-1 w-2 h-2 bg-green-500 rounded-full live-dot"></div>
            </div>
            <div>
                <p class="text-[10px] font-black uppercase text-green-700">Arriving in 12 mins</p>
                <p id="active-order-id" class="text-[9px] text-gray-400 font-bold">#ORD...</p>
            </div>
        </div>
        <button onclick="openProfile()" class="text-[9px] font-black bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Track</button>
    </div>

    <section class="p-4 bg-white">
        <div class="grid grid-cols-4 gap-4">
            <div onclick="filterItems('Vegetables')" class="text-center">
                <div class="aspect-square bg-green-50 rounded-2xl flex items-center justify-center mb-1 border border-green-100"><img src="https://cdn-icons-png.flaticon.com/128/2329/2329865.png" class="w-8 h-8"></div>
                <p class="text-[9px] font-black">Vegetables</p>
            </div>
            <div onclick="filterItems('Dairy')" class="text-center">
                <div class="aspect-square bg-blue-50 rounded-2xl flex items-center justify-center mb-1 border border-blue-100"><img src="https://cdn-icons-png.flaticon.com/128/2674/2674486.png" class="w-8 h-8"></div>
                <p class="text-[9px] font-black">Dairy</p>
            </div>
            <div onclick="filterItems('Fruits')" class="text-center">
                <div class="aspect-square bg-orange-50 rounded-2xl flex items-center justify-center mb-1 border border-orange-100"><img src="https://cdn-icons-png.flaticon.com/128/3194/3194766.png" class="w-8 h-8"></div>
                <p class="text-[9px] font-black">Fruits</p>
            </div>
            <div onclick="filterItems('All')" class="text-center">
                <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center mb-1 border border-gray-100"><i class="fa-solid fa-grid-2 text-gray-400"></i></div>
                <p class="text-[9px] font-black">All</p>
            </div>
        </div>
    </section>

    <main class="p-4">
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="profile-view" class="fixed inset-0 bg-gray-50 z-[100] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white z-10">
            <button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Account</h2>
        </div>
        <div class="p-6 text-center bg-white mb-2">
            <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl text-slate-400"><i class="fa-solid fa-user"></i></div>
            <h3 class="font-black text-lg">Golla Ashok</h3>
            <p class="text-[10px] font-bold text-gray-400">8328016917</p>
        </div>
        
        <div class="bg-white mb-2 divide-y">
            <div onclick="toggleAddressBook()" class="p-4 flex items-center justify-between active:bg-gray-50">
                <div class="flex items-center gap-4 text-sm font-bold"><i class="fa-solid fa-location-dot text-gray-400"></i> Address Book</div>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
            <div id="address-list" class="hidden p-4 bg-gray-50 text-xs font-bold space-y-2">
                <div class="p-3 bg-white border rounded-xl flex justify-between items-center">
                    <span>🏠 Home: Kalyandurg Main Rd</span>
                    <i class="fa-solid fa-circle-check text-green-600"></i>
                </div>
            </div>
        </div>

        <div id="history-list" class="bg-white p-4 space-y-4 mb-20">
            <h3 class="text-[10px] font-black uppercase text-gray-400">Past Orders</h3>
        </div>
    </div>

    <div id="order-detail-view" class="fixed inset-0 bg-white z-[150] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center justify-between sticky top-0 bg-white shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="closeOrderDetail()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black">Order Summary</h2>
            </div>
            <button id="cancel-btn-main" class="text-red-500 text-[10px] font-black uppercase" onclick="cancelOrder()">Cancel</button>
        </div>
        <div id="detail-content" class="p-4 space-y-6"></div>
    </div>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-4 rounded-2xl font-black shadow-2xl items-center">
            <div class="text-left leading-none">
                <p id="cart-count" class="text-[9px] mb-1">0 ITEMS</p>
                <p id="cart-total-bar" class="text-sm">₹0</p>
            </div>
            <span class="text-xs font-black">PROCEED <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[120] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white">
            <button onclick="hideCheckout()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Final Step</h2>
        </div>
        <div class="p-4 space-y-6 pb-20">
            <div id="checkout-items" class="space-y-4"></div>
            <div class="bg-gray-50 p-6 rounded-3xl">
                <div class="space-y-2 text-xs font-bold text-gray-600">
                    <div class="flex justify-between"><span>Subtotal</span><span id="bill-sub">₹0</span></div>
                    <div class="flex justify-between"><span>Handling</span><span>+₹5</span></div>
                    <div class="flex justify-between text-base font-black text-slate-900 pt-3 border-t mt-2">
                        <span>Grand Total</span><span id="bill-grand">₹0</span>
                    </div>
                </div>
            </div>
            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Name" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none">
                <textarea id="manual-address" placeholder="Deliver to..." class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none" rows="2"></textarea>
            </div>
            <button id="confirm-btn" onclick="placeOrder()" class="w-full bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase">Confirm Order</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        let allProducts = [], cart = {}, currentViewingDocId = null;

        window.onload = () => {
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts);
            });
            checkActiveOrder();
        };

        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 flex flex-col justify-between shadow-sm">
                        <div class="aspect-square bg-gray-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden"><img src="${p.image || ''}" class="w-full h-full object-contain p-2"></div>
                        <p class="font-black text-[11px] h-8 overflow-hidden">${p.name}</p>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[12px] font-black">₹${p.price}</p>
                            ${qty === 0 ? `<button onclick="updateQty('${p.id}', 1)" class="border border-green-600 text-green-600 px-4 py-1 rounded-lg text-[10px] font-black uppercase">Add</button>` :
                            `<div class="flex items-center gap-3 bg-green-600 text-white px-2 py-1 rounded-lg font-black text-[10px]"><button onclick="updateQty('${p.id}', -1)">-</button><span>${qty}</span><button onclick="updateQty('${p.id}', 1)">+</button></div>`}
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI();
            renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function showCheckout() {
            const list = document.getElementById('checkout-items');
            list.innerHTML = "";
            let sub = 0;
            Object.keys(cart).forEach(id => {
                const i = cart[id]; sub += (i.price * i.qty);
                list.innerHTML += `<div class="flex justify-between text-xs font-black"><p>${i.name} x ${i.qty}</p><p>₹${i.price * i.qty}</p></div>`;
            });
            document.getElementById('bill-sub').innerText = `₹${sub}`;
            document.getElementById('bill-grand').innerText = `₹${sub + 5}`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            const oid = "ORD" + Math.floor(100000 + Math.random() * 900000);
            const total = parseInt(document.getElementById('bill-grand').innerText.replace('₹',''));
            
            await db.collection("orders").add({
                orderId: oid, items: cart, total: total, status: "ACCEPTED",
                customer: { name: document.getElementById('cust-name').value, mobile: "8328016917" },
                timestamp: firebase.firestore.FieldValue.serverTimestamp(), address: document.getElementById('manual-address').value
            });

            localStorage.setItem('active_order', oid);
            alert("Order Accepted! Delivery in 15 mins.");
            window.location.href = `upi://pay?pa=g.ashok14@ibl&pn=VillageExpress&am=${total}&cu=INR&tn=${oid}`;
        }

        async function showOrderDetail(docId) {
            const doc = await db.collection("orders").doc(docId).get();
            const d = doc.data();
            currentViewingDocId = docId;
            
            // HIDE CANCEL IF DELIVERED OR CANCELLED
            const canCancel = (d.status !== 'DELIVERED' && d.status !== 'CANCELLED');
            document.getElementById('cancel-btn-main').style.display = canCancel ? 'block' : 'none';
            
            let itemsList = Object.values(d.items).map(i => `<div class="flex justify-between text-xs py-1"><span>${i.name} (x${i.qty})</span><span>₹${i.price * i.qty}</span></div>`).join('');
            
            document.getElementById('detail-content').innerHTML = `
                ${d.status === 'ACCEPTED' ? `
                <div class="w-full h-32 bg-slate-100 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-gray-300 relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 10px 10px;"></div>
                    <i class="fa-solid fa-map-location-dot text-gray-300 text-3xl mb-2"></i>
                    <p class="text-[10px] font-black text-gray-400 uppercase">Live Rider Tracking (Kalyandurg)</p>
                    <div class="absolute top-1/2 left-1/4 w-3 h-3 bg-blue-600 rounded-full border-2 border-white animate-bounce shadow-lg"></div>
                </div>` : ''}

                <div class="bg-white p-4 rounded-2xl border">
                    <p class="text-[10px] font-black text-gray-400 uppercase">Order Status</p>
                    <h3 class="text-xl font-black ${d.status === 'CANCELLED' ? 'text-red-600' : 'text-green-700'}">${d.status}</h3>
                    <p class="text-[9px] text-gray-400 font-bold">Arriving in ${d.status === 'ACCEPTED' ? '12-15' : '0'} mins</p>
                </div>

                <div class="space-y-2 border-b border-dashed pb-4">${itemsList}</div>
                
                <div class="p-4 bg-blue-50 border border-blue-100 rounded-2xl flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-blue-600 uppercase">Delivery Rider</p><p class="text-xs font-black">Golla Ashok (8328016917)</p></div>
                    <a href="tel:8328016917" class="bg-blue-600 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center"><i class="fa-solid fa-phone"></i></a>
                </div>`;
            document.getElementById('order-detail-view').classList.remove('hidden');
        }

        async function cancelOrder() {
            if(confirm("Cancel this order?")) {
                await db.collection("orders").doc(currentViewingDocId).update({ status: "CANCELLED" });
                localStorage.removeItem('active_order');
                location.reload();
            }
        }

        function toggleAddressBook() { document.getElementById('address-list').classList.toggle('hidden'); }

        function openHistory() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = `<h3 class="text-[10px] font-black text-gray-400">Past Orders</h3>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div onclick="showOrderDetail('${doc.id}')" class="bg-gray-50 p-4 rounded-2xl border mb-2 flex justify-between items-center">
                        <div><p class="text-[9px] font-black ${d.status === 'CANCELLED' ? 'text-red-500' : 'text-green-600'} uppercase">${d.status}</p><p class="text-xs font-black">₹${d.total} • ${d.orderId}</p></div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    </div>`;
                });
            });
        }

        function checkActiveOrder() {
            const id = localStorage.getItem('active_order');
            if(id) { document.getElementById('live-status-bar').classList.remove('hidden'); document.getElementById('active-order-id').innerText = "#" + id; }
        }

        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); openHistory(); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function closeOrderDetail() { document.getElementById('order-detail-view').classList.add('hidden'); }
        function hideCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function filterItems(c) { renderItems(c === 'All' ? allProducts : allProducts.filter(p => p.category === c)); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
