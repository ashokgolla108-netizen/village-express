<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Kalyandurg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-cat { border-color: #15803d; background-color: #f0fdf4; color: #15803d; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2" onclick="getCurrentLocation()">
                <i class="fa-solid fa-location-dot"></i>
                <div class="overflow-hidden">
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p id="addr-display" class="text-[10px] font-bold truncate w-32">Set location...</p>
                </div>
            </div>
            <button onclick="openProfile()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search items in Kalyandurg...' class="w-full outline-none text-sm font-medium bg-transparent">
        </div>
    </header>

    <div id="live-status-bar" class="hidden m-4 p-4 bg-white border-2 border-green-500 rounded-2xl flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-truck-fast text-green-600 text-xl animate-bounce"></i>
            <div>
                <p class="text-[11px] font-black uppercase text-green-700">Order is Active</p>
                <p id="active-order-id" class="text-[9px] text-gray-400 font-bold">#ORD...</p>
            </div>
        </div>
        <div class="flex gap-2">
            <a href="tel:8328016917" class="bg-green-600 text-white p-2 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-phone text-[10px]"></i>
            </a>
            <button onclick="openHistory()" class="text-[9px] font-black bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase">Details</button>
        </div>
    </div>

    <main class="p-4">
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-4 rounded-2xl font-black shadow-2xl items-center">
            <div class="text-left leading-none">
                <p id="cart-count" class="text-[9px] opacity-80 uppercase mb-1">0 ITEMS</p>
                <p id="cart-total-bar" class="text-sm">₹0</p>
            </div>
            <span class="text-xs font-black italic">PROCEED <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <div id="profile-view" class="fixed inset-0 bg-white z-[100] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center justify-between sticky top-0 bg-white">
            <div class="flex items-center gap-4">
                <button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black">Account Details</h2>
            </div>
        </div>
        <div class="p-6 text-center border-b">
            <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl text-slate-400">
                <i class="fa-solid fa-user"></i>
            </div>
            <p class="text-xs font-black italic tracking-widest text-gray-500">8328016917</p>
        </div>
        <div id="history-list" class="p-4 space-y-4">
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-2">Order History</h3>
            </div>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[120] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white">
            <button onclick="hideCheckout()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Finalize Order</h2>
        </div>
        <div class="p-4 space-y-6 pb-20">
            <div id="checkout-items" class="space-y-4 border-b border-dashed pb-4"></div>
            
            <div class="bg-gray-50 p-6 rounded-3xl">
                <div class="space-y-2 text-xs font-bold text-gray-600">
                    <div class="flex justify-between"><span>Subtotal</span><span id="bill-sub">₹0</span></div>
                    <div class="flex justify-between"><span>Handling</span><span>+₹5</span></div>
                    <div class="flex justify-between text-green-600"><span>Delivery Fee</span><span>+₹15</span></div>
                    <div class="flex justify-between text-base font-black text-slate-900 pt-3 border-t mt-2">
                        <span>Total Pay</span><span id="bill-grand">₹0</span>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Receiver Name" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none">
                <input type="text" id="cust-landmark" placeholder="Building/Landmark" class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none">
                <textarea id="manual-address" placeholder="Exact Delivery Location..." class="w-full bg-gray-50 border rounded-xl p-3 text-xs font-bold outline-none" rows="2"></textarea>
                <button onclick="getCurrentLocation()" class="text-[9px] font-black text-blue-600 uppercase w-full text-right"><i class="fa-solid fa-location-crosshairs"></i> Refresh Current Location</button>
            </div>

            <div class="flex gap-2">
                <button onclick="setPayment('UPI')" id="pay-upi" class="flex-1 p-4 border-2 border-blue-100 bg-blue-50/50 rounded-2xl text-center">
                    <i class="fa-solid fa-mobile-screen text-blue-500 mb-1"></i>
                    <p class="text-[10px] font-black">UPI</p>
                </button>
                <button onclick="setPayment('COD')" id="pay-cod" class="flex-1 p-4 border-2 border-gray-100 rounded-2xl text-center">
                    <i class="fa-solid fa-hand-holding-dollar text-green-600 mb-1"></i>
                    <p class="text-[10px] font-black">CASH</p>
                </button>
            </div>

            <button id="confirm-btn" onclick="placeOrder()" class="w-full bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest active:scale-95 transition-all">
                Confirm & Pay
            </button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        let allProducts = [], cart = {}, paymentMethod = "UPI";
        const RIDER_PHONE = "8328016917";

        window.onload = () => {
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts);
            });
            checkActiveOrder();
        };

        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 flex flex-col justify-between shadow-sm">
                        <div class="aspect-square bg-gray-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                            <img src="${p.image || ''}" class="w-full h-full object-contain p-2">
                        </div>
                        <p class="font-black text-[11px] h-8 overflow-hidden">${p.name}</p>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-[12px] font-black">₹${p.price}</p>
                            ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="border-2 border-green-600 text-green-700 px-4 py-1 rounded-lg text-[10px] font-black uppercase">Add</button>` :
                            `<div class="flex items-center gap-3 bg-green-600 text-white px-2 py-1 rounded-lg">
                                <button onclick="updateQty('${p.id}', -1)" class="text-xs font-black">-</button>
                                <span class="text-[10px] font-black">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="text-xs font-black">+</button>
                            </div>`}
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI();
            if (!document.getElementById('checkout-view').classList.contains('hidden')) showCheckout();
            renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 20}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function showCheckout() {
            const list = document.getElementById('checkout-items');
            list.innerHTML = "";
            let sub = 0;
            Object.keys(cart).forEach(id => {
                const i = cart[id];
                sub += (i.price * i.qty);
                list.innerHTML += `
                    <div class="flex justify-between items-center">
                        <p class="text-xs font-black">${i.name}</p>
                        <div class="flex items-center gap-4 bg-gray-100 px-2 py-1 rounded-lg">
                            <button onclick="updateQty('${id}', -1)" class="text-[10px] font-black px-1">-</button>
                            <span class="text-[10px] font-black">${i.qty}</span>
                            <button onclick="updateQty('${id}', 1)" class="text-[10px] font-black px-1">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('bill-sub').innerText = `₹${sub}`;
            document.getElementById('bill-grand').innerText = `₹${sub + 20}`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            const btn = document.getElementById('confirm-btn');
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('manual-address').value;

            if(!name || !addr) return alert("Please fill details");
            
            btn.disabled = true;
            btn.innerText = "CONFIRMING...";

            const oid = "ORD" + Date.now().toString().slice(-6);
            const total = parseInt(document.getElementById('bill-grand').innerText.replace('₹',''));

            try {
                await db.collection("orders").add({
                    orderId: oid, items: cart, total: total,
                    customer: { name, mobile: "8328016917", landmark: document.getElementById('cust-landmark').value },
                    address: addr, method: paymentMethod, status: "Confirmed",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                localStorage.setItem('active_order', oid);
                
                if(paymentMethod === "UPI") {
                    window.location.href = `upi://pay?pa=g.ashok14@ibl&pn=VillageExpress&am=${total}&cu=INR&tn=${oid}`;
                } else {
                    alert("Order Placed Successfully!");
                    location.reload();
                }
            } catch (e) { alert("Error: " + e.message); btn.disabled = false; }
        }

        function checkActiveOrder() {
            const activeId = localStorage.getItem('active_order');
            if(activeId) {
                document.getElementById('live-status-bar').classList.remove('hidden');
                document.getElementById('active-order-id').innerText = "#" + activeId;
            }
        }

        function openHistory() {
            document.getElementById('profile-view').classList.remove('hidden');
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = `<h3 class="text-[10px] font-black uppercase text-gray-400 mb-4">Past Orders</h3>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-gray-50 p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                            <div>
                                <p class="text-[10px] font-black text-green-600 uppercase mb-1">${d.status}</p>
                                <p class="text-xs font-black">₹${d.total} • ${d.orderId}</p>
                            </div>
                            <a href="tel:${RIDER_PHONE}" class="bg-white border text-green-700 font-black text-[9px] px-3 py-2 rounded-xl uppercase flex items-center gap-1">
                                <i class="fa-solid fa-phone"></i> Call Rider
                            </a>
                        </div>`;
                });
            });
        }

        function setPayment(m) {
            paymentMethod = m;
            document.getElementById('pay-upi').className = m === 'UPI' ? 'flex-1 p-4 border-2 border-blue-100 bg-blue-50/50 rounded-2xl text-center' : 'flex-1 p-4 border-2 border-gray-100 rounded-2xl text-center';
            document.getElementById('pay-cod').className = m === 'COD' ? 'flex-1 p-4 border-2 border-green-100 bg-green-50/50 rounded-2xl text-center' : 'flex-1 p-4 border-2 border-gray-100 rounded-2xl text-center';
        }

        function getCurrentLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
                .then(r => r.json()).then(data => {
                    const area = data.display_name.split(',').slice(0, 3).join(',');
                    document.getElementById('addr-display').innerText = area;
                    document.getElementById('manual-address').value = area;
                });
            });
        }

        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function hideCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
