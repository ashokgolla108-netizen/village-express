<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { background:#F7F9FB; font-family:sans-serif;}
.product-card { background:white; border-radius:20px; padding:12px;}
.hidden { display:none !important;}
</style>
</head>

<body class="pb-32">

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white flex items-center justify-center">
<div class="space-y-4 w-80">
<input id="auth-phone" placeholder="Phone" class="w-full p-3 bg-gray-100 rounded">
<input id="auth-pass" placeholder="Password" class="w-full p-3 bg-gray-100 rounded">
<button onclick="handleAuth()" class="w-full bg-black text-white p-3 rounded">Login</button>
</div>
</div>

<!-- APP -->
<div id="main-app" class="hidden">

<header class="p-4 flex justify-between">
<h2 id="display-name"></h2>
<button onclick="handleLogout()">Logout</button>
</header>

<main id="items-grid" class="grid grid-cols-2 gap-3 p-3"></main>

<button onclick="showPage('orders')" class="fixed bottom-4 left-4 right-4 bg-black text-white p-4 rounded">Orders</button>

<div id="orders-page" class="fixed inset-0 bg-white hidden p-4 overflow-auto">
<h2 class="text-xl mb-4">My Orders</h2>
<div id="orders-history-list"></div>
</div>

</div>

<script>
const RUPEE = "\u20B9";

const firebaseConfig = { apiKey:"AIzaSyAVu8...", projectId:"village-quick-commerce-e27f6"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session'));
let userLat=null,userLng=null,gps="";
let lastCount=0;

window.onload=()=>{ if(currentUser) showMain(); };

function handleAuth(){
let phone=document.getElementById('auth-phone').value;
let pass=document.getElementById('auth-pass').value;

db.collection("users").where("phone","==",phone).where("pass","==",pass).get().then(s=>{
if(!s.empty){
localStorage.setItem('user_session',JSON.stringify(s.docs[0].data()));
location.reload();
}else alert("Invalid");
});
}

function handleLogout(){
localStorage.removeItem('user_session');
location.reload();
}

function showMain(){
document.getElementById('auth-section').classList.add('hidden');
document.getElementById('main-app').classList.remove('hidden');
document.getElementById('display-name').innerText="Hi "+currentUser.name;
}

function showPage(p){
document.getElementById('orders-page').classList.toggle('hidden',p!=='orders');
if(p==='orders') loadOrders();
}

// 📍 GPS
function getGPS(){
navigator.geolocation.getCurrentPosition(p=>{
userLat=p.coords.latitude;
userLng=p.coords.longitude;
gps=userLat+","+userLng;
});
}

// 📏 DISTANCE
function dist(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ⏱ ETA
function eta(km){ return Math.round((km/25)*60); }

// 🔔 sound
const sound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// 🧾 ORDERS
function loadOrders(){
const list=document.getElementById('orders-history-list');

db.collection("orders")
.where("customer.user_id","==",currentUser.phone)
.onSnapshot(snap=>{

if(snap.size>lastCount) sound.play();
lastCount=snap.size;

let html="";

snap.docs
.sort((a,b)=>(b.data().timestamp?.seconds||0)-(a.data().timestamp?.seconds||0))
.forEach(doc=>{

const d=doc.data();
const active=d.status==="OUT FOR DELIVERY";
let distance="",time="";

if(d.riderLocation && userLat){
const km=dist(userLat,userLng,d.riderLocation.lat,d.riderLocation.lng);
distance=km.toFixed(2)+" KM";
time=eta(km)+" mins";
}

html+=`
<div class="bg-white p-4 mb-4 rounded-xl shadow">
<div class="flex justify-between">
<div>
<p>#${d.orderId}</p>
<p>${d.status}</p>
</div>
<p>${RUPEE}${d.total}</p>
</div>

${active && d.riderLocation?`
<iframe width="100%" height="150"
src="https://maps.google.com/maps?q=${d.riderLocation.lat},${d.riderLocation.lng}&z=15&output=embed"></iframe>
`:''}

${distance?`
<div class="flex justify-between text-xs mt-2">
<span>${distance}</span>
<span>${time}</span>
</div>`:''}

${active && d.riderPhone?`
<a href="tel:${d.riderPhone}" class="block bg-green-500 text-white text-center mt-2 p-2 rounded">Call Rider</a>
`:''}

</div>`;
});

list.innerHTML=html;

});
}
</script>

</body>
</html>
