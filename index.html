<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; -webkit-tap-highlight-color: transparent; }
        .product-card { background: white; border-radius: 24px; padding: 12px; border: 1px solid #f1f5f9; }
        .hidden { display: none !important; }
        .animate-pulse-slow { animation: pulse 3s infinite; }
    </style>
</head>

<body class="pb-32">

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">
        <h1 class="text-4xl font-black italic text-green-700 uppercase">
            Village<span class="text-orange-500">Express</span>
        </h1>

        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold mb-4">
        </div>

        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">

        <button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">Login</button>

        <button onclick="toggleAuthMode()" id="toggle-link" class="text-sm font-bold text-slate-500">
            New here? <span class="text-green-600">Create Account</span>
        </button>
    </div>
</div>

<!-- MAIN -->
<div id="main-app" class="hidden">

<header class="p-6 flex justify-between items-center">
    <h2 id="display-name"></h2>
    <button onclick="handleLogout()">Logout</button>
</header>

<main id="items-grid" class="px-4 grid grid-cols-2 gap-4 mt-2"></main>

<button onclick="showPage('orders')" class="fixed bottom-6 left-6 right-6 bg-black text-white p-4 rounded-2xl">
    Orders
</button>

<div id="orders-page" class="fixed inset-0 bg-white hidden p-6 overflow-y-auto">
    <h2 class="text-2xl font-bold mb-4">My Orders</h2>
    <div id="orders-history-list"></div>
</div>

</div>

<script>
const RUPEE = "\u20B9";

const firebaseConfig = {
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
    projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let isSignup = false;

let userLat = null, userLng = null;
let lastOrderCount = 0;

// 🔔 sound
const notifySound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

window.onload = () => {
    if(currentUser) showMainApp();
};

// AUTH
function toggleAuthMode(){
    isSignup = !isSignup;
    document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
}

async function handleAuth(){
    const phone = auth-phone.value;
    const pass = auth-pass.value;

    if(isSignup){
        const name = reg-name.value;
        await db.collection("users").add({name, phone, pass});
    }

    const s = await db.collection("users")
        .where("phone","==",phone)
        .where("pass","==",pass)
        .get();

    if(!s.empty){
        localStorage.setItem('user_session', JSON.stringify(s.docs[0].data()));
        location.reload();
    } else alert("Invalid Login");
}

function handleLogout(){
    localStorage.removeItem('user_session');
    location.reload();
}

// MAIN
function showMainApp(){
    auth-section.classList.add('hidden');
    main-app.classList.remove('hidden');
    display-name.innerText = "Hi, " + currentUser.name;
}

// NAV
function showPage(p){
    orders-page.classList.toggle('hidden', p !== 'orders');
    if(p === 'orders') loadOrderHistory();
}

// GPS
function getGPS(){
    navigator.geolocation.getCurrentPosition(p=>{
        userLat = p.coords.latitude;
        userLng = p.coords.longitude;
    });
}

// DISTANCE
function calculateDistance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ETA
function calculateETA(d){
    return Math.round((d/25)*60);
}

// ORDERS
function loadOrderHistory(){
    db.collection("orders")
    .where("customer.user_id","==",currentUser.phone)
    .onSnapshot(snap=>{

        if(snap.size > lastOrderCount) notifySound.play();
        lastOrderCount = snap.size;

        let html = "";

        snap.docs
        .sort((a,b)=> (b.data().timestamp?.seconds||0)-(a.data().timestamp?.seconds||0))
        .forEach(doc=>{

            const d = doc.data();
            const active = d.status === "OUT FOR DELIVERY";

            let dist="", eta="";

            if(d.riderLocation && userLat){
                const km = calculateDistance(userLat,userLng,d.riderLocation.lat,d.riderLocation.lng);
                dist = km.toFixed(2)+" KM";
                eta = calculateETA(km)+" mins";
            }

            html += `
            <div class="bg-white p-4 mb-4 rounded-2xl shadow">

                <div class="flex justify-between">
                    <div>
                        <p>#${d.orderId}</p>
                        <p>${d.status}</p>
                    </div>
                    <p>${RUPEE}${d.total}</p>
                </div>

                ${active && d.riderLocation ? `
                <iframe width="100%" height="150"
                src="https://maps.google.com/maps?q=${d.riderLocation.lat},${d.riderLocation.lng}&z=15&output=embed"></iframe>
                ` : ''}

                ${dist ? `
                <div class="flex justify-between text-xs mt-2">
                    <span>${dist}</span>
                    <span>${eta}</span>
                </div>` : ''}

                ${active && d.riderPhone ? `
                <a href="tel:${d.riderPhone}" class="block bg-green-500 text-white text-center mt-2 p-2 rounded">
                    Call Rider
                </a>` : ''}

            </div>`;
        });

        document.getElementById('orders-history-list').innerHTML = html;
    });
}
</script>

</body>
</html>
