<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F7F9FB; }
        .hidden { display: none !important; }
    </style>
</head>

<body class="pb-32">

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">
        <h1 class="text-4xl font-black italic text-green-700 uppercase">
            Village<span class="text-orange-500">Express</span>
        </h1>

        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl mb-4">
        </div>

        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl">

        <button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">
            Login
        </button>

        <button onclick="toggleAuthMode()" class="text-sm text-slate-500">
            Create Account
        </button>
    </div>
</div>

<!-- MAIN -->
<div id="main-app" class="hidden p-4">
    <h2 id="display-name" class="font-bold mb-4"></h2>
    <div id="items-grid"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
    projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let isSignup = false;

// AUTO LOGIN
window.onload = () => {
    if(currentUser) showMainApp();
};

// TOGGLE
function toggleAuthMode(){
    isSignup = !isSignup;
    document.getElementById('signup-fields')
        .classList.toggle('hidden', !isSignup);
}

// 🔥 FIXED LOGIN (MAIN CHANGE)
async function handleAuth(){

    const phone = document.getElementById('auth-phone').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();
    const encoded = btoa(pass);

    if(isSignup){

        const name = document.getElementById('reg-name').value.trim();

        if(!name) return alert("Enter name");

        const check = await db.collection("users")
            .where("phone","==",phone).get();

        if(!check.empty) return alert("User already exists");

        const user = { name, phone, pass: encoded };

        await db.collection("users").add(user);

        localStorage.setItem('user_session', JSON.stringify(user));
        location.reload();

    } else {

        const snap = await db.collection("users")
            .where("phone","==",phone).get();

        if(snap.empty) return alert("User not found");

        const user = snap.docs[0].data();

        // ✅ SUPPORT OLD + NEW PASSWORDS
        if(user.pass === pass || user.pass === encoded){

            localStorage.setItem('user_session', JSON.stringify(user));
            location.reload();

        } else {
            alert("Wrong password");
        }
    }
}

// MAIN APP
function showMainApp(){
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');

    document.getElementById('display-name').innerText =
        "Hi, " + currentUser.name;

    loadProducts();
}

// PRODUCTS
function loadProducts(){
    db.collection("products").onSnapshot(snap=>{
        const grid = document.getElementById('items-grid');
        grid.innerHTML = "";

        snap.forEach(doc=>{
            const p = doc.data();
            if(!p.inStock) return;

            grid.innerHTML += `
            <div class="bg-white p-4 mb-2 rounded">
                ${p.name} - ₹${p.price}
            </div>`;
        });
    });
}
</script>

</body>
</html>
