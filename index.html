<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-24">
    <header class="bg-white p-6 border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Village Express</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Admin Panel</p>
        </div>
        <div class="flex gap-2">
            <button onclick="showSection('stats')" class="p-3 bg-slate-100 rounded-xl text-slate-600"><i class="fa-solid fa-chart-line"></i></button>
            <button onclick="showSection('inventory')" class="p-3 bg-slate-100 rounded-xl text-slate-600"><i class="fa-solid fa-boxes-stacked"></i></button>
        </div>
    </header>

    <section id="sec-stats" class="p-4 space-y-4">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
            <p class="text-[10px] font-black opacity-50 uppercase mb-1">Total Sales</p>
            <h2 id="total-revenue" class="text-4xl font-black italic mb-6">₹0</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                <div><p class="text-[9px] font-bold opacity-50 uppercase">Profit (10%)</p><p id="total-profit" class="text-xl font-black text-green-400">₹0</p></div>
                <div><p class="text-[9px] font-bold opacity-50 uppercase">Fees Collected</p><p id="total-fees" class="text-xl font-black text-blue-400">₹0</p></div>
            </div>
        </div>
        <div id="payout-list" class="space-y-3 mt-6"></div>
    </section>

    <section id="sec-inventory" class="p-4 hidden">
        <div class="bg-white p-6 rounded-3xl border mb-6 shadow-sm">
            <h3 class="font-black text-sm uppercase mb-4">Add Item</h3>
            <div class="space-y-3">
                <input type="text" id="p-name" placeholder="Item Name" class="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="p-price" placeholder="Price" class="p-4 bg-slate-50 rounded-2xl text-sm outline-none border">
                    <select id="p-cat" class="p-4 bg-slate-50 rounded-2xl text-sm font-bold border">
                        <option>Vegetables & Fruits</option>
                        <option>Chicken, Meat & Fish</option>
                        <option>Snacks & Drinks</option>
                        <option>Rice & Groceries</option>
                        <option>Others</option>
                    </select>
                </div>
                <input type="text" id="p-img" placeholder="Image URL" class="w-full p-4 bg-slate-50 rounded-2xl text-sm border">
                <button onclick="addProduct()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs">SAVE ITEM</button>
            </div>
        </div>
        <div id="admin-product-list" class="space-y-3"></div>
    </section>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        async function addProduct() {
            const n = document.getElementById('p-name').value, pr = Number(document.getElementById('p-price').value), c = document.getElementById('p-cat').value, im = document.getElementById('p-img').value;
            if(!n || !pr) return alert("Missing Info");
            await db.collection("products").add({ name: n, price: pr, category: c, image: im, inStock: true });
            alert("Added!"); document.getElementById('p-name').value = "";
        }

        db.collection("products").onSnapshot(snap => {
            const list = document.getElementById('admin-product-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex items-center justify-between">
                    <div class="flex items-center gap-3"><img src="${p.image}" class="w-10 h-10 rounded-lg object-cover">
                    <div><p class="text-xs font-black">${p.name}</p><p class="text-[9px] font-bold text-slate-400">₹${p.price} | ${p.category}</p></div></div>
                    <div class="flex gap-2">
                        <button onclick="toggleStock('${doc.id}', ${p.inStock})" class="px-3 py-1 rounded-lg text-[8px] font-black ${p.inStock ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} uppercase">${p.inStock ? 'In Stock' : 'Out'}</button>
                        <button onclick="deleteItem('${doc.id}')" class="p-2 text-slate-300"><i class="fa-solid fa-trash"></i></button>
                    </div></div>`;
            });
        });

        async function toggleStock(id, s) { await db.collection("products").doc(id).update({ inStock: !s }); }
        async function deleteItem(id) { if(confirm("Delete?")) await db.collection("products").doc(id).delete(); }

        db.collection("orders").onSnapshot(snap => {
            let rev = 0, fees = 0;
            snap.forEach(doc => { 
                const d = doc.data(); 
                if(d.status === "DELIVERED") { rev += Number(d.total); fees += 15; }
            });
            document.getElementById('total-revenue').innerText = `₹${rev}`;
            document.getElementById('total-profit').innerText = `₹${((rev-fees)*0.1).toFixed(0)}`;
            document.getElementById('total-fees').innerText = `₹${fees}`;
        });

        function showSection(s) { 
            document.getElementById('sec-stats').classList.toggle('hidden', s !== 'stats');
            document.getElementById('sec-inventory').classList.toggle('hidden', s !== 'inventory');
        }
    </script>
</body>
</html>
