<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FEFDF5; }
        .product-card { transition: 0.1s ease; cursor: pointer; }
        .product-card:active { transform: scale(0.94); }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-section" class="fixed inset-0 bg-white z-[1000] p-8 flex flex-col justify-center">
        <div id="login-view" class="text-center space-y-6">
            <h1 class="text-4xl font-black italic text-green-700">VILLAGE<span class="text-orange-500">EXPRESS</span></h1>
            <input type="tel" id="login-phone" placeholder="Mobile Number" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">LOGIN</button>
            <p class="text-xs font-bold text-slate-400">New User? <button onclick="toggleAuth('reg')" class="text-blue-600 underline">Register</button></p>
        </div>
        <div id="reg-view" class="hidden text-center space-y-4">
            <h1 class="text-2xl font-black">Create Account</h1>
            <input type="text" id="reg-name" placeholder="Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border">
            <input type="tel" id="reg-phone" placeholder="Mobile" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border">
            <button onclick="handleRegister()" class="w-full bg-green-700 text-white p-5 rounded-2xl font-black">REGISTER</button>
            <button onclick="toggleAuth('login')" class="text-xs font-bold text-slate-400 mt-4 underline">Back to Login</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="p-4 sticky top-0 bg-[#FEFDF5] z-50">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Delivery to</p>
                    <h2 id="display-name" class="font-black text-sm">Welcome!</h2>
                </div>
                <button onclick="handleLogout()" class="w-10 h-10 bg-white border rounded-xl shadow-sm text-red-500"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <div class="bg-white border p-3 rounded-xl flex items-center shadow-sm">
                <i class="fa-solid fa-search text-slate-300 mr-3"></i>
                <input type="text" oninput="handleSearch(this.value)" placeholder="Search groceries..." class="flex-1 outline-none text-sm">
            </div>
        </header>

        <main id="items-grid" class="px-4 grid grid-cols-4 gap-y-6 gap-x-2">
            </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-lg">
            <button onclick="showPage('home')" class="flex flex-col items-center text-green-600"><i class="fa-solid fa-home"></i><span class="text-[9px] font-bold uppercase mt-1">Home</span></button>
            <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-bag-shopping"></i><span class="text-[9px] font-bold uppercase mt-1">Orders</span></button>
        </nav>

        <div id="cart-bar" class="fixed bottom-20 left-4 right-4 hidden z-[100]">
            <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-2xl shadow-2xl">
                <div><p id="cart-count" class="text-[9px] font-bold text-slate-400">0 ITEMS</p><p id="cart-total-bar" class="text-xl font-black italic">₹0</p></div>
                <div class="bg-green-600 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter">Review Order</div>
            </button>
        </div>

        <div id="orders-page" class="fixed inset-0 bg-slate-50 z-[200] hidden overflow-y-auto p-6">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('home')" class="w-10 h-10 bg-white rounded-xl shadow-sm"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black text-xl">My Orders</h2>
            </div>
            <div id="orders-history-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[2000] hidden overflow-y-auto p-6">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="closeCheckout()" class="w-10 h-10 bg-slate-100 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-xl italic tracking-tight text-slate-800">Checkout</h2>
        </div>
        <div id="checkout-list" class="space-y-3 bg-slate-50 p-5 rounded-3xl mb-4 border border-slate-100"></div>
        <div class="space-y-4">
            <input type="text" id="order-address" placeholder="Flat / Street / Landmark" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm outline-none">
            <button onclick="getGPS(this)" class="w-full p-4 bg-blue-50 text-blue-600 font-black text-[10px] rounded-2xl border border-blue-100 uppercase">📍 Pin Location (GPS)</button>
            <input type="hidden" id="gps-coords">
            <div id="bill-details" class="p-2 border-t mt-4"></div>
            <button onclick="placeOrder()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest">Confirm & Pay COD</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentUser = null;
        let products = [], cart = {};

        window.onload = () => {
            const saved = localStorage.getItem('user_session');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
                showMainApp();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        };

        // --- AUTH & LOGOUT ---
        async function handleLogin() {
            const p = document.getElementById('login-phone').value.trim();
            const pw = document.getElementById('login-pass').value.trim();
            if(!p || !pw) return alert("Fill details");
            const snap = await db.collection("users").where("phone", "==", p).get();
            if(snap.empty) return alert("No user found");
            const u = snap.docs[0].data();
            if(u.pass === pw) {
                localStorage.setItem('user_session', JSON.stringify(u));
                location.reload();
            } else alert("Wrong password");
        }

        async function handleRegister() {
            const n = document.getElementById('reg-name').value.trim();
            const p = document.getElementById('reg-phone').value.trim();
            const pw = document.getElementById('reg-pass').value.trim();
            if(!n || !p || !pw) return alert("Fill all fields");
            await db.collection("users").add({ name: n, phone: p, pass: pw });
            alert("Account created! Please Login.");
            toggleAuth('login');
        }

        function handleLogout() {
            if(confirm("Logout from Village Express?")) {
                localStorage.removeItem('user_session');
                location.reload();
            }
        }

        // --- APP LOGIC ---
        function showMainApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            db.collection("products").onSnapshot(snap => {
                products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(products);
            });
        }

        function renderItems(list) {
            const grid = document.getElementById('items-grid'); grid.innerHTML = "";
            const categories = ["Vegetables & Fruits", "Chicken, Meat & Fish", "Snacks & Drinks", "Rice & Groceries", "Others"];
            categories.forEach(cat => {
                const filtered = list.filter(p => p.category === cat && p.inStock);
                if(filtered.length > 0) {
                    grid.innerHTML += `<div class="col-span-4 mt-6 font-black text-[10px] text-slate-400 uppercase tracking-widest px-1 border-b pb-1">${cat}</div>`;
                    filtered.forEach(p => {
                        const qty = cart[p.id]?.qty || 0;
                        grid.innerHTML += `
                        <div class="product-card flex flex-col items-center" onclick="updateQty('${p.id}', 1)">
                            <div class="relative w-full aspect-square bg-white rounded-2xl p-2 border border-slate-100 shadow-sm flex items-center justify-center overflow-hidden">
                                <img src="${p.image || ''}" class="max-w-full max-h-full object-contain">
                                ${qty > 0 ? `<div class="absolute -top-1 -right-1 bg-green-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold shadow-md">${qty}</div>`:''}
                            </div>
                            <p class="text-[9px] font-bold mt-2 text-center text-slate-600 line-clamp-1">${p.name}</p>
                            <p class="text-[10px] font-black text-slate-900">₹${p.price}</p>
                        </div>`;
                    });
                }
            });
        }

        function updateQty(id, chg) {
            const p = products.find(x => x.id === id);
            if(!cart[id]) cart[id] = { ...p, qty: 0 };
            cart[id].qty += chg; if(cart[id].qty <= 0) delete cart[id];
            updateCartUI(); renderItems(products);
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 15}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        // --- ORDERING ---
        async function placeOrder() {
            const addr = document.getElementById('order-address').value.trim();
            const gps = document.getElementById('gps-coords').value;
            if(!addr || !gps) return alert("Please confirm address and GPS location");
            
            let sub = 0; Object.values(cart).forEach(i => sub += (i.price * i.qty));
            
            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random()*9000),
                customer: { name: currentUser.name, phone: currentUser.phone },
                address: addr + " | GPS: " + gps,
                items: cart, total: sub + 15, status: "PENDING", 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Placed Successfully!");
            cart = {}; updateCartUI(); closeCheckout(); showPage('orders');
        }

        // --- NAVIGATION ---
        function showPage(page) {
            document.getElementById('orders-page').classList.toggle('hidden', page !== 'orders');
            if(page === 'orders') loadOrderHistory();
        }

        function loadOrderHistory() {
            db.collection("orders").where("customer.phone", "==", currentUser.phone).onSnapshot(snap => {
                const list = document.getElementById('orders-history-list');
                list.innerHTML = "";
                snap.docs.reverse().forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <div><p class="text-[9px] font-black text-slate-300">#${d.orderId}</p><p class="text-xs font-black">${d.status}</p></div>
                            <p class="text-lg font-black italic">₹${d.total}</p>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 line-clamp-1">${Object.values(d.items).map(i => i.name).join(', ')}</p>
                    </div>`;
                });
            });
        }

        function getGPS(btn) { btn.innerText = "Locating..."; navigator.geolocation.getCurrentPosition(p => { document.getElementById('gps-coords').value = p.coords.latitude + "," + p.coords.longitude; btn.innerText = "Location Confirmed ✅"; btn.className = "w-full p-4 bg-green-50 text-green-600 font-black text-[10px] rounded-2xl border border-green-100 uppercase"; }); }
        function openCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; list.innerHTML += `<div class="flex justify-between text-xs font-bold"><span>${i.name} x ${i.qty}</span><span>₹${i.price*i.qty}</span></div>`; });
            document.getElementById('bill-details').innerHTML = `<div class="flex justify-between text-base font-black border-t pt-2"><span>Total (+₹15 Fee)</span><span>₹${sub+15}</span></div>`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function toggleAuth(v) { document.getElementById('login-view').classList.toggle('hidden', v === 'reg'); document.getElementById('reg-view').classList.toggle('hidden', v === 'login'); }
        function handleSearch(v) { renderItems(products.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
