<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .product-card { border: 1px solid #f0f0f0; border-radius: 12px; transition: 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">
    <header class="blinkit-yellow p-4 sticky top-0 z-50">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot"></i>
                <div>
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p class="text-[10px] font-bold">Kalyandurg, Anantapur...</p>
                </div>
            </div>
            <button onclick="showHistory()" class="bg-white/20 p-2 rounded-full"><i class="fa-solid fa-user"></i></button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" placeholder='Search "milk"' class="w-full outline-none text-sm font-medium">
        </div>
    </header>

    <main class="p-4">
        <div class="mb-6">
            <h3 class="font-black text-sm mb-3">Reordering will be easy</h3>
            <div id="recent-items" class="bg-white p-4 rounded-2xl flex items-center justify-between border border-dashed border-gray-300">
                <p class="text-xs text-gray-400 font-medium italic">Items you order will show up here</p>
                <i class="fa-solid fa-basket-shopping text-gray-200 text-3xl"></i>
            </div>
        </div>

        <h3 class="font-black text-sm mb-4">Bestsellers</h3>
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="history-view" class="fixed inset-0 bg-white z-[80] hidden overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex items-center gap-4">
            <button onclick="hideHistory()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Your orders</h2>
        </div>
        <div id="history-list" class="p-4 space-y-4"></div>
    </div>

    <div id="summary-view" class="fixed inset-0 bg-white z-[90] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4">
            <button onclick="hideSummary()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Order summary</h2>
        </div>
        <div id="summary-content" class="p-4"></div>
    </div>

    <script>
        // Use your existing Firebase config
        const config = { apiKey: "AIzaSy...", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        function showHistory() {
            document.getElementById('history-view').classList.remove('hidden');
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm" onclick="viewSummary('${doc.id}')">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h4 class="font-black text-sm">Arrived in 14 minutes</h4>
                                    <p class="text-[10px] text-gray-400 font-bold tracking-tight">₹${d.total} • ${d.timestamp?.toDate().toDateString()}</p>
                                </div>
                                <i class="fa-solid fa-check-circle text-green-500"></i>
                            </div>
                            <div class="flex gap-2 mb-4 overflow-hidden h-12">
                                ${Object.values(d.items).map(i => `<div class="w-12 h-12 bg-gray-50 rounded-lg border border-gray-100"></div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                <button class="flex-1 border-2 border-green-600 text-green-700 font-black text-[10px] py-2 rounded-xl">Reorder</button>
                                <button class="flex-1 border-2 border-gray-100 text-gray-800 font-black text-[10px] py-2 rounded-xl">Rate order</button>
                            </div>
                        </div>`;
                });
            });
        }

        function viewSummary(id) {
            document.getElementById('summary-view').classList.remove('hidden');
            db.collection("orders").doc(id).get().then(doc => {
                const d = doc.data();
                const itemsTotal = d.total - 15 - 5; // Total minus delivery (15) and handling (5)
                document.getElementById('summary-content').innerHTML = `
                    <div class="mb-8">
                        <h3 class="font-black text-xs mb-4 uppercase text-gray-400">Bill details</h3>
                        <div class="space-y-2 text-xs font-bold">
                            <div class="flex justify-between"><span>MRP</span><span>₹${itemsTotal}</span></div>
                            <div class="flex justify-between"><span>Handling charge</span><span>+₹5</span></div>
                            <div class="flex justify-between text-green-600"><span>Delivery charges</span><span>FREE</span></div>
                            <div class="flex justify-between text-slate-800 text-sm font-black pt-2 border-t"><span>Bill total</span><span>₹${d.total}</span></div>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <h3 class="font-black text-[10px] mb-2 uppercase text-gray-400">Order details</h3>
                        <p class="text-[10px] font-bold">Order ID: ${d.orderId}</p>
                        <p class="text-[10px] font-bold">Payment: ${d.payment}</p>
                        <p class="text-[10px] font-bold">Deliver to: ${d.address}</p>
                    </div>`;
            });
        }

        function hideHistory() { document.getElementById('history-view').classList.add('hidden'); }
        function hideSummary() { document.getElementById('summary-view').classList.add('hidden'); }
    </script>
</body>
</html>
