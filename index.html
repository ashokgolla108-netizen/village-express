<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Village Express</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  

    <style>  
        body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F7F9FB;}  
        .product-card { background:white; border-radius:24px; padding:12px; border:1px solid #f1f5f9;}  
        .hidden { display:none !important;}  
    </style>  
</head>  

<body class="pb-32">  

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">  
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">  
        <h1 class="text-4xl font-black italic text-green-700 uppercase">
            Village<span class="text-orange-500">Express</span>
        </h1>  

        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl font-bold mb-4">
        </div>  

        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">  
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">  

        <button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">
            Login
        </button>  

        <button onclick="toggleAuthMode()" class="text-sm font-bold text-slate-500">
            New here? <span class="text-green-600">Create Account</span>
        </button>  
    </div>  
</div>  

<!-- MAIN -->
<div id="main-app" class="hidden">  

<header class="p-6 flex justify-between">
    <h2 id="display-name"></h2>
    <button onclick="handleLogout()">Logout</button>
</header>

<main id="items-grid" class="grid grid-cols-2 gap-4 p-4"></main>

<div id="cart-bar" class="fixed bottom-4 left-4 right-4 hidden">
    <button onclick="openCheckout()" class="w-full bg-black text-white p-4 rounded-xl flex justify-between">
        <span id="cart-count"></span>
        <span id="cart-total-bar"></span>
    </button>
</div>

</div>

<!-- CHECKOUT -->
<div id="checkout-view" class="hidden fixed inset-0 bg-white p-6">
    <input id="order-name" placeholder="Name">
    <input id="order-phone" placeholder="Phone">
    <input id="order-addr" placeholder="Address">
    <button onclick="getGPS(this)">📍 Get Location</button>

    <div id="checkout-list"></div>
    <div id="bill-details"></div>

    <button onclick="placeOrder(this)">Place Order</button>
</div>

<script>

const RUPEE = "₹";
const DELIVERY_FEE = 15;

const firebaseConfig = {  
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",  
    projectId: "village-quick-commerce-e27f6"  
};  

firebase.initializeApp(firebaseConfig);  
const db = firebase.firestore();  

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;  
let cart = {}, gps = "", isSignup = false;  

window.onload = () => {  
    if(currentUser) showMainApp();  
};  

function toggleAuthMode() {  
    isSignup = !isSignup;  
    document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);  
}  

/* ✅ LOGIN FIXED */
async function handleAuth() {  
    const phone = document.getElementById('auth-phone').value.trim();  
    const pass = document.getElementById('auth-pass').value.trim();  

    if(!phone || !pass){
        alert("Enter phone & password");
        return;
    }

    if(isSignup) {  
        const name = document.getElementById('reg-name').value.trim();  

        if(!name){
            alert("Enter name");
            return;
        }

        const user = { name, phone, pass };  

        try {
            await db.collection("users").add(user);  
            loginUser(user);  
        } catch(e){
            alert("Signup error");
        }

    } else {  
        try {
            const s = await db.collection("users")
                .where("phone","==",phone)
                .get();  

            if(s.empty){
                alert("User not found");
                return;
            }

            const user = s.docs[0].data();

            if(user.pass !== pass){
                alert("Wrong password");
                return;
            }

            loginUser(user);

        } catch(e){
            alert("Login error");
        }
    }  
}  

function loginUser(u) {  
    localStorage.setItem('user_session', JSON.stringify(u));  
    location.reload();  
}  

function handleLogout() {  
    localStorage.removeItem('user_session');  
    location.reload();  
}  

function showMainApp() {  
    document.getElementById('auth-section').classList.add('hidden');  
    document.getElementById('main-app').classList.remove('hidden');  
    document.getElementById('display-name').innerText = "Hi, " + currentUser.name;  
    renderCategories();  
}  

/* FIX DUPLICATE LOAD */
function renderCategories() {  
    const grid = document.getElementById('items-grid');  
    grid.innerHTML = "";  

    db.collection("categories").get().then(snap => {  
        snap.forEach(doc => {  
            grid.innerHTML += `
                <div onclick="renderProducts('${doc.id}')" class="product-card text-center">
                    ${doc.data().name}
                </div>`;
        });  
    });  
}  

function renderProducts(catId) {  
    const grid = document.getElementById('items-grid');  
    grid.innerHTML = "";  

    db.collection("products")
    .where("categoryId", "==", catId)
    .get()
    .then(snap => {  
        snap.forEach(doc => {  
            const p = { id: doc.id, ...doc.data() };  
            const qty = cart[p.id]?.qty || 0;  

            grid.innerHTML += `
                <div class="product-card text-center">
                    <p>${p.name}</p>
                    <p>${RUPEE}${p.price}</p>

                    ${
                        qty === 0 
                        ? `<button onclick="updateQty('${p.id}',1)">Add</button>`
                        : `<div>
                            <button onclick="updateQty('${p.id}',-1)">-</button>
                            ${qty}
                            <button onclick="updateQty('${p.id}',1)">+</button>
                           </div>`
                    }
                </div>`;
        });  
    });  
}  

function updateQty(id, chg) {  
    db.collection("products").doc(id).get().then(doc => {  
        if(!cart[id]) cart[id] = { ...doc.data(), id, qty: 0 };  
        cart[id].qty += chg;  

        if(cart[id].qty <= 0) delete cart[id];  

        updateCartUI();  
    });  
}  

function updateCartUI() {  
    let sub = 0, count = 0;  

    Object.values(cart).forEach(i => {  
        sub += i.price * i.qty;  
        count += i.qty;  
    });  

    document.getElementById('cart-bar').classList.toggle('hidden', count === 0);  
    document.getElementById('cart-total-bar').innerText = RUPEE + (sub + DELIVERY_FEE);  
    document.getElementById('cart-count').innerText = count + " items";  
}  

function openCheckout() {  
    document.getElementById('checkout-view').classList.remove('hidden');  

    order-name.value = currentUser.name;  
    order-phone.value = currentUser.phone;  

    let sub = 0;  
    checkout-list.innerHTML = "";  

    Object.values(cart).forEach(i => {  
        sub += i.price * i.qty;  
        checkout-list.innerHTML += `<p>${i.name} x ${i.qty}</p>`;  
    });  

    bill-details.innerHTML = `
        Subtotal: ${RUPEE}${sub}<br>
        Delivery: ${RUPEE}${DELIVERY_FEE}<br>
        Total: ${RUPEE}${sub + DELIVERY_FEE}`;
}  

/* GPS FIX */
function getGPS(btn) {  
    navigator.geolocation.getCurrentPosition(
        p => {
            gps = p.coords.latitude + "," + p.coords.longitude;
            btn.innerText = "Location Fixed ✅";
        },
        () => {
            alert("Allow location access");
        }
    );
}  

/* SAFE ORDER */
async function placeOrder(btn) {  

    if(Object.keys(cart).length === 0){
        alert("Cart empty");
        return;
    }

    if(!gps){
        alert("Fix GPS");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Placing...";

    let sub = 0;  
    Object.values(cart).forEach(i => sub += i.price * i.qty);  

    try {
        await db.collection("orders").add({  
            customer: currentUser,  
            items: cart,  
            total: sub + DELIVERY_FEE,  
            gps,  
            status: "PENDING",  
            timestamp: firebase.firestore.FieldValue.serverTimestamp()  
        });  

        alert("Order placed!");  

        cart = {};  
        updateCartUI();  
        checkout-view.classList.add('hidden');  

    } catch(e) {  
        alert("Error placing order");  
        btn.disabled = false;
        btn.innerText = "Place Order";
    }  
}  

</script>  

</body>  
</html>
