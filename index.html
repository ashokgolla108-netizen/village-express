<body class="pb-32">  

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">  
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">  
        <h1 class="text-4xl font-black italic text-green-700 uppercase">
            Village<span class="text-orange-500">Express</span>

        <div id="signup-fields" class="hidden">

        <button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase">

        </button>  

        <button onclick="toggleAuthMode()" class="text-sm font-bold text-slate-500">

        </button>  
    </div>  
</div>  

<!-- MAIN -->
<div id="main-app" class="hidden">  

<header class="p-6 flex justify-between">

    </button>
</div>

</div>

</div>
