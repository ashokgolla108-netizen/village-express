<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express - Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-900 pb-32">

    <div id="auth-overlay" class="fixed inset-0 bg-white z-[2000] p-6 hidden">
        <div id="login-view" class="space-y-6 pt-10 text-center">
            <h1 class="text-4xl font-black italic text-green-800">Village Express</h1>
            <input type="tel" id="login-phone" placeholder="Mobile Number" class="w-full p-4 border rounded-2xl">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 border rounded-2xl">
            <button onclick="handleLogin()" class="w-full bg-green-700 text-white p-4 rounded-2xl font-black">LOGIN</button>
            <button onclick="showAuth('register')" class="text-xs font-bold text-blue-600 uppercase">Create Account</button>
        </div>
        <div id="register-view" class="hidden space-y-4">
            <h2 class="text-2xl font-black italic">Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-2xl">
            <input type="tel" id="reg-phone" placeholder="Mobile Number" class="w-full p-4 border rounded-2xl">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 border rounded-2xl">
            <button onclick="handleRegister()" class="w-full bg-green-700 text-white p-4 rounded-2xl font-black">SIGN UP</button>
            <button onclick="showAuth('login')" class="w-full text-xs font-bold text-gray-400 mt-4 uppercase">Back</button>
        </div>
    </div>

    <header class="glass sticky top-0 z-[100] p-4 border-b border-slate-100">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-green-700 italic">VILLAGE<span class="text-orange-500">EXPRESS</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kalyandurg Delivery</p>
            </div>
            <button onclick="openProfile()" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-600">
                <i class="fa-solid fa-user-circle text-xl"></i>
            </button>
        </div>
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" oninput="handleSearch(this.value)" placeholder="Search items..." 
                   class="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-11 pr-4 text-sm outline-none">
        </div>
    </header>

    <main class="p-4">
        <div id="items-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-8 left-4 right-4 z-[100] hidden">
        <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-[2rem] shadow-2xl">
            <div class="flex items-center gap-3 pl-2">
                <div class="text-left">
                    <p id="cart-count" class="text-[10px] font-bold text-slate-400 uppercase">0 Items</p>
                    <p id="cart-total-bar" class="text-lg font-black italic">₹0</p>
                </div>
            </div>
            <span class="bg-green-600 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-wider">Proceed <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[150] hidden overflow-y-auto p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="closeCheckout()" class="text-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-xl italic">Checkout</h2>
        </div>
        
        <div id="checkout-items-list" class="space-y-3 bg-slate-50 p-5 rounded-3xl mb-6 border border-slate-100"></div>
        
        <div class="space-y-5">
            <div>
                <p class="text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Delivery Location</p>
                <button onclick="getPreciseGPS(this)" class="w-full text-xs font-black text-blue-600 bg-blue-50 py-4 rounded-2xl border border-blue-200 mb-3">📍 TAP TO GET CURRENT LOCATION</button>
                <input type="text" id="order-building" placeholder="House No / Landmark" class="w-full p-4 border rounded-2xl mb-2">
                <textarea id="order-address" readonly class="w-full p-4 border rounded-2xl bg-slate-100 italic text-[10px] text-slate-500"></textarea>
            </div>
            
            <div>
                <p class="text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Payment</p>
                <select id="payment-method" class="w-full p-4 border rounded-2xl bg-white font-bold text-sm">
                    <option value="COD">Cash on Delivery</option>
                    <option value="UPI">UPI / PhonePe / GPay</option>
                </select>
            </div>

            <div id="final-bill" class="border-t pt-4 space-y-2"></div>
            <button onclick="placeOrder()" class="w-full bg-green-800 text-white p-5 rounded-[2rem] font-black text-lg shadow-xl mt-4">CONFIRM ORDER</button>
        </div>
    </div>

    <div id="profile-view" class="fixed inset-0 bg-[#F8F9FB] z-[150] hidden overflow-y-auto">
        <div class="p-4 glass flex items-center justify-between border-b sticky top-0">
            <div class="flex items-center gap-4">
                <button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black italic">Recent Orders</h2>
            </div>
            <button onclick="handleLogout()" class="text-red-500 text-[10px] font-black uppercase">Logout</button>
        </div>
        <div id="history-list" class="p-4 space-y-4"></div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let allProducts = [], cart = {};

        window.onload = () => { if(!currentUser) showAuth('login'); else initApp(); };

        function showAuth(v) { 
            document.getElementById('auth-overlay').classList.remove('hidden');
            document.getElementById('login-view').classList.toggle('hidden', v !== 'login');
            document.getElementById('register-view').classList.toggle('hidden', v !== 'register');
        }

        async function handleLogin() {
            const p = document.getElementById('login-phone').value, pw = document.getElementById('login-pass').value;
            const s = await db.collection("users").where("phone","==",p).where("pass","==",pw).get();
            if(s.empty) return alert("Invalid Credentials");
            currentUser = s.docs[0].data();
            localStorage.setItem('user_session', JSON.stringify(currentUser));
            location.reload();
        }

        async function handleRegister() {
            const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value, pw = document.getElementById('reg-pass').value;
            if(!n || !p || !pw) return alert("Fill all fields");
            await db.collection("users").add({ name:n, phone:p, pass:pw });
            alert("Account Created!"); showAuth('login');
        }

        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }

        function initApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            db.collection("products").onSnapshot(snap => { 
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
                renderItems(allProducts); 
            });
            loadHistory();
        }

        function renderItems(list) {
            const grid = document.getElementById('items-grid'); grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-slate-100 flex flex-col items-center text-center">
                        <div class="w-full aspect-square bg-slate-50 rounded-[1.5rem] mb-3 flex items-center justify-center overflow-hidden">
                            <img src="${p.image || ''}" class="w-3/4 h-3/4 object-contain">
                        </div>
                        <h3 class="font-bold text-[11px] text-slate-600 uppercase truncate w-full px-2">${p.name}</h3>
                        <p class="text-lg font-black text-slate-900 mb-3">₹${p.price}</p>
                        ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="w-full py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-green-700">ADD</button>` :
                            `<div class="w-full flex items-center justify-between bg-green-700 text-white p-1 rounded-xl">
                                <button onclick="updateQty('${p.id}', -1)" class="w-8 h-8 flex items-center justify-center font-black">-</button>
                                <span class="font-black text-xs">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="w-8 h-8 flex items-center justify-center font-black">+</button>
                            </div>`}
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: Number(p.price), qty: 0 };
            cart[id].qty += change; 
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI(); renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 15}`; // ₹15 Delivery Fee
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function getPreciseGPS(btn) {
            btn.innerText = "Locating...";
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6), lon = pos.coords.longitude.toFixed(6);
                document.getElementById('order-address').value = `${lat}, ${lon}`;
                btn.innerText = "Location Fixed ✅";
            }, err => alert("Please allow GPS access"), { enableHighAccuracy: true });
        }

        async function placeOrder() {
            const b = document.getElementById('order-building').value, a = document.getElementById('order-address').value;
            if(!b || !a) return alert("Enter House No and GPS Location");
            
            let sub = 0; Object.values(cart).forEach(i => sub += i.price * i.qty);
            
            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random() * 9000),
                customer: { name: currentUser.name, phone: currentUser.phone, user_phone: currentUser.phone },
                address: `${b}, GPS: ${a}`,
                items: cart,
                total: sub + 15,
                payment: document.getElementById('payment-method').value,
                status: "PENDING",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Placed Successfully!"); cart = {}; updateCartUI(); closeCheckout(); openProfile();
        }

        function loadHistory() {
            db.collection("orders").where("customer.user_phone", "==", currentUser.phone).orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list'); list.innerHTML = "";
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">#${d.orderId}</span>
                                <span class="px-3 py-1 bg-green-50 text-green-700 rounded-full text-[9px] font-black uppercase tracking-tighter">${d.status}</span>
                            </div>
                            <p class="text-[10px] font-bold text-slate-400 mb-1">Items: ${Object.values(d.items).map(i => i.name).join(', ')}</p>
                            <div class="flex justify-between items-end mt-4">
                                <div><p class="text-xs font-black">₹${d.total}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${d.payment}</p></div>
                                ${d.status === 'ACCEPTED' ? `<button onclick="window.open('tel:${d.riderPhone}')" class="bg-blue-600 text-white p-2 px-4 rounded-xl text-[9px] font-black">CALL RIDER</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        function openCheckout() {
            const listDiv = document.getElementById('checkout-items-list'); listDiv.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => {
                sub += (i.price * i.qty);
                listDiv.innerHTML += `<div class="flex justify-between font-bold text-[11px] text-slate-600"><span>${i.name} x${i.qty}</span><span>₹${i.price * i.qty}</span></div>`;
            });
            document.getElementById('final-bill').innerHTML = `
                <div class="flex justify-between text-slate-400 text-xs font-bold"><span>Subtotal</span><span>₹${sub}</span></div>
                <div class="flex justify-between text-slate-400 text-xs font-bold"><span>Delivery Fee</span><span>₹15</span></div>
                <div class="flex justify-between text-lg font-black pt-2 border-t mt-2"><span>Total Pay</span><span>₹${sub+15}</span></div>`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
