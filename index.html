<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-cat { border-color: #15803d; background-color: #f0fdf4; color: #15803d; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">
    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot"></i>
                <div onclick="getLocation()">
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p id="addr-display" class="text-[10px] font-bold">Tap to set location in Kalyandurg...</p>
                </div>
            </div>
            <button onclick="showHistory()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search "tomato" or "milk"' class="w-full outline-none text-sm font-medium">
        </div>
    </header>

    <section class="bg-white border-b sticky top-[125px] z-40 overflow-x-auto hide-scroll flex gap-2 p-4">
        <button onclick="filterItems('All')" id="cat-All" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase active-cat">All</button>
        <button onclick="filterItems('Vegetables')" id="cat-Vegetables" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Vegetables</button>
        <button onclick="filterItems('Fruits')" id="cat-Fruits" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Fruits</button>
        <button onclick="filterItems('Dairy')" id="cat-Dairy" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Dairy & Milk</button>
        <button onclick="filterItems('Meat')" id="cat-Meat" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Meat & Fish</button>
        <button onclick="filterItems('Snacks')" id="cat-Snacks" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Snacks</button>
    </section>

    <main class="p-4">
        <h3 id="view-title" class="font-black text-sm mb-4">Fresh Items</h3>
        <div id="items-grid" class="grid grid-cols-2 gap-3">
            </div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-50 hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-4 rounded-2xl font-black shadow-2xl items-center animate-bounce">
            <div class="text-left">
                <p id="cart-count" class="text-[10px] opacity-80 uppercase">0 ITEMS</p>
                <p id="cart-total-bar" class="text-sm">₹0</p>
            </div>
            <span class="text-xs">PROCEED TO CART <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        let allProducts = [];
        let cart = {};

        window.onload = () => {
            // Listen to all products once
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts); 
            });
        };

        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            if(list.length === 0) {
                grid.innerHTML = `<p class="col-span-2 text-center py-10 text-gray-400 text-xs">No items found in this category.</p>`;
                return;
            }
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 shadow-sm flex flex-col justify-between">
                        <div class="aspect-square rounded-xl mb-3 overflow-hidden bg-gray-50 flex items-center justify-center">
                            <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-contain p-2">
                        </div>
                        <div>
                            <p class="font-black text-[11px] h-8 overflow-hidden mb-1">${p.name}</p>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-[12px] font-black">₹${p.price}</p>
                                <button onclick="addToCart('${p.id}','${p.name}',${p.price})" class="border-2 border-green-600 text-green-700 px-4 py-1 rounded-lg text-[10px] font-black uppercase active:bg-green-600 active:text-white">Add</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterItems(cat) {
            // Update UI buttons
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            document.getElementById('cat-' + cat).classList.add('active-cat');
            document.getElementById('view-title').innerText = cat === 'All' ? 'Fresh Items' : cat;

            // Filter logic
            if(cat === 'All') {
                renderItems(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderItems(filtered);
            }
        }

        function handleSearch(val) {
            const searchVal = val.toLowerCase();
            const results = allProducts.filter(p => p.name.toLowerCase().includes(searchVal));
            renderItems(results);
        }

        function addToCart(id, name, price) {
            cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { name, price, qty: 1 };
            updateCartUI();
        }

        function updateCartUI() {
            let sub = 0; let count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`; // Adding Handling fee
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }
        
        // Include your existing getLocation, showCheckout, and placeOrder functions here...
    </script>
</body>
</html>
