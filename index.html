<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; -webkit-tap-highlight-color: transparent; }
        .product-card { background: white; border-radius: 24px; padding: 12px; border: 1px solid #f1f5f9; }
        .hidden { display: none !important; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>

<body class="pb-32">

<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">
        <h1 class="text-4xl font-black italic text-green-700 uppercase">Village<span class="text-orange-500">Express</span></h1>

        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold mb-4">
        </div>

        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">

        <button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl uppercase">Login</button>

        <button onclick="toggleAuthMode()" class="text-sm font-bold text-slate-500">
            New here? <span class="text-green-600">Create Account</span>
        </button>
    </div>
</div>

<div id="main-app" class="hidden">

<header class="p-6 sticky top-0 bg-[#F7F9FB]/90 backdrop-blur-md z-50 flex justify-between items-center">
    <div>
        <p class="text-[9px] font-black text-slate-400 uppercase">Delivery to</p>
        <h2 id="display-name" class="font-black text-sm text-slate-900">User</h2>
    </div>
    <button onclick="handleLogout()" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center">
        <i class="fa-solid fa-power-off"></i>
    </button>
</header>

<main id="items-grid" class="px-4 grid grid-cols-2 gap-4 mt-2"></main>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-2xl">
    <button onclick="renderCategories()" class="flex flex-col items-center text-green-600">
        <i class="fa-solid fa-house text-xl"></i>
        <span class="text-[10px] font-black mt-1 uppercase">Home</span>
    </button>

    <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300">
        <i class="fa-solid fa-bag-shopping text-xl"></i>
        <span class="text-[10px] font-black mt-1 uppercase">Orders</span>
    </button>
</nav>

<div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-[100]">
    <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-5 rounded-[2rem] shadow-2xl">
        <div>
            <p id="cart-count" class="text-[9px] font-black opacity-50">0 Items</p>
            <p id="cart-total-bar" class="text-xl font-black">₹0</p>
        </div>
        <div class="bg-green-600 px-6 py-2 rounded-2xl text-[10px] font-black uppercase">
            Review Order
        </div>
    </button>
</div>

<div id="checkout-view" class="fixed inset-0 bg-white z-[4000] hidden overflow-y-auto p-6">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="closeCheckout()" class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h2 class="font-black text-xl">Checkout</h2>
    </div>

    <div id="checkout-list" class="space-y-3"></div>

    <div id="bill-details" class="mt-6"></div>

    <button onclick="placeOrder()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black mt-6">
        Place Order
    </button>
</div>

</div>

<script>
const RUPEE = "\u20B9";

const firebaseConfig = {
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
    projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let cart = {};

window.onload = () => { if(currentUser) showMainApp(); };

function handleAuth() {
    const phone = document.getElementById('auth-phone').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();

    db.collection("users")
    .where("phone","==",phone)
    .where("pass","==",pass)
    .get()
    .then(s => {
        if(!s.empty){
            localStorage.setItem('user_session', JSON.stringify(s.docs[0].data()));
            location.reload();
        } else {
            alert("Invalid Login");
        }
    });
}

function showMainApp() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
    renderProducts();
}

function renderProducts() {
    const grid = document.getElementById('items-grid');
    grid.innerHTML = "";

    db.collection("products").onSnapshot(snap => {
        snap.forEach(doc => {
            const p = doc.data();
            const id = doc.id;
            const qty = cart[id]?.qty || 0;

            grid.innerHTML += `
            <div class="product-card text-center">
                <p class="text-sm font-bold">${p.name}</p>
                <p class="text-lg font-black">${RUPEE}${p.price}</p>

                ${qty === 0
                    ? `<button onclick="updateQty('${id}',1)" class="bg-black text-white px-4 py-2 rounded">Add</button>`
                    : `<div class="flex justify-center gap-2">
                        <button onclick="updateQty('${id}',-1)">-</button>
                        <span>${qty}</span>
                        <button onclick="updateQty('${id}',1)">+</button>
                      </div>`
                }
            </div>`;
        });
    });
}

function updateQty(id, chg) {
    db.collection("products").doc(id).get().then(doc => {
        if(!cart[id]) cart[id] = { ...doc.data(), qty: 0 };
        cart[id].qty += chg;
        if(cart[id].qty <= 0) delete cart[id];
        updateCartUI();
    });
}

function updateCartUI() {
    let total = 0, count = 0;

    Object.values(cart).forEach(i => {
        total += i.price * i.qty;
        count += i.qty;
    });

    document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
    document.getElementById('cart-total-bar').innerText = `${RUPEE}${total}`;
    document.getElementById('cart-count').innerText = `${count} Items`;
}

function openCheckout() {
    const list = document.getElementById('checkout-list');
    list.innerHTML = "";

    let total = 0;

    Object.values(cart).forEach(i => {
        total += i.price * i.qty;

        list.innerHTML += `
        <div class="flex justify-between">
            <span>${i.name} x ${i.qty}</span>
            <span>${RUPEE}${i.price * i.qty}</span>
        </div>`;
    });

    document.getElementById('bill-details').innerHTML =
        `<h2 class="text-xl font-bold">Total: ${RUPEE}${total}</h2>`;

    document.getElementById('checkout-view').classList.remove('hidden');
}

function closeCheckout(){
    document.getElementById('checkout-view').classList.add('hidden');
}

function placeOrder(){
    alert("Order placed!");
}
</script>

</body>
</html>
