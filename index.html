<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express - User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <div id="auth-overlay" class="fixed inset-0 bg-white z-[2000] p-6 hidden">
        <div id="login-view" class="space-y-6 pt-10 text-center">
            <h1 class="text-4xl font-black italic text-green-800">Village Express</h1>
            <input type="tel" id="login-phone" placeholder="Mobile Number" class="w-full p-4 border rounded-xl">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 border rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-green-700 text-white p-4 rounded-xl font-black">LOGIN</button>
            <button onclick="showAuth('register')" class="text-xs font-bold text-blue-600 uppercase">Create Account</button>
        </div>
        <div id="register-view" class="hidden space-y-4">
            <h2 class="text-2xl font-black italic">Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-xl">
            <input type="tel" id="reg-phone" placeholder="Mobile Number" class="w-full p-4 border rounded-xl">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 border rounded-xl">
            <button onclick="handleRegister()" class="w-full bg-green-700 text-white p-4 rounded-xl font-black">SIGN UP</button>
            <button onclick="showAuth('login')" class="w-full text-xs font-bold text-gray-400 mt-4 uppercase">Back</button>
        </div>
    </div>

    <div id="main-app">
        <header class="bg-[#F7CB45] p-4 sticky top-0 z-50 shadow-sm">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-lg font-black italic">Village Express</h1>
                <button onclick="openProfile()" class="bg-white/30 p-2 rounded-full w-10 h-10"><i class="fa-solid fa-user"></i></button>
            </div>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Search items..." class="rounded-xl border-none shadow-inner bg-white/90 p-3 w-full outline-none">
        </header>

        <main class="p-4"><div id="items-grid" class="grid grid-cols-2 gap-4"></div></main>

        <div id="checkout-view" class="fixed inset-0 bg-white z-[150] hidden overflow-y-auto p-5">
            <div class="flex items-center gap-4 mb-6"><button onclick="closeCheckout()"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black">Confirm Order</h2></div>
            
            <div id="checkout-items-list" class="space-y-2 bg-gray-50 p-4 rounded-2xl mb-4 border"></div>
            
            <div class="space-y-4">
                <p class="text-[10px] font-black uppercase text-slate-400">Delivery Details</p>
                <button onclick="getPreciseGPS(this)" class="w-full text-xs font-black text-blue-600 bg-blue-50 py-4 rounded-xl border border-blue-200">📍 CLICK TO FETCH GPS LOCATION</button>
                <input type="text" id="order-building" placeholder="Door No / House Name" class="w-full p-4 border rounded-xl">
                <textarea id="order-address" placeholder="Coordinates will appear here..." rows="2" readonly class="w-full p-4 border rounded-xl bg-gray-100 italic text-xs"></textarea>
                
                <p class="text-[10px] font-black uppercase text-slate-400">Payment Method</p>
                <select id="payment-method" class="w-full p-4 border rounded-xl bg-white font-bold">
                    <option value="COD">Cash on Delivery (COD)</option>
                    <option value="UPI">UPI / Online</option>
                </select>

                <div id="final-bill" class="border-t pt-4 space-y-2 font-bold text-sm"></div>
                <button onclick="placeOrder()" class="w-full bg-green-800 text-white p-5 rounded-2xl font-black text-lg shadow-xl">PLACE ORDER</button>
            </div>
        </div>

        <div id="profile-view" class="fixed inset-0 bg-gray-50 z-[100] hidden overflow-y-auto">
            <div class="p-4 border-b flex items-center justify-between bg-white sticky top-0">
                <div class="flex items-center gap-4"><button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black italic">My Orders</h2></div>
                <button onclick="handleLogout()" class="text-red-500 text-[10px] font-black uppercase">Logout</button>
            </div>
            <div id="history-list" class="p-4 space-y-4"></div>
        </div>

        <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
            <button onclick="openCheckout()" class="w-full bg-green-800 text-white flex justify-between p-5 rounded-2xl font-black shadow-2xl items-center">
                <div class="text-left"><p id="cart-count" class="text-[9px] opacity-70">0 ITEMS</p><p id="cart-total-bar" class="text-lg">₹0</p></div>
                <span class="text-xs uppercase bg-white/20 px-3 py-1 rounded-lg">Proceed <i class="fa-solid fa-chevron-right ml-1"></i></span>
            </button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let allProducts = [], cart = {};

        window.onload = () => { if(!currentUser) showAuth('login'); else initApp(); };

        function showAuth(v) { 
            document.getElementById('auth-overlay').style.display = 'block';
            document.getElementById('login-view').classList.toggle('hidden', v !== 'login');
            document.getElementById('register-view').classList.toggle('hidden', v !== 'register');
        }

        async function handleLogin() {
            const p = document.getElementById('login-phone').value, pw = document.getElementById('login-pass').value;
            const s = await db.collection("users").where("phone","==",p).where("pass","==",pw).get();
            if(s.empty) return alert("Login Failed");
            currentUser = s.docs[0].data();
            localStorage.setItem('user_session', JSON.stringify(currentUser));
            location.reload();
        }

        async function handleRegister() {
            const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value, pw = document.getElementById('reg-pass').value;
            await db.collection("users").add({ name:n, phone:p, pass:pw });
            alert("Success!"); showAuth('login');
        }

        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }

        function initApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            db.collection("products").onSnapshot(snap => { 
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
                renderItems(allProducts); 
            });
            loadHistory();
        }

        function renderItems(list) {
            const grid = document.getElementById('items-grid'); grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 shadow-sm">
                        <div class="aspect-square bg-slate-50 rounded-xl mb-2 flex items-center justify-center overflow-hidden"><img src="${p.image || ''}" class="w-full h-full object-contain p-2"></div>
                        <p class="font-black text-[11px] truncate uppercase text-slate-600">${p.name}</p>
                        <div class="flex justify-between items-center mt-1">
                            <p class="text-[14px] font-black">₹${p.price}</p>
                            ${qty === 0 ? `<button onclick="updateQty('${p.id}', 1)" class="border border-green-700 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black">ADD</button>` :
                            `<div class="flex items-center gap-2 bg-green-700 text-white px-2 py-1 rounded-lg font-black text-[10px]">
                                <button onclick="updateQty('${p.id}', -1)">-</button><span>${qty}</span><button onclick="updateQty('${p.id}', 1)">+</button>
                            </div>`}
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: Number(p.price), qty: 0 };
            cart[id].qty += change; 
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI(); renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function getPreciseGPS(btn) {
            btn.innerText = "Finding you...";
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6), lon = pos.coords.longitude.toFixed(6);
                document.getElementById('order-address').value = `GPS: ${lat}, ${lon}`;
                btn.innerText = "GPS Fixed ✅";
            }, err => alert("Enable Location Permissions"), { enableHighAccuracy: true });
        }

        async function placeOrder() {
            const b = document.getElementById('order-building').value, a = document.getElementById('order-address').value;
            const pay = document.getElementById('payment-method').value;
            if(!b || !a) return alert("Add Address and GPS Location");
            
            let sub = 0; Object.values(cart).forEach(i => sub += i.price * i.qty);
            
            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random() * 9000),
                customer: { name: currentUser.name, phone: currentUser.phone, user_phone: currentUser.phone },
                address: `${b}, ${a}`,
                items: cart,
                total: sub + 5,
                payment: pay,
                status: "PENDING",
                riderId: null, // Clear for now
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Sent!"); cart = {}; updateCartUI(); closeCheckout(); openProfile();
        }

        function loadHistory() {
            db.collection("orders").where("customer.user_phone", "==", currentUser.phone).onSnapshot(snap => {
                const list = document.getElementById('history-list'); list.innerHTML = "";
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    const isAccepted = (d.status === "ACCEPTED");
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border shadow-sm mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-black text-gray-400">#${d.orderId}</span>
                                <span class="font-black text-green-700 italic">${d.status}</span>
                            </div>
                            ${isAccepted ? `
                                <div class="bg-blue-50 p-4 rounded-2xl mb-3 border border-blue-100 flex justify-between items-center">
                                    <div><p class="text-[10px] font-black text-blue-400">RIDER ASSIGNED</p><p class="font-black text-sm">${d.riderName}</p></div>
                                    <button onclick="trackRider('${d.riderId}')" class="bg-blue-600 text-white p-2 px-4 rounded-xl text-[10px] font-black">TRACK LIVE</button>
                                </div>
                            ` : ''}
                            <p class="text-xs font-bold text-gray-500">${d.address}</p>
                            <div class="mt-2 text-sm font-black">Total: ₹${d.total} (${d.payment})</div>
                        </div>`;
                });
            });
        }

        async function trackRider(riderId) {
            const r = await db.collection("riders").doc(riderId).get();
            const data = r.data();
            window.open(`https://www.google.com/maps/search/?api=1&query=${data.lat},${data.lng}`, '_blank');
        }

        function openCheckout() {
            const listDiv = document.getElementById('checkout-items-list'); listDiv.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => {
                sub += (i.price * i.qty);
                listDiv.innerHTML += `<div class="flex justify-between font-bold text-xs uppercase"><span>${i.name} x${i.qty}</span><span>₹${i.price * i.qty}</span></div>`;
            });
            document.getElementById('final-bill').innerHTML = `<div class="flex justify-between text-gray-400"><span>Items</span><span>₹${sub}</span></div><div class="flex justify-between text-gray-400"><span>Delivery</span><span>₹5</span></div><div class="flex justify-between text-lg pt-2"><span>Total</span><span>₹${sub+5}</span></div>`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
