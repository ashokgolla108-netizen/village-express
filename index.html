<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; -webkit-tap-highlight-color: transparent; }
        .product-card { background: white; border-radius: 24px; padding: 12px; border: 1px solid #f1f5f9; transition: all 0.2s; }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-section" class="fixed inset-0 bg-white z-[2000] p-8 flex flex-col justify-center">
        <div class="text-center space-y-6 max-w-sm mx-auto w-full">
            <h1 class="text-4xl font-black italic text-green-700 uppercase">Village<span class="text-orange-500">Express</span></h1>
            <div id="signup-fields" class="hidden space-y-4">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            </div>
            <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl">LOGIN</button>
            <button onclick="toggleAuthMode()" id="toggle-text" class="text-sm font-bold text-slate-500">New here? <span class="text-green-600">Create Account</span></button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-6 sticky top-0 bg-[#F7F9FB]/95 backdrop-blur-md z-50 flex justify-between items-center">
            <div><p class="text-[10px] font-black text-slate-400 uppercase">Delivery to</p><h2 id="display-name" class="font-black text-sm text-slate-900">Hi, User</h2></div>
            <button onclick="handleLogout()" class="text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <main id="items-grid" class="px-4 grid grid-cols-2 gap-4 mt-2"></main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-2xl">
            <button onclick="renderCategories()" class="flex flex-col items-center text-green-600"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold mt-1">HOME</span></button>
            <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-bag-shopping text-xl"></i><span class="text-[10px] font-bold mt-1">ORDERS</span></button>
        </nav>

        <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-[100]">
            <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-2xl shadow-2xl">
                <div class="text-left"><p id="cart-count" class="text-[10px] font-bold opacity-60">0 ITEMS</p><p id="cart-total-bar" class="text-xl font-black">₹0</p></div>
                <div class="bg-green-600 px-6 py-2 rounded-xl text-xs font-black uppercase">Review Order</div>
            </button>
        </div>

        <div id="orders-page" class="fixed inset-0 bg-slate-50 z-[200] hidden overflow-y-auto p-6 pb-32">
            <div class="flex items-center gap-4 mb-6"><button onclick="showPage('home')" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black text-2xl">Orders</h2></div>
            <div id="orders-history-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[2000] hidden overflow-y-auto p-6">
        <div class="flex items-center gap-4 mb-6"><button onclick="closeCheckout()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black text-xl">Review Order</h2></div>
        
        <div class="space-y-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-3xl space-y-3">
                <p class="text-[10px] font-black text-slate-400 uppercase px-2">Contact Details</p>
                <input type="text" id="order-name" placeholder="Name" class="w-full p-4 bg-white rounded-2xl text-sm border-none shadow-sm outline-none">
                <input type="tel" id="order-phone" placeholder="Mobile Number" class="w-full p-4 bg-white rounded-2xl text-sm border-none shadow-sm outline-none">
                <input type="text" id="order-addr" placeholder="Address / Landmark" class="w-full p-4 bg-white rounded-2xl text-sm border-none shadow-sm outline-none">
                <button onclick="getGPS(this)" class="w-full p-4 bg-blue-50 text-blue-600 font-black text-[10px] rounded-2xl border border-blue-100 uppercase">📍 Confirm GPS</button>
            </div>

            <div id="checkout-list" class="space-y-2"></div>

            <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white">
                <p class="text-[10px] font-black opacity-40 uppercase mb-4">Payment Method</p>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="setPayment('CASH')" id="pay-cash" class="py-4 rounded-2xl border border-white/10 font-black text-xs bg-white/5">CASH</button>
                    <button onclick="setPayment('UPI')" id="pay-upi" class="py-4 rounded-2xl border border-white/10 font-black text-xs bg-white/5">UPI</button>
                </div>
                <div id="bill-details" class="space-y-2 border-t border-white/10 pt-4"></div>
                <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black shadow-xl mt-6 uppercase tracking-widest">Place Order</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let cart = {}, gps = "", isSignup = false, paymentMethod = "CASH";

        window.onload = () => { if(currentUser) showMainApp(); };

        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
            document.getElementById('auth-btn').innerText = isSignup ? "CREATE ACCOUNT" : "LOGIN";
        }

        async function handleAuth() {
            const phone = document.getElementById('auth-phone').value;
            const pass = document.getElementById('auth-pass').value;
            if(isSignup) {
                const name = document.getElementById('reg-name').value;
                const user = { name, phone, pass };
                await db.collection("users").add(user);
                loginUser(user);
            } else {
                const s = await db.collection("users").where("phone","==",phone).get();
                if(!s.empty && s.docs[0].data().pass === pass) loginUser(s.docs[0].data());
                else alert("Check details");
            }
        }

        function loginUser(u) { localStorage.setItem('user_session', JSON.stringify(u)); currentUser = u; location.reload(); }

        function showMainApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
            renderCategories();
        }

        function renderCategories() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<p class="col-span-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Categories</p>`;
            db.collection("categories").onSnapshot(snap => {
                snap.forEach(doc => {
                    grid.innerHTML += `<div onclick="renderProducts('${doc.id}', '${doc.data().name}')" class="product-card flex flex-col items-center justify-center gap-2"><div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-xl"><i class="fa-solid fa-layer-group"></i></div><p class="text-[10px] font-black text-center uppercase">${doc.data().name}</p></div>`;
                });
            });
        }

        function renderProducts(catId, name) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<div class="col-span-2 flex items-center gap-2 mb-4"><button onclick="renderCategories()" class="text-[10px] font-black text-green-600 uppercase">Back</button><span class="text-[10px] font-black text-slate-300 uppercase">/ ${name}</span></div>`;
            db.collection("products").where("categoryId", "==", catId).onSnapshot(snap => {
                snap.forEach(doc => {
                    const p = { id: doc.id, ...doc.data() };
                    if(!p.inStock) return;
                    const qty = cart[p.id]?.qty || 0;
                    grid.innerHTML += `
                    <div class="product-card text-center">
                        <div class="w-full aspect-square flex items-center justify-center text-3xl text-slate-200 mb-2"><i class="fa-solid ${p.icon || 'fa-box'}"></i></div>
                        <p class="text-[10px] font-bold text-slate-500 truncate px-2">${p.name}</p>
                        <p class="text-sm font-black text-slate-900 mb-3">₹${p.price}</p>
                        ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="w-full py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase">Add</button>` :
                            `<div class="flex items-center justify-between bg-green-600 text-white rounded-xl p-1">
                                <button onclick="updateQty('${p.id}', -1)" class="qty-btn bg-white/20"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                <span class="text-xs font-black">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="qty-btn bg-white/20"><i class="fa-solid fa-plus text-[10px]"></i></button>
                            </div>`
                        }
                    </div>`;
                });
            });
        }

        function updateQty(id, chg) {
            db.collection("products").doc(id).get().then(doc => {
                if(!cart[id]) cart[id] = { ...doc.data(), id: doc.id, qty: 0 };
                cart[id].qty += chg;
                if(cart[id].qty <= 0) delete cart[id];
                updateCartUI();
                if(!document.getElementById('checkout-view').classList.contains('hidden')) openCheckout();
            });
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 15}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function setPayment(m) {
            paymentMethod = m;
            document.getElementById('pay-cash').className = m === 'CASH' ? 'py-4 rounded-2xl border border-green-500 font-black text-xs bg-green-500/10 text-green-500' : 'py-4 rounded-2xl border border-white/10 font-black text-xs bg-white/5';
            document.getElementById('pay-upi').className = m === 'UPI' ? 'py-4 rounded-2xl border border-green-500 font-black text-xs bg-green-500/10 text-green-500' : 'py-4 rounded-2xl border border-white/10 font-black text-xs bg-white/5';
        }

        function openCheckout() {
            document.getElementById('order-name').value = currentUser.name;
            document.getElementById('order-phone').value = currentUser.phone;
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => {
                sub += i.price * i.qty;
                list.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="text-xs font-bold text-slate-700">${i.name}</div>
                    <div class="flex items-center gap-4"><button onclick="updateQty('${i.id}', -1)" class="text-slate-400"><i class="fa-solid fa-minus text-[10px]"></i></button><span class="text-xs font-black">${i.qty}</span><button onclick="updateQty('${i.id}', 1)" class="text-green-600"><i class="fa-solid fa-plus text-[10px]"></i></button></div>
                </div>`;
            });
            document.getElementById('bill-details').innerHTML = `<div class="flex justify-between font-black text-lg"><span>Total Payable</span><span>₹${sub+15}</span></div>`;
            setPayment('CASH');
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            if(!gps) return alert("Confirm GPS First");
            let sub = 0; Object.values(cart).forEach(i => sub += (i.price * i.qty));
            const total = sub + 15;
            
            if(paymentMethod === 'UPI') {
                window.location.href = `upi://pay?pa=8328016917-3@ybl&pn=VillageExpress&am=${total}&cu=INR`;
            }

            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random()*8999),
                customer: { name: document.getElementById('order-name').value, phone: document.getElementById('order-phone').value, user_id: currentUser.phone },
                address: document.getElementById('order-addr').value + " | GPS: " + gps, items: cart, total: total, status: "PENDING", payment: paymentMethod,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Success!"); location.reload();
        }

        function loadOrderHistory() {
            const list = document.getElementById('orders-history-list');
            db.collection("orders").where("customer.user_id", "==", currentUser.phone).onSnapshot(snap => {
                if(snap.empty) return list.innerHTML = `<p class="text-center py-20 text-slate-400 font-bold text-[10px]">NO ORDERS YET</p>`;
                let html = "";
                snap.docs.sort((a,b) => (b.data().timestamp?.seconds || 0) - (a.data().timestamp?.seconds || 0)).forEach(doc => {
                    const d = doc.data();
                    html += `<div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div><span class="text-[9px] font-black text-slate-300 uppercase">#${d.orderId}</span><h3 class="text-sm font-black text-green-600">${d.status}</h3></div>
                            <span class="font-black text-xl">₹${d.total}</span>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${d.payment}</p>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }

        function getGPS(btn) { navigator.geolocation.getCurrentPosition(p => { gps = p.coords.latitude + "," + p.coords.longitude; btn.innerText = "LOCATION FIXED ✅"; btn.className = "w-full p-4 bg-green-50 text-green-600 font-black rounded-2xl border border-green-100 text-[10px]"; }, null, {enableHighAccuracy:true}); }
        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }
        function showPage(p) { document.getElementById('orders-page').classList.toggle('hidden', p !== 'orders'); if(p === 'orders') loadOrderHistory(); }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
    </script>
</body>
</html>
