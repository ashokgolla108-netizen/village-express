<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-slate-100 p-4">

<!-- AUTH -->
<div id="auth" class="max-w-sm mx-auto bg-white p-6 rounded-xl shadow">
    <h2 class="font-bold text-lg mb-4 text-center">Village Express</h2>

    <input id="name" placeholder="Name (signup only)" class="p-3 border w-full mb-2 hidden">
    <input id="phone" placeholder="Phone" class="p-3 border w-full mb-2">
    <input id="pass" type="password" placeholder="Password" class="p-3 border w-full mb-2">

    <button onclick="handleAuth()" class="bg-black text-white p-3 w-full mb-2">Login</button>
    <button onclick="toggleMode()" class="text-sm text-blue-600 w-full">Create Account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
    <div class="flex justify-between items-center mb-4">
        <h2 id="welcome" class="font-bold text-lg"></h2>
        <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>
    </div>

    <div id="items"></div>

    <button onclick="placeOrder()" class="bg-green-600 text-white p-3 w-full mt-4 rounded">
        Place Order
    </button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
    projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let isSignup = false;
let user = JSON.parse(localStorage.getItem("user_session")) || null;
let cart = JSON.parse(localStorage.getItem("cart")) || {};

// AUTO LOGIN
if(user) init();

// TOGGLE MODE
function toggleMode(){
    isSignup = !isSignup;
    document.getElementById("name").classList.toggle("hidden", !isSignup);
}

// AUTH FUNCTION (FIXED)
async function handleAuth(){

    const phone = document.getElementById("phone").value.trim();
    const pass = document.getElementById("pass").value.trim();
    const name = document.getElementById("name").value.trim();

    if(!phone || !pass) return alert("Fill all fields");

    const encodedPass = btoa(pass);

    if(isSignup){

        if(!name) return alert("Enter name");

        const check = await db.collection("users")
            .where("phone","==",phone)
            .get();

        if(!check.empty) return alert("User already exists");

        const newUser = {
            name,
            phone,
            pass: encodedPass // always save encoded
        };

        await db.collection("users").add(newUser);

        localStorage.setItem("user_session", JSON.stringify(newUser));
        alert("Account created");
        location.reload();

    } else {

        const snap = await db.collection("users")
            .where("phone","==",phone)
            .get();

        if(snap.empty) return alert("User not found");

        const userData = snap.docs[0].data();

        // ✅ SUPPORT OLD + NEW PASSWORDS
        if(userData.pass === pass || userData.pass === encodedPass){

            user = userData;
            localStorage.setItem("user_session", JSON.stringify(user));

            alert("Login success");
            location.reload();

        } else {
            alert("Wrong password");
        }
    }
}

// INIT APP
function init(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("welcome").innerText = "Hi " + user.name;

    loadProducts();
}

// LOAD PRODUCTS
function loadProducts(){
    db.collection("products").onSnapshot(snap=>{
        let html="";

        snap.forEach(doc=>{
            const p = doc.data();
            if(!p.inStock) return;

            const qty = cart[doc.id]?.qty || 0;

            html += `
            <div class="bg-white p-3 mb-2 flex justify-between items-center rounded">
                <div>
                    <p class="font-bold">${p.name}</p>
                    <p>₹${p.price}</p>
                </div>

                ${
                    qty === 0
                    ? `<button onclick="update('${doc.id}',${p.price},'${p.name}',1)" class="bg-black text-white px-3 py-1 rounded">Add</button>`
                    : `<div class="flex gap-2 items-center">
                        <button onclick="update('${doc.id}',${p.price},'${p.name}',-1)">-</button>
                        ${qty}
                        <button onclick="update('${doc.id}',${p.price},'${p.name}',1)">+</button>
                      </div>`
                }
            </div>`;
        });

        document.getElementById("items").innerHTML = html;
    });
}

// CART UPDATE
function update(id,price,name,chg){
    if(!cart[id]) cart[id] = {qty:0,price,name};

    cart[id].qty += chg;

    if(cart[id].qty <= 0) delete cart[id];

    localStorage.setItem("cart", JSON.stringify(cart));
}

// PLACE ORDER
function placeOrder(){

    let total = 0;

    Object.values(cart).forEach(i=>{
        total += i.qty * i.price;
    });

    if(total === 0) return alert("Cart empty");

    db.collection("orders").add({
        customer: user,
        items: cart,
        total,
        status: "PENDING",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Order placed successfully");

    cart = {};
    localStorage.removeItem("cart");
}

// LOGOUT
function logout(){
    localStorage.removeItem("user_session");
    location.reload();
}
</script>

</body>
</html>
