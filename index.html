<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .auth-screen { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 24px; }
        .auth-screen.active { display: block !important; }
        input, textarea, select { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; background: #f8fafc; outline: none; margin-bottom: 10px; font-weight: 600; }
        .btn-primary { background: #15803d; color: white; font-weight: 900; text-transform: uppercase; padding: 16px; border-radius: 16px; width: 100%; }
        #main-app { display: none; }
        #main-app.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <div id="auth-overlay" class="auth-screen">
        <div id="login-view" class="space-y-6 pt-10 text-center">
            <h1 class="text-4xl font-black italic text-green-800">Village Express</h1>
            <input type="tel" id="login-phone" placeholder="Mobile Number">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()" class="btn-primary">Login</button>
            <button onclick="showAuth('register')" class="text-[10px] font-black text-blue-600 mt-4 uppercase">Create Account</button>
        </div>
        <div id="register-view" class="hidden space-y-4">
            <h2 class="text-2xl font-black italic">Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="tel" id="reg-phone" placeholder="Mobile Number">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="handleRegister()" class="btn-primary">Sign Up</button>
            <button onclick="showAuth('login')" class="w-full text-xs font-black text-gray-400 mt-4 uppercase tracking-widest">Back</button>
        </div>
    </div>

    <div id="main-app">
        <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-lg font-black italic"><i class="fa-solid fa-bolt mr-2"></i>Village Express</h1>
                <button onclick="openProfile()" class="bg-white/30 p-2 rounded-full w-10 h-10 border border-white/20"><i class="fa-solid fa-user"></i></button>
            </div>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Search items..." class="rounded-xl border-none shadow-inner bg-white/90 p-3 w-full">
        </header>

        <main class="p-4"><div id="items-grid" class="grid grid-cols-2 gap-4"></div></main>

        <div id="checkout-view" class="fixed inset-0 bg-white z-[150] hidden overflow-y-auto p-5">
            <div class="flex items-center gap-4 mb-6"><button onclick="closeCheckout()"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black">Checkout</h2></div>
            <div id="checkout-items-list" class="space-y-3 mb-6"></div>
            <p class="text-[10px] font-black uppercase text-slate-400 mb-2">Delivery Location</p>
            <button onclick="getPreciseGPS(this)" class="w-full text-xs font-black text-blue-600 bg-blue-50 py-3 rounded-xl border border-blue-200 mb-2">📍 Fetch GPS Location</button>
            <input type="text" id="order-building" placeholder="Door No / House Name">
            <textarea id="order-address" placeholder="Coordinates" rows="2" readonly class="bg-gray-100 italic text-xs"></textarea>
            <button onclick="placeOrder()" class="btn-primary mt-4">Place Order</button>
        </div>

        <div id="profile-view" class="fixed inset-0 bg-gray-50 z-[100] hidden overflow-y-auto">
            <div class="p-4 border-b flex items-center justify-between bg-white sticky top-0">
                <div class="flex items-center gap-4"><button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black italic">My Orders</h2></div>
                <button onclick="handleLogout()" class="text-red-500 text-[10px] font-black uppercase">Logout</button>
            </div>
            <div id="history-list" class="p-4 space-y-4"></div>
        </div>

        <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
            <button onclick="openCheckout()" class="w-full bg-green-800 text-white flex justify-between p-5 rounded-2xl font-black shadow-2xl items-center">
                <div class="text-left"><p id="cart-count" class="text-[9px] opacity-70">0 ITEMS</p><p id="cart-total-bar" class="text-lg">₹0</p></div>
                <span class="text-xs uppercase bg-white/20 px-3 py-1 rounded-lg">View Cart <i class="fa-solid fa-chevron-right ml-1"></i></span>
            </button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let allProducts = [], cart = {};

        window.onload = () => { if(!currentUser) showAuth('login'); else initApp(); };

        function showAuth(v) { 
            document.getElementById('auth-overlay').classList.add('active');
            document.getElementById('login-view').classList.toggle('hidden', v !== 'login');
            document.getElementById('register-view').classList.toggle('hidden', v !== 'register');
        }

        async function handleLogin() {
            const p = document.getElementById('login-phone').value, pw = document.getElementById('login-pass').value;
            const s = await db.collection("users").where("phone","==",p).where("pass","==",pw).get();
            if(s.empty) return alert("Wrong credentials");
            currentUser = s.docs[0].data();
            localStorage.setItem('user_session', JSON.stringify(currentUser));
            location.reload();
        }

        async function handleRegister() {
            const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value, pw = document.getElementById('reg-pass').value;
            await db.collection("users").add({ name:n, phone:p, pass:pw });
            alert("Registered!"); showAuth('login');
        }

        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }

        function initApp() {
            document.getElementById('auth-overlay').classList.remove('active');
            document.getElementById('main-app').classList.add('active');
            db.collection("products").onSnapshot(snap => { 
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
                renderItems(allProducts); 
            });
            loadHistory();
        }

        function renderItems(list) {
            const grid = document.getElementById('items-grid'); grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 shadow-sm">
                        <div class="aspect-square bg-slate-50 rounded-xl mb-2"><img src="${p.image || ''}" class="w-full h-full object-contain"></div>
                        <p class="font-black text-[11px] truncate uppercase">${p.name}</p>
                        <div class="flex justify-between items-center mt-1">
                            <p class="text-[14px] font-black">₹${p.price}</p>
                            ${qty === 0 ? `<button onclick="updateQty('${p.id}', 1)" class="border border-green-700 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black">ADD</button>` :
                            `<div class="flex items-center gap-2 bg-green-700 text-white px-2 py-1 rounded-lg font-black text-[10px]">
                                <button onclick="updateQty('${p.id}', -1)">-</button><span>${qty}</span><button onclick="updateQty('${p.id}', 1)">+</button>
                            </div>`}
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: Number(p.price), qty: 0 };
            cart[id].qty += change; 
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI(); renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function getPreciseGPS(btn) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6), lon = pos.coords.longitude.toFixed(6);
                document.getElementById('order-address').value = `GPS: ${lat}, ${lon}\nLocation: Precise Pin`;
                btn.innerHTML = "GPS Locked ✅";
            }, err => alert("Please enable GPS"), { enableHighAccuracy: true });
        }

        async function placeOrder() {
            const b = document.getElementById('order-building').value, a = document.getElementById('order-address').value;
            if(!b || !a) return alert("Fetch Location First");
            let sub = 0; Object.values(cart).forEach(i => sub += i.price * i.qty);
            await db.collection("orders").add({
                orderId: "ORD" + Date.now().toString().slice(-6),
                customer: { name: currentUser.name, phone: currentUser.phone, user_phone: currentUser.phone },
                address: `${b}, ${a}`,
                items: cart,
                total: sub + 5,
                status: "PENDING",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Placed!"); cart = {}; updateCartUI(); closeCheckout(); openProfile();
        }

        // LIVE RIDER TRACKING FOR USER
        async function trackRider(riderId) {
            const riderDoc = await db.collection("riders").doc(riderId).get();
            const r = riderDoc.data();
            if(r.lat && r.lng) {
                window.open(`https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`, '_blank');
            } else {
                alert("Rider's GPS is off");
            }
        }

        function loadHistory() {
            db.collection("orders").where("customer.user_phone", "==", currentUser.phone).onSnapshot(snap => {
                const list = document.getElementById('history-list'); list.innerHTML = "";
                const docs = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp);
                docs.forEach(doc => {
                    const d = doc.data();
                    const isAccepted = (d.status === "ACCEPTED");
                    
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border shadow-sm">
                            <div class="flex justify-between items-center border-b pb-4 mb-4">
                                <div><p class="text-[9px] font-black text-gray-400">#${d.orderId}</p><p class="text-lg font-black text-green-700 uppercase italic">${d.status}</p></div>
                                <p class="font-black">₹${d.total}</p>
                            </div>
                            
                            ${isAccepted ? `
                                <div class="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                                    <p class="text-[9px] font-black text-blue-400 uppercase mb-2">Assigned Rider</p>
                                    <div class="flex justify-between items-center">
                                        <div><p class="font-black text-slate-800">${d.riderName || 'Rider'}</p><p class="text-[10px] font-bold text-slate-500">${d.riderPhone || ''}</p></div>
                                        <button onclick="trackRider('${d.riderId}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                                            <i class="fa-solid fa-person-biking mr-1"></i> Track Live
                                        </button>
                                    </div>
                                </div>
                            ` : ''}

                            <p class="text-[10px] text-gray-500 font-bold uppercase leading-tight">${d.address}</p>
                        </div>`;
                });
            });
        }

        function openCheckout() { 
            const listDiv = document.getElementById('checkout-items-list'); listDiv.innerHTML = "";
            Object.values(cart).forEach(i => listDiv.innerHTML += `<div class="flex justify-between font-bold text-xs"><span>${i.name} x${i.qty}</span><span>₹${i.price * i.qty}</span></div>`);
            document.getElementById('checkout-view').classList.remove('hidden'); 
        }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
