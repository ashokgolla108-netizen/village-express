<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; -webkit-tap-highlight-color: transparent; }
        .product-card { background: white; border-radius: 24px; padding: 14px; border: 1px solid #f1f5f9; }
        .hidden { display: none !important; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .loading-spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #10b981; height: 28px; width: 28px; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
    <div class="text-center space-y-6 max-w-sm mx-auto w-full">
        <h1 class="text-4xl font-black italic text-green-700 uppercase">Village<span class="text-orange-500">Express</span></h1>
        <div id="signup-fields" class="hidden"><input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold mb-4"></div>
        <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-bold">
        <button id="auth-btn" onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl uppercase flex items-center justify-center gap-3">
            Login
            <div id="auth-spinner" class="loading-spinner hidden"></div>
        </button>
        <button type="button" onclick="toggleAuthMode()" id="toggle-link" class="text-sm font-bold text-slate-500">New here? <span class="text-green-600">Create Account</span></button>
    </div>
</div>

<div id="main-app" class="hidden">
    <header class="p-6 sticky top-0 bg-[#F7F9FB]/90 backdrop-blur-md z-50 flex justify-between items-center">
        <div><p class="text-[9px] font-black text-slate-400 uppercase">Delivery to</p><h2 id="display-name" class="font-black text-base text-slate-900">User</h2></div>
        <button onclick="handleLogout()" class="w-11 h-11 rounded-xl bg-red-50 text-red-500 flex items-center justify-center text-lg"><i class="fa-solid fa-power-off"></i></button>
    </header>

    <main id="items-grid" class="px-4 grid grid-cols-2 gap-4 mt-2 min-h-[60vh]"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-2xl">
        <button onclick="renderCategories()" class="flex flex-col items-center text-green-600">
            <i class="fa-solid fa-house text-2xl"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Home</span>
        </button>
        <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300 relative">
            <i class="fa-solid fa-bag-shopping text-2xl"></i>
            <span id="orders-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold rounded-full px-1.5 min-w-[18px] h-5 flex items-center justify-center hidden">0</span>
            <span class="text-[10px] font-black mt-1 uppercase">Orders</span>
        </button>
    </nav>

    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-[100]">
        <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-5 rounded-[2rem] shadow-2xl text-lg">
            <div class="text-left">
                <p id="cart-count" class="text-xs font-black opacity-70">0 Items</p>
                <p id="cart-total-bar" class="text-2xl font-black">₹0</p>
            </div>
            <div class="bg-green-600 px-8 py-3 rounded-2xl text-sm font-black uppercase">Review Order</div>
        </button>
    </div>

    <div id="orders-page" class="fixed inset-0 bg-slate-50 z-[200] hidden overflow-y-auto p-6 pb-40">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showPage('home')" class="w-11 h-11 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-2xl">My Orders</h2>
        </div>
        <div id="orders-history-list" class="space-y-5"></div>
    </div>
</div>

<div id="checkout-view" class="fixed inset-0 bg-white z-[4000] hidden overflow-y-auto p-6 pb-40">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="closeCheckout()" class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-xmark"></i></button>
        <h2 class="font-black text-xl">Checkout</h2>
    </div>
    <div class="space-y-6">
        <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 space-y-5">
            <input type="text" id="order-name" placeholder="Full Name" class="w-full p-5 bg-white rounded-2xl text-base font-bold outline-none border border-slate-200 shadow-sm">
            <input type="tel" id="order-phone" placeholder="Mobile Number" class="w-full p-5 bg-white rounded-2xl text-base font-bold outline-none border border-slate-200 shadow-sm">
            <input type="text" id="order-addr" placeholder="House / Street / Landmark" class="w-full p-5 bg-white rounded-2xl text-base font-bold outline-none border border-slate-200 shadow-sm">
            <button onclick="getGPS(this)" id="gps-btn" class="w-full p-5 bg-blue-50 text-blue-700 font-black text-base rounded-2xl border border-blue-200 active:bg-blue-100 transition">📍 Confirm GPS Location</button>
        </div>

        <div id="checkout-list" class="space-y-4"></div>

        <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="setPayment('CASH')" id="pay-cash" class="py-5 rounded-2xl border-2 font-black text-base active:scale-95 transition">CASH</button>
                <button onclick="setPayment('UPI')" id="pay-upi" class="py-5 rounded-2xl border-2 font-black text-base active:scale-95 transition">UPI</button>
            </div>
            <div id="bill-details" class="space-y-3 border-t border-white/20 pt-6 mb-8 text-lg"></div>
            <button id="place-order-btn" onclick="placeOrder()" class="w-full bg-green-600 text-white py-7 rounded-3xl font-black text-lg shadow-xl uppercase tracking-wide active:scale-95 transition flex items-center justify-center gap-3">
                Place Order
                <div id="place-spinner" class="loading-spinner hidden"></div>
            </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Enable offline persistence (good for village areas)
    db.enablePersistence().catch(err => console.warn("Persistence failed:", err));

    let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let gps = localStorage.getItem('last_gps') || "";
    let isSignup = false;
    let paymentMethod = "CASH";
    let placingOrder = false;

    window.onload = () => {
        updateCartUI(); // restore cart count on reload
        if (currentUser) showMainApp();
    };

    // ─── Auth ────────────────────────────────────────────────────────────────
    function toggleAuthMode() {
        isSignup = !isSignup;
        document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
    }

    async function handleAuth() {
        const phone = document.getElementById('auth-phone').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        if (!phone || !pass) return alert("Mobile number and password required");

        const btn = document.getElementById('auth-btn');
        const spinner = document.getElementById('auth-spinner');
        btn.disabled = true;
        spinner.classList.remove('hidden');

        try {
            if (isSignup) {
                const name = document.getElementById('reg-name').value.trim();
                if (!name) throw new Error("Full name required");
                const user = { name, phone, pass };
                await db.collection("users").add(user);
                loginUser(user);
            } else {
                const snap = await db.collection("users")
                    .where("phone", "==", phone)
                    .where("pass", "==", pass)
                    .get();
                if (snap.empty) throw new Error("Invalid mobile or password");
                loginUser(snap.docs[0].data());
            }
        } catch (err) {
            alert(err.message || "Something went wrong. Try again.");
            console.error(err);
        } finally {
            btn.disabled = false;
            spinner.classList.add('hidden');
        }
    }

    function loginUser(u) {
        localStorage.setItem('user_session', JSON.stringify(u));
        location.reload();
    }

    function handleLogout() {
        if (confirm("Logout?")) {
            localStorage.removeItem('user_session');
            localStorage.removeItem('cart');
            location.reload();
        }
    }

    function showMainApp() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('display-name').innerText = "Hi, " + (currentUser.name || "User");
        renderCategories();
    }

    // ─── Shop ────────────────────────────────────────────────────────────────
    function renderCategories() {
        const grid = document.getElementById('items-grid');
        grid.innerHTML = `<div class="col-span-2 py-10 text-center text-slate-400 font-bold">Loading categories...</div>`;

        db.collection("categories").onSnapshot(snap => {
            grid.innerHTML = `<p class="col-span-2 text-[10px] font-black text-slate-400 uppercase mt-4">Browse</p>`;
            if (snap.empty) {
                grid.innerHTML += `<div class="col-span-2 py-12 text-center text-slate-500">No categories found</div>`;
                return;
            }
            snap.forEach(doc => {
                grid.innerHTML += `<div onclick="renderProducts('\( {doc.id}', ' \){doc.data().name}')" class="product-card flex flex-col items-center justify-center gap-3 py-8 shadow-sm active:scale-95 transition">
                    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-3xl text-slate-300"><i class="fa-solid fa-layer-group"></i></div>
                    <p class="text-xs font-black text-center uppercase">${doc.data().name}</p>
                </div>`;
            });
        }, err => {
            grid.innerHTML = `<div class="col-span-2 py-12 text-center text-red-600">Error loading categories. Check internet.</div>`;
            console.error(err);
        });
    }

    function renderProducts(catId, name) {
        const grid = document.getElementById('items-grid');
        grid.innerHTML = `<div class="col-span-2 flex items-center gap-3 mb-5">
            <button onclick="renderCategories()" class="text-green-700 font-black text-sm uppercase flex items-center gap-2"><i class="fa-solid fa-chevron-left"></i> Back</button>
            <h3 class="font-bold text-lg">${name}</h3>
        </div>
        <div id="products-loading" class="col-span-2 py-10 text-center flex flex-col items-center gap-3">
            <div class="loading-spinner w-10 h-10 border-4"></div>
            <p class="text-slate-500">Loading products...</p>
        </div>`;

        db.collection("products").where("categoryId", "==", catId).onSnapshot(snap => {
            document.getElementById('products-loading')?.remove();
            if (snap.empty) {
                grid.innerHTML += `<div class="col-span-2 py-16 text-center text-slate-500 font-medium">No products available in this category</div>`;
                return;
            }
            snap.forEach(doc => {
                const p = { id: doc.id, ...doc.data() };
                if (!p.inStock) return;
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `<div class="product-card text-center flex flex-col justify-between shadow-md active:scale-[0.98] transition">
                    <div>
                        <div class="w-full aspect-square flex items-center justify-center text-5xl text-slate-200 mb-3"><i class="fa-solid ${p.icon || 'fa-box'}"></i></div>
                        <p class="text-sm font-bold text-slate-600">${p.name}</p>
                        <p class="text-lg font-black text-slate-900 mt-1">₹${p.price.toLocaleString('en-IN')}</p>
                    </div>
                    \( {qty === 0 ? `<button onclick="updateQty(' \){p.id}', 1)" class="mt-4 w-full py-4 bg-slate-900 text-white rounded-xl text-sm font-black uppercase tracking-wide active:bg-slate-800">Add to Cart</button>` :
                      `<div class="mt-4 flex items-center justify-between bg-green-600 text-white rounded-xl p-2 shadow-lg">
                        <button onclick="updateQty('${p.id}', -1)" class="w-10 h-10 flex items-center justify-center bg-white/20 rounded-lg text-lg font-black">-</button>
                        <span class="font-black text-lg">${qty}</span>
                        <button onclick="updateQty('${p.id}', 1)" class="w-10 h-10 flex items-center justify-center bg-white/20 rounded-lg text-lg font-black">+</button>
                      </div>`}
                </div>`;
            });
        }, err => {
            grid.innerHTML += `<div class="col-span-2 py-12 text-center text-red-600">Error loading products</div>`;
            console.error(err);
        });
    }

    function updateQty(id, chg) {
        db.collection("products").doc(id).get().then(doc => {
            if (!cart[id]) cart[id] = { ...doc.data(), id: doc.id, qty: 0 };
            cart[id].qty = Math.max(0, (cart[id].qty || 0) + chg);
            if (cart[id].qty === 0) delete cart[id];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
            // Refresh checkout if open
            if (!document.getElementById('checkout-view').classList.contains('hidden')) openCheckout();
        }).catch(err => {
            alert("Cannot update item right now. Check connection.");
            console.error(err);
        });
    }

    function updateCartUI() {
        let sub = 0, count = 0;
        Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
        document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
        document.getElementById('cart-total-bar').innerText = `₹${(sub + 15).toLocaleString('en-IN')}`;
        document.getElementById('cart-count').innerText = `\( {count} Item \){count !== 1 ? 's' : ''}`;

        // Orders nav badge
        const badge = document.getElementById('orders-badge');
        if (count > 0) {
            badge.innerText = count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function setPayment(m) {
        paymentMethod = m;
        document.getElementById('pay-cash').className = m === 'CASH' ? 'py-5 rounded-2xl border-2 border-green-500 bg-green-50/50 text-green-700 font-black text-base' : 'py-5 rounded-2xl border-2 border-slate-300 text-slate-400 font-black text-base';
        document.getElementById('pay-upi').className = m === 'UPI' ? 'py-5 rounded-2xl border-2 border-blue-500 bg-blue-50/50 text-blue-700 font-black text-base' : 'py-5 rounded-2xl border-2 border-slate-300 text-slate-400 font-black text-base';
    }

    function openCheckout() {
        document.getElementById('order-name').value = currentUser.name || '';
        document.getElementById('order-phone').value = currentUser.phone || '';
        const list = document.getElementById('checkout-list');
        list.innerHTML = "";
        let sub = 0;
        Object.values(cart).forEach(i => {
            sub += i.price * i.qty;
            list.innerHTML += `<div class="flex justify-between items-center bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <div>
                    <p class="font-bold text-base">${i.name}</p>
                    <p class="text-sm text-slate-500">₹${i.price.toLocaleString('en-IN')} × ${i.qty}</p>
                </div>
                <p class="font-bold text-lg">₹${(i.price * i.qty).toLocaleString('en-IN')}</p>
            </div>`;
        });
        document.getElementById('bill-details').innerHTML = `
            <div class="flex justify-between text-white/70 text-sm"><span>Subtotal</span><span>₹${sub.toLocaleString('en-IN')}</span></div>
            <div class="flex justify-between text-white/70 text-sm border-b border-white/10 pb-3"><span>Delivery Charge</span><span>₹15</span></div>
            <div class="flex justify-between text-2xl font-black pt-4"><span>Total</span><span>₹${(sub + 15).toLocaleString('en-IN')}</span></div>`;
        setPayment('CASH');
        document.getElementById('checkout-view').classList.remove('hidden');
    }

    async function placeOrder() {
        if (placingOrder) return;
        if (!gps) return alert("Please confirm your location first");

        placingOrder = true;
        const btn = document.getElementById('place-order-btn');
        const spinner = document.getElementById('place-spinner');
        btn.disabled = true;
        spinner.classList.remove('hidden');

        try {
            let sub = 0;
            Object.values(cart).forEach(i => sub += i.price * i.qty);
            const total = sub + 15;

            if (paymentMethod === 'UPI') {
                window.location.href = `upi://pay?pa=8328016917-3@ybl&pn=VillageExpress&am=${total}&cu=INR`;
                // Note: in real app you may want to wait for success callback or manual confirm
            }

            await db.collection("orders").add({
                orderId: "VE" + Date.now().toString().slice(-6),
                customer: {
                    name: document.getElementById('order-name').value.trim() || currentUser.name,
                    phone: document.getElementById('order-phone').value.trim() || currentUser.phone,
                    user_id: currentUser.phone
                },
                address: document.getElementById('order-addr').value.trim() + " | GPS: " + gps,
                items: cart,
                total,
                status: "PENDING",
                payment: paymentMethod,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: new Date().toLocaleString('en-IN')
            });

            alert("Order placed successfully!");
            cart = {};
            localStorage.removeItem('cart');
            localStorage.setItem('last_gps', gps);
            location.reload();
        } catch (err) {
            alert("Could not place order. Check internet and t
