<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

</head>

<body class="p-4 bg-gray-100">

<div id="auth">
    <input id="phone" placeholder="Phone" class="p-2 border"><br><br>
    <input id="pass" placeholder="Password" class="p-2 border"><br><br>
    <button onclick="login()" class="bg-black text-white p-2">Login</button>
</div>

<div id="app" class="hidden">

<h2 id="name"></h2>

<div id="items"></div>

<button onclick="openCart()">Cart</button>

</div>

<script>

const firebaseConfig = {
apiKey: "YOUR_KEY",
projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = JSON.parse(localStorage.getItem("user"));
let cart = JSON.parse(localStorage.getItem("cart")) || {};

if(user){
    startApp();
}

async function login(){
    const phone = phone.value;
    const pass = btoa(document.getElementById("pass").value);

    const s = await db.collection("users")
    .where("phone","==",phone)
    .where("pass","==",pass)
    .get();

    if(s.empty) return alert("Invalid");

    user = s.docs[0].data();
    localStorage.setItem("user", JSON.stringify(user));
    location.reload();
}

function startApp(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("name").innerText = user.name;

    loadProducts();
}

function loadProducts(){
    db.collection("products").onSnapshot(snap=>{
        let html="";
        snap.forEach(doc=>{
            const p = doc.data();
            if(!p.inStock) return;

            html += `
            <div class="bg-white p-3 mb-2">
                ${p.name} - ₹${p.price}
                <button onclick="add('${doc.id}',${p.price},'${p.name}')">Add</button>
            </div>`;
        });
        items.innerHTML = html;
    });
}

function add(id,price,name){
    if(!cart[id]) cart[id]={qty:0,price,name};
    cart[id].qty++;
    localStorage.setItem("cart", JSON.stringify(cart));
}

function openCart(){
    let total=0;
    Object.values(cart).forEach(i=> total+=i.qty*i.price);

    if(total===0) return alert("Cart empty");

    const addr = prompt("Enter address");
    const gps = "0,0";

    db.collection("orders").add({
        customer:user,
        items:cart,
        total,
        address:addr+" | GPS:"+gps,
        status:"PENDING",
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Order placed");
    cart={};
    localStorage.removeItem("cart");
}

</script>
</body>
</html>
