<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; margin: 0; -webkit-tap-highlight-color: transparent; }
        .product-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #f1f5f9; transition: transform 0.1s; }
        .product-card:active { transform: scale(0.97); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-section" class="fixed inset-0 bg-white z-[1000] p-8 flex flex-col justify-center">
        <div class="text-center space-y-6">
            <h1 class="text-4xl font-black italic text-green-700">VILLAGE<span class="text-orange-500">EXPRESS</span></h1>
            <input type="tel" id="login-phone" placeholder="Mobile Number" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-lg">LOGIN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-4 sticky top-0 bg-[#F7F9FB]/95 backdrop-blur-md z-50">
            <div class="flex justify-between items-center mb-4">
                <div><p class="text-[10px] font-black text-slate-400 uppercase">Delivery to</p><h2 id="display-name" class="font-black text-sm">Hi, Ashok</h2></div>
                <button onclick="handleLogout()" class="text-red-500"><i class="fa-solid fa-power-off text-xl"></i></button>
            </div>
            <div class="bg-white border p-3 rounded-2xl flex items-center shadow-sm">
                <i class="fa-solid fa-search text-slate-300 mr-3 text-sm"></i>
                <input type="text" oninput="handleSearch(this.value)" placeholder="Search anything..." class="flex-1 outline-none text-sm font-medium">
            </div>
        </header>

        <main id="items-grid" class="px-4 grid grid-cols-2 gap-4"></main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-lg">
            <button onclick="renderCategories()" class="flex flex-col items-center text-green-600"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold mt-1 uppercase">Home</span></button>
            <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-bag-shopping text-xl"></i><span class="text-[10px] font-bold mt-1 uppercase">Orders</span></button>
        </nav>

        <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-[100]">
            <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-2xl shadow-2xl">
                <div><p id="cart-count" class="text-[10px] font-bold text-slate-400">0 ITEMS</p><p id="cart-total-bar" class="text-xl font-black italic">₹0</p></div>
                <div class="bg-green-600 px-6 py-2 rounded-xl text-xs font-black uppercase">Review Order <i class="fa-solid fa-chevron-right ml-1"></i></div>
            </button>
        </div>

        <div id="orders-page" class="fixed inset-0 bg-slate-50 z-[200] hidden overflow-y-auto p-6 pb-32">
            <div class="flex items-center gap-4 mb-6"><button onclick="showPage('home')" class="w-10 h-10 bg-white rounded-xl shadow-sm"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black text-2xl">Order History</h2></div>
            <div id="orders-history-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[2000] hidden overflow-y-auto p-6">
        <div class="flex items-center gap-4 mb-6"><button onclick="closeCheckout()" class="w-10 h-10 bg-slate-100 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button><h2 class="font-black text-xl italic">Review Order</h2></div>
        <div id="checkout-list" class="space-y-4 mb-6"></div>
        <div class="space-y-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
            <div class="grid grid-cols-2 gap-3"><input type="text" id="cust-name" class="p-4 bg-white rounded-2xl text-sm border shadow-sm outline-none font-bold" readonly><input type="tel" id="cust-phone" class="p-4 bg-white rounded-2xl text-sm border shadow-sm outline-none font-bold" readonly></div>
            <input type="text" id="order-addr" placeholder="Flat / Street / Landmark" class="w-full p-4 bg-white rounded-2xl text-sm border shadow-sm outline-none">
            <button onclick="getGPS(this)" class="w-full p-4 bg-blue-50 text-blue-600 font-black text-[10px] rounded-2xl border border-blue-100">📍 CONFIRM GPS LOCATION</button>
            <div id="bill-details" class="pt-4 border-t"></div>
            <button onclick="placeOrder()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl">PLACE ORDER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null, cart = {}, gps = "", currentView = { catId: null, subId: null, name: '' };

        window.onload = () => {
            const saved = localStorage.getItem('user_session');
            if (saved) { currentUser = JSON.parse(saved); showMainApp(); }
            else document.getElementById('auth-section').classList.remove('hidden');
        };

        function showMainApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
            renderCategories();
        }

        function renderCategories() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<div class="col-span-2 mb-2"><h2 class="font-black text-lg">Shop by Category</h2></div>`;
            db.collection("categories").onSnapshot(snap => {
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const c = doc.data();
                    grid.innerHTML += `<div onclick="selectCategory('${doc.id}', '${c.name}')" class="product-card flex flex-col items-center"><img src="${c.image}" class="w-full aspect-square object-contain mb-2"><p class="text-[9px] font-black text-center uppercase tracking-tighter">${c.name}</p></div>`;
                });
            });
        }

        function selectCategory(id, name) {
            db.collection("subcategories").where("parentId", "==", id).get().then(snap => {
                if (!snap.empty) renderSubCategories(snap, id, name);
                else renderProducts(id, null, name);
            });
        }

        function renderSubCategories(snap, catId, catName) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<div class="col-span-2 flex items-center gap-2 mb-4"><button onclick="renderCategories()" class="text-xs font-bold text-green-600"><i class="fa-solid fa-chevron-left"></i> Home</button><span class="text-xs font-black text-slate-300">/ ${catName}</span></div>`;
            snap.forEach(doc => {
                const s = doc.data();
                grid.innerHTML += `<div onclick="renderProducts('${catId}', '${doc.id}', '${s.name}')" class="col-span-2 bg-white p-4 rounded-2xl border flex items-center gap-4 shadow-sm mb-2"><img src="${s.image}" class="w-14 h-14 rounded-xl object-cover"><div><p class="font-black text-slate-800">${s.name}</p><p class="text-[10px] font-bold text-green-600">VIEW MENU</p></div></div>`;
            });
        }

        function renderProducts(catId, subId, name) {
            currentView = { catId, subId, name };
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<div class="col-span-2 flex items-center gap-2 mb-4"><button onclick="${subId ? `selectCategory('${catId}', '')` : 'renderCategories()'}" class="text-xs font-bold text-green-600"><i class="fa-solid fa-chevron-left"></i> Back</button><span class="text-xs font-black text-slate-300 uppercase tracking-tighter">/ ${name}</span></div>`;
            
            let ref = db.collection("products").where("categoryId", "==", catId);
            if(subId) ref = ref.where("subId", "==", subId);
            
            ref.onSnapshot(snap => {
                const existing = grid.querySelectorAll('.product-card');
                existing.forEach(e => e.remove());
                snap.forEach(doc => {
                    const p = { id: doc.id, ...doc.data() };
                    if(!p.inStock) return; // Skip if out of stock
                    const qty = cart[p.id]?.qty || 0;
                    grid.innerHTML += `
                    <div class="product-card shadow-sm">
                        <img src="${p.image}" class="w-20 h-20 mx-auto object-contain mb-2">
                        <p class="text-[10px] font-bold text-slate-500 truncate">${p.name}</p>
                        <p class="text-sm font-black text-slate-900 mb-2">₹${p.price}</p>
                        ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="w-full py-2 bg-green-50 text-green-600 border border-green-200 rounded-lg text-[10px] font-black uppercase">Add</button>` :
                            `<div class="flex items-center justify-between w-full bg-green-600 text-white rounded-lg p-1">
                                <button onclick="updateQty('${p.id}', -1)" class="qty-btn bg-green-700/40">－</button>
                                <span class="text-xs font-black">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="qty-btn bg-green-700/40">＋</button>
                            </div>`
                        }
                    </div>`;
                });
            });
        }

        function updateQty(id, chg) {
            db.collection("products").doc(id).get().then(doc => {
                const p = { id: doc.id, ...doc.data() };
                if(!cart[id]) cart[id] = { ...p, qty: 0 };
                cart[id].qty += chg;
                if(cart[id].qty <= 0) delete cart[id];
                updateCartUI();
                if(!document.getElementById('checkout-view').classList.contains('hidden')) openCheckout();
                else if(currentView.catId) renderProducts(currentView.catId, currentView.subId, currentView.name);
            });
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 15}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function openCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            let sub = 0;
            document.getElementById('cust-name').value = currentUser.name;
            document.getElementById('cust-phone').value = currentUser.phone;
            Object.values(cart).forEach(i => {
                sub += i.price * i.qty;
                list.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="text-xs font-bold text-slate-700">${i.name}</div>
                    <div class="flex items-center bg-white border rounded-xl px-2 py-1 gap-4">
                        <button onclick="updateQty('${i.id}', -1)" class="text-green-600 font-bold">－</button>
                        <span class="text-xs font-black">${i.qty}</span>
                        <button onclick="updateQty('${i.id}', 1)" class="text-green-600 font-bold">＋</button>
                    </div>
                </div>`;
            });
            document.getElementById('bill-details').innerHTML = `<div class="flex justify-between font-black text-lg"><span>Grand Total</span><span>₹${sub+15}</span></div>`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            if(!gps) return alert("Confirm GPS First");
            let sub = 0; Object.values(cart).forEach(i => sub += (i.price * i.qty));
            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random()*8999),
                customer: { name: currentUser.name, phone: currentUser.phone, user_id: currentUser.phone },
                address: document.getElementById('order-addr').value + " | GPS: " + gps, items: cart, total: sub + 15, status: "PENDING", 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Placed Successfully!"); location.reload();
        }

        function getGPS(btn) { btn.innerText = "Locating..."; navigator.geolocation.getCurrentPosition(p => { gps = p.coords.latitude + "," + p.coords.longitude; btn.innerText = "Fixed ✅"; btn.className = "w-full p-4 bg-green-50 text-green-600 font-black rounded-2xl"; }, null, {enableHighAccuracy:true}); }
        async function handleLogin() { const p = document.getElementById('login-phone').value, pw = document.getElementById('login-pass').value; const s = await db.collection("users").where("phone","==",p).get(); if(!s.empty && s.docs[0].data().pass === pw){ localStorage.setItem('user_session', JSON.stringify(s.docs[0].data())); location.reload(); } else alert("Access Denied"); }
        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }
        function showPage(p) { document.getElementById('orders-page').classList.toggle('hidden', p !== 'orders'); }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
    </script>
</body>
</html>
