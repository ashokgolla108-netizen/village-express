<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Kalyandurg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .auth-screen { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 24px; overflow-y: auto; }
        .auth-screen.active { display: block; }
        input, textarea { border: 1px solid #e2e8f0; }
        input:focus { border-color: #15803d; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <div id="auth-overlay" class="auth-screen">
        <div id="login-view" class="space-y-6 pt-10">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black italic text-slate-900">Village Express</h1>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-2">Kalyandurg's Quickest Delivery</p>
            </div>
            <div class="space-y-4">
                <input type="tel" id="login-phone" placeholder="Mobile Number" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
                <button onclick="handleLogin()" class="w-full bg-green-700 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-wider active:scale-95 transition-all">Login</button>
            </div>
            <div class="flex justify-between items-center px-2">
                <button onclick="showAuth('register')" class="text-[10px] font-black uppercase text-blue-600">Create Account</button>
                <button onclick="showAuth('forgot')" class="text-[10px] font-black uppercase text-red-500">Forgot Password?</button>
            </div>
        </div>

        <div id="register-view" class="hidden space-y-5">
            <h2 class="text-2xl font-black mb-1">Create Account</h2>
            <p class="text-[10px] font-black text-gray-400 uppercase mb-6">Join our delivery network</p>
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <input type="tel" id="reg-phone" placeholder="Mobile Number" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-400 uppercase ml-2">Date of Birth</label>
                <input type="date" id="reg-dob" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            </div>
            <input type="password" id="reg-pass" placeholder="Create Password" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <button onclick="handleRegister()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-wider">Register Now</button>
            <button onclick="showAuth('login')" class="w-full text-xs font-black uppercase text-gray-400 py-2">Already have an account? Login</button>
        </div>

        <div id="forgot-view" class="hidden space-y-5">
            <h2 class="text-2xl font-black mb-1">Recover Password</h2>
            <p class="text-[10px] font-black text-gray-400 uppercase mb-6">Enter details exactly as registered</p>
            <input type="tel" id="f-phone" placeholder="Registered Mobile Number" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <input type="text" id="f-name" placeholder="Full Name" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <input type="date" id="f-dob" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold text-sm">
            <button onclick="handleForgot()" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-lg uppercase">Verify & Show Password</button>
            <button onclick="showAuth('login')" class="w-full text-xs font-black uppercase text-gray-400 py-2">Back to Login</button>
        </div>
    </div>

    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot"></i>
                <div>
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p class="text-[9px] font-black uppercase opacity-60">Kalyandurg</p>
                </div>
            </div>
            <button onclick="openProfile()" class="bg-white/30 p-2 rounded-full w-10 h-10 flex items-center justify-center border border-white/20">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-2xl flex items-center px-4 py-3 shadow-sm border border-black/5">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search fresh items...' class="w-full outline-none text-sm font-medium bg-transparent">
        </div>
    </header>

    <div id="profile-view" class="fixed inset-0 bg-gray-50 z-[100] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center justify-between sticky top-0 bg-white z-10">
            <div class="flex items-center gap-4">
                <button onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black">My Account</h2>
            </div>
            <button onclick="handleLogout()" class="text-red-500 text-[10px] font-black uppercase">Logout</button>
        </div>
        <div class="p-8 text-center bg-white mb-3">
            <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl text-slate-300 border-4 border-slate-50 shadow-inner">
                <i class="fa-solid fa-user"></i>
            </div>
            <p id="profile-name-txt" class="text-lg font-black italic"></p>
            <p id="profile-number" class="text-xs font-bold text-gray-400"></p>
        </div>

        <div id="history-list" class="bg-white p-5 space-y-4">
            <h3 class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">Your Orders</h3>
            </div>
    </div>

    <main class="p-4">
        <div id="items-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-5 rounded-2xl font-black shadow-2xl items-center">
            <div class="text-left leading-none">
                <p id="cart-count" class="text-[9px] mb-1 opacity-80">0 ITEMS</p>
                <p id="cart-total-bar" class="text-base">₹0</p>
            </div>
            <span class="text-xs uppercase tracking-widest">View Cart <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let allProducts = [], cart = {};

        window.onload = () => {
            if(!currentUser) {
                document.getElementById('auth-overlay').classList.add('active');
            } else {
                initApp();
            }
        };

        function showAuth(view) {
            ['login','register','forgot'].forEach(v => document.getElementById(v+'-view').classList.add('hidden'));
            document.getElementById(view+'-view').classList.remove('hidden');
        }

        // --- AUTHENTICATION LOGIC ---
        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const dob = document.getElementById('reg-dob').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || !phone || !dob || !pass) return alert("All fields are mandatory");
            
            const check = await db.collection("users").where("phone", "==", phone).get();
            if(!check.empty) return alert("This mobile number is already registered.");

            await db.collection("users").add({ name, phone, dob, pass, createdAt: new Date() });
            alert("Registered successfully! Please login.");
            showAuth('login');
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;

            const snap = await db.collection("users").where("phone", "==", phone).where("pass", "==", pass).get();
            if(snap.empty) return alert("Incorrect mobile number or password.");

            const userData = snap.docs[0].data();
            localStorage.setItem('user_session', JSON.stringify(userData));
            currentUser = userData;
            location.reload(); 
        }

        async function handleForgot() {
            const phone = document.getElementById('f-phone').value;
            const name = document.getElementById('f-name').value;
            const dob = document.getElementById('f-dob').value;

            const snap = await db.collection("users").where("phone", "==", phone)
                        .where("name", "==", name).where("dob", "==", dob).get();
            
            if(snap.empty) return alert("Account details didn't match.");
            alert("Verification Successful! Your password is: " + snap.docs[0].data().pass);
        }

        function handleLogout() {
            localStorage.removeItem('user_session');
            location.reload();
        }

        // --- PRIVATE HISTORY LOGIC ---
        function initApp() {
            document.getElementById('auth-overlay').classList.remove('active');
            document.getElementById('profile-name-txt').innerText = currentUser.name;
            document.getElementById('profile-number').innerText = currentUser.phone;
            
            // Load Products
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts);
            });

            // Load PRIVATE history only for this user's phone
            db.collection("orders").where("customer.phone", "==", currentUser.phone)
              .orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = `<h3 class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">Your Orders</h3>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-gray-50 p-4 rounded-2xl border flex justify-between items-center mb-2">
                            <div>
                                <p class="text-[10px] font-black uppercase ${d.status === 'CANCELLED' ? 'text-red-500' : 'text-green-600'}">${d.status}</p>
                                <p class="text-xs font-black">₹${d.total} • ${d.orderId}</p>
                            </div>
                            <i class="fa-solid fa-chevron-right text-gray-300 text-[10px]"></i>
                        </div>`;
                });
            });
        }

        // --- PRODUCT GRID LOGIC ---
        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border border-black/5 rounded-[24px] p-3 shadow-sm">
                        <div class="aspect-square bg-slate-50 rounded-2xl mb-3 flex items-center justify-center overflow-hidden">
                             <img src="${p.image || ''}" class="w-full h-full object-contain p-2">
                        </div>
                        <p class="font-black text-[11px] mb-1 truncate">${p.name}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-[12px] font-black text-slate-900">₹${p.price}</p>
                            ${qty === 0 ? 
                                `<button onclick="updateQty('${p.id}', 1)" class="border border-green-700 text-green-700 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase">Add</button>` :
                                `<div class="flex items-center gap-3 bg-green-700 text-white px-2 py-1.5 rounded-xl font-black text-[10px]">
                                    <button onclick="updateQty('${p.id}', -1)">-</button><span>${qty}</span><button onclick="updateQty('${p.id}', 1)">+</button>
                                </div>`
                            }
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI();
            renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function openProfile() { document.getElementById('profile-view').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-view').classList.add('hidden'); }
        function handleSearch(v) { renderItems(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
    </script>
</body>
</html>
