<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F9FB; }
        .product-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #f1f5f9; }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-section" class="fixed inset-0 bg-white z-[1000] p-8 flex flex-col justify-center overflow-y-auto">
        <div class="text-center space-y-6 max-w-sm mx-auto w-full">
            <h1 class="text-4xl font-black italic text-green-700 uppercase">Village<span class="text-orange-500">Express</span></h1>
            
            <div id="auth-form" class="space-y-4">
                <div id="signup-fields" class="hidden space-y-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                </div>
                <input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                
                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl">LOGIN</button>
            </div>

            <div class="flex flex-col gap-4 text-sm font-bold">
                <button onclick="toggleAuthMode()" id="toggle-text" class="text-slate-500">New here? <span class="text-green-600">Create Account</span></button>
                <button onclick="forgotPassword()" class="text-slate-400 text-xs">Forgot Password?</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-6 sticky top-0 bg-[#F7F9FB]/95 backdrop-blur-md z-50 flex justify-between items-center">
            <div><p class="text-[10px] font-black text-slate-400 uppercase">Delivery to</p><h2 id="display-name" class="font-black text-sm text-slate-900">Hi, User</h2></div>
            <button onclick="handleLogout()" class="text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <main id="items-grid" class="px-4 grid grid-cols-2 gap-4 mt-2"></main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center z-[150] shadow-2xl">
            <button onclick="renderCategories()" class="flex flex-col items-center text-green-600"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold mt-1 uppercase">Home</span></button>
            <button onclick="showPage('orders')" class="flex flex-col items-center text-slate-300"><i class="fa-solid fa-bag-shopping text-xl"></i><span class="text-[10px] font-bold mt-1 uppercase">Orders</span></button>
        </nav>

        <div id="cart-bar" class="fixed bottom-24 left-4 right-4 hidden z-[100]">
            <button onclick="openCheckout()" class="w-full bg-slate-900 text-white flex justify-between items-center p-4 rounded-2xl shadow-2xl">
                <div><p id="cart-count" class="text-[10px] font-bold">0 ITEMS</p><p id="cart-total-bar" class="text-xl font-black">₹0</p></div>
                <div class="bg-green-600 px-6 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Review Order</div>
            </button>
        </div>

        <div id="orders-page" class="fixed inset-0 bg-slate-50 z-[200] hidden overflow-y-auto p-6 pb-32">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('home')" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-black text-2xl text-slate-900 tracking-tight">Order History</h2>
            </div>
            <div id="orders-history-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[2000] hidden overflow-y-auto p-6">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="closeCheckout()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-xl tracking-tight">Review Order</h2>
        </div>
        <div id="checkout-list" class="space-y-4 mb-6"></div>
        <div class="space-y-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
            <input type="text" id="order-addr" placeholder="Flat / Street / Landmark" class="w-full p-4 bg-white rounded-2xl text-sm border shadow-sm outline-none">
            <button onclick="getGPS(this)" class="w-full p-4 bg-blue-50 text-blue-600 font-black text-[10px] rounded-2xl border border-blue-100 tracking-widest uppercase">📍 Confirm GPS Location</button>
            <div id="bill-details" class="pt-4 border-t"></div>
            <button onclick="placeOrder()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl">PLACE ORDER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
        let cart = {}, gps = "", isSignup = false;

        window.onload = () => { if(currentUser) showMainApp(); };

        // Toggle between Login and Signup
        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
            document.getElementById('auth-btn').innerText = isSignup ? "CREATE ACCOUNT" : "LOGIN";
            document.getElementById('toggle-text').innerHTML = isSignup ? 
                `Already have an account? <span class="text-green-600">Login</span>` : 
                `New here? <span class="text-green-600">Create Account</span>`;
        }

        async function handleAuth() {
            const phone = document.getElementById('auth-phone').value;
            const pass = document.getElementById('auth-pass').value;
            const name = document.getElementById('reg-name').value;

            if(!phone || !pass) return alert("Please fill all fields");

            if(isSignup) {
                if(!name) return alert("Please enter your name");
                // Check if user exists
                const check = await db.collection("users").where("phone", "==", phone).get();
                if(!check.empty) return alert("User already exists. Please login.");
                
                const newUser = { name, phone, pass, created: firebase.firestore.FieldValue.serverTimestamp() };
                await db.collection("users").add(newUser);
                loginUser(newUser);
            } else {
                const s = await db.collection("users").where("phone","==",phone).get();
                if(!s.empty && s.docs[0].data().pass === pass) {
                    loginUser(s.docs[0].data());
                } else {
                    alert("Invalid phone or password");
                }
            }
        }

        function loginUser(userData) {
            localStorage.setItem('user_session', JSON.stringify(userData));
            currentUser = userData;
            showMainApp();
        }

        function forgotPassword() {
            const phone = prompt("Enter your registered mobile number:");
            if(phone) {
                db.collection("users").where("phone", "==", phone).get().then(snap => {
                    if(!snap.empty) {
                        alert("Please contact Admin at +91-XXXXXXXXXX to reset your password for security reasons.");
                    } else {
                        alert("Number not found.");
                    }
                });
            }
        }

        function showMainApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-name').innerText = "Hi, " + currentUser.name;
            renderCategories();
        }

        // Logic for rendering products, categories, cart, and orders remains unchanged...
        // [Existing functions: renderCategories, renderProducts, updateQty, updateCartUI, openCheckout, placeOrder, loadOrderHistory, getGPS, handleLogout, showPage, closeCheckout]
        // Note: Ensure the rest of the functions from previous code are included here to keep full logic.

        function renderCategories() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<p class="col-span-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Categories</p>`;
            db.collection("categories").onSnapshot(snap => {
                snap.forEach(doc => {
                    const c = doc.data();
                    grid.innerHTML += `<div onclick="renderProducts('${doc.id}', '${c.name}')" class="product-card flex flex-col items-center justify-center gap-2"><div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-xl"><i class="fa-solid fa-layer-group"></i></div><p class="text-[10px] font-black text-center uppercase tracking-tighter">${c.name}</p></div>`;
                });
            });
        }

        function renderProducts(catId, name) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `<div class="col-span-2 flex items-center gap-2 mb-4"><button onclick="renderCategories()" class="text-[10px] font-black text-green-600 uppercase">Back</button><span class="text-[10px] font-black text-slate-300 uppercase">/ ${name}</span></div>`;
            db.collection("products").where("categoryId", "==", catId).onSnapshot(snap => {
                snap.forEach(doc => {
                    const p = { id: doc.id, ...doc.data() };
                    if(!p.inStock) return;
                    const qty = cart[p.id]?.qty || 0;
                    grid.innerHTML += `
                    <div class="product-card shadow-sm text-center">
                        <div class="w-full aspect-square flex items-center justify-center text-3xl text-slate-200 mb-2"><i class="fa-solid ${p.icon || 'fa-box'}"></i></div>
                        <p class="text-[10px] font-bold text-slate-500 truncate">${p.name}</p>
                        <p class="text-sm font-black text-slate-900 mb-2">₹${p.price}</p>
                        ${qty === 0 ? 
                            `<button onclick="updateQty('${p.id}', 1)" class="w-full py-2 bg-green-50 text-green-600 border border-green-200 rounded-lg text-[10px] font-black uppercase tracking-tighter">Add</button>` :
                            `<div class="flex items-center justify-between w-full bg-green-600 text-white rounded-lg p-1">
                                <button onclick="updateQty('${p.id}', -1)" class="qty-btn"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                <span class="text-xs font-black">${qty}</span>
                                <button onclick="updateQty('${p.id}', 1)" class="qty-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                            </div>`
                        }
                    </div>`;
                });
            });
        }

        function updateQty(id, chg) {
            db.collection("products").doc(id).get().then(doc => {
                if(!cart[id]) cart[id] = { ...doc.data(), id: doc.id, qty: 0 };
                cart[id].qty += chg;
                if(cart[id].qty <= 0) delete cart[id];
                updateCartUI();
                if(!document.getElementById('checkout-view').classList.contains('hidden')) openCheckout();
            });
        }

        function updateCartUI() {
            let sub = 0, count = 0; Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 15}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function openCheckout() {
            const list = document.getElementById('checkout-list'); list.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => {
                sub += i.price * i.qty;
                list.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border"><div class="text-xs font-bold text-slate-700">${i.name}</div><div class="flex items-center bg-white border rounded-xl px-2 py-1 gap-4"><button onclick="updateQty('${i.id}', -1)" class="text-green-600"><i class="fa-solid fa-minus text-[10px]"></i></button><span class="text-xs font-black">${i.qty}</span><button onclick="updateQty('${i.id}', 1)" class="text-green-600"><i class="fa-solid fa-plus text-[10px]"></i></button></div></div>`;
            });
            document.getElementById('bill-details').innerHTML = `<div class="flex justify-between font-black text-lg"><span>Total</span><span>₹${sub+15}</span></div>`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }

        async function placeOrder() {
            if(!gps) return alert("Confirm GPS First");
            let sub = 0; Object.values(cart).forEach(i => sub += (i.price * i.qty));
            await db.collection("orders").add({
                orderId: "VE" + Math.floor(1000 + Math.random()*8999),
                customer: { name: currentUser.name, phone: currentUser.phone, user_id: currentUser.phone },
                address: document.getElementById('order-addr').value + " | GPS: " + gps, items: cart, total: sub + 15, status: "PENDING", 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Order Placed!"); location.reload();
        }

        function loadOrderHistory() {
            const list = document.getElementById('orders-history-list');
            db.collection("orders").where("customer.user_id", "==", currentUser.phone).onSnapshot(snap => {
                if(snap.empty) return list.innerHTML = `<p class="text-center py-20 text-slate-400 font-black uppercase tracking-widest text-[10px]">No orders yet</p>`;
                let html = "";
                snap.docs.sort((a,b) => (b.data().timestamp?.seconds || 0) - (a.data().timestamp?.seconds || 0)).forEach(doc => {
                    const d = doc.data();
                    const isAccepted = d.status === "ACCEPTED" && d.riderLocation;
                    html += `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div><span class="text-[9px] font-black text-slate-300 uppercase tracking-tighter">#${d.orderId}</span><h3 class="text-sm font-black ${d.status === 'ACCEPTED' ? 'text-orange-500' : 'text-green-600'}">${d.status}</h3></div>
                            <span class="font-black text-xl text-slate-900">₹${d.total}</span>
                        </div>
                        ${isAccepted ? `<div class="w-full h-44 rounded-2xl mb-4 overflow-hidden border border-slate-100 bg-slate-50"><iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${d.riderLocation.lat},${d.riderLocation.lng}&z=16&output=embed"></iframe></div>` : ''}
                        <div class="flex items-center gap-2"><div class="p-2 bg-slate-50 rounded-lg text-slate-400"><i class="fa-solid fa-box-open text-xs"></i></div><p class="text-[10px] font-bold text-slate-500 truncate">${Object.values(d.items).map(i => i.name).join(', ')}</p></div>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }

        function getGPS(btn) { navigator.geolocation.getCurrentPosition(p => { gps = p.coords.latitude + "," + p.coords.longitude; btn.innerText = "Fixed ✅"; btn.className = "w-full p-4 bg-green-50 text-green-600 font-black rounded-2xl border border-green-100 text-[10px] tracking-widest"; }, null, {enableHighAccuracy:true}); }
        function handleLogout() { localStorage.removeItem('user_session'); location.reload(); }
        function showPage(p) { document.getElementById('orders-page').classList.toggle('hidden', p !== 'orders'); if(p === 'orders') loadOrderHistory(); }
        function closeCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
    </script>
</body>
</html>
