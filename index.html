<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Village Express</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background:#F7F9FB; }
.product-card { background:white; border-radius:24px; padding:12px; border:1px solid #f1f5f9; }
.hidden { display:none !important; }
</style>
</head>

<body class="pb-32">

<!-- AUTH -->
<div id="auth-section" class="fixed inset-0 bg-white z-[3000] p-8 flex flex-col justify-center">
<div class="text-center space-y-6 max-w-sm mx-auto w-full">
<h1 class="text-4xl font-black italic text-green-700 uppercase">Village<span class="text-orange-500">Express</span></h1>

<div id="signup-fields" class="hidden">
<input type="text" id="reg-name" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl mb-4">
</div>

<input type="tel" id="auth-phone" placeholder="Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl">
<input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl">

<button onclick="handleAuth()" class="w-full bg-slate-900 text-white p-5 rounded-2xl">Login</button>

<button onclick="toggleAuthMode()" id="toggle-link" class="text-sm">
New here? <span class="text-green-600">Create Account</span>
</button>
</div>
</div>

<!-- MAIN -->
<div id="main-app" class="hidden">

<header class="p-4 flex justify-between">
<h2 id="display-name"></h2>
<button onclick="handleLogout()">Logout</button>
</header>

<main id="items-grid" class="grid grid-cols-2 gap-4 p-4"></main>

<div id="cart-bar" class="fixed bottom-20 left-4 right-4 hidden">
<button onclick="openCheckout()" class="w-full bg-black text-white p-4 rounded-xl flex justify-between">
<span id="cart-count"></span>
<span id="cart-total-bar"></span>
</button>
</div>

</div>

<!-- CHECKOUT -->
<div id="checkout-view" class="fixed inset-0 bg-white hidden p-4">

<input id="order-name" placeholder="Name" class="w-full p-3 mb-2">
<input id="order-phone" placeholder="Phone" class="w-full p-3 mb-2">
<input id="order-addr" placeholder="Address" class="w-full p-3 mb-2">

<button onclick="getGPS(this)" id="gps-btn" class="w-full p-3 bg-blue-100 mb-4">📍 GPS</button>

<div id="checkout-list"></div>
<div id="bill-details"></div>

<button onclick="placeOrder()" class="w-full bg-green-500 text-white p-4 mt-4">Place Order</button>

</div>

<script>
const RUPEE = "₹";

const firebaseConfig = {
apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A",
projectId: "village-quick-commerce-e27f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let cart = JSON.parse(localStorage.getItem('cart')) || {};
let gps = "";
let isSignup = false;
let placingOrder = false;

window.onload = () => {
if(currentUser) showMainApp();
updateCartUI();
};

/* LOGIN (UNCHANGED) */
function toggleAuthMode(){
isSignup=!isSignup;
document.getElementById('signup-fields').classList.toggle('hidden',!isSignup);
}

async function handleAuth(){
const phone=document.getElementById('auth-phone').value.trim();
const pass=document.getElementById('auth-pass').value.trim();

if(isSignup){
const name=document.getElementById('reg-name').value.trim();
const user={name,phone,pass};
await db.collection("users").add(user);
loginUser(user);
}else{
const s=await db.collection("users").where("phone","==",phone).where("pass","==",pass).get();
if(!s.empty) loginUser(s.docs[0].data());
else alert("Invalid Login");
}
}

function loginUser(u){
localStorage.setItem('user_session',JSON.stringify(u));
location.reload();
}

function handleLogout(){
localStorage.removeItem('user_session');
location.reload();
}

/* MAIN */
function showMainApp(){
document.getElementById('auth-section').classList.add('hidden');
document.getElementById('main-app').classList.remove('hidden');
document.getElementById('display-name').innerText="Hi "+currentUser.name;
renderCategories();
}

/* CATEGORIES */
function renderCategories(){
const grid=document.getElementById('items-grid');
grid.innerHTML="";

db.collection("categories").get().then(snap=>{
let html="";
snap.forEach(doc=>{
html+=`
<div onclick="renderProducts('${doc.id}')" class="product-card text-center">
${doc.data().name}
</div>`;
});
grid.innerHTML=html;
});
}

/* PRODUCTS */
function renderProducts(catId){
const grid=document.getElementById('items-grid');
grid.innerHTML="Loading...";

db.collection("products").where("categoryId","==",catId).get().then(snap=>{
let html="";

if(snap.empty){
grid.innerHTML="No items";
return;
}

snap.forEach(doc=>{
const p={id:doc.id,...doc.data()};
if(!p.inStock) return;

const qty=cart[p.id]?.qty||0;

html+=`
<div class="product-card">
<p>${p.name}</p>
<p>${RUPEE}${p.price}</p>

${qty===0?
`<button onclick="updateQty('${p.id}',1)">Add</button>`:
`<div>
<button onclick="updateQty('${p.id}',-1)">-</button>
${qty}
<button onclick="updateQty('${p.id}',1)">+</button>
</div>`}
</div>`;
});

grid.innerHTML=html;
});
}

/* CART */
function updateQty(id,chg){
db.collection("products").doc(id).get().then(doc=>{
if(!cart[id]) cart[id]={...doc.data(),id:doc.id,qty:0};

cart[id].qty+=chg;

if(cart[id].qty<=0) delete cart[id];

localStorage.setItem('cart',JSON.stringify(cart));

updateCartUI();
});
}

function updateCartUI(){
let sub=0,count=0;

Object.values(cart).forEach(i=>{
sub+=i.price*i.qty;
count+=i.qty;
});

document.getElementById('cart-bar').classList.toggle('hidden',count===0);
document.getElementById('cart-total-bar').innerText=RUPEE+(sub+15);
document.getElementById('cart-count').innerText=count+" items";
}

/* CHECKOUT */
function openCheckout(){
document.getElementById('checkout-view').classList.remove('hidden');

let list=document.getElementById('checkout-list');
let sub=0;
list.innerHTML="";

Object.values(cart).forEach(i=>{
sub+=i.price*i.qty;
list.innerHTML+=`<p>${i.name} x ${i.qty}</p>`;
});

document.getElementById('bill-details').innerText="Total: "+RUPEE+(sub+15);
}

/* GPS */
function getGPS(btn){
btn.innerText="Fetching...";

navigator.geolocation.getCurrentPosition(
p=>{
gps=p.coords.latitude+","+p.coords.longitude;
btn.innerText="GPS Fixed ✅";
},
()=>{
alert("GPS failed");
btn.innerText="Retry GPS";
},
{enableHighAccuracy:true,timeout:10000}
);
}

/* ORDER */
async function placeOrder(){

if(placingOrder) return;
placingOrder=true;

if(!gps){
placingOrder=false;
return alert("Fix GPS");
}

const name=document.getElementById('order-name').value;
const phone=document.getElementById('order-phone').value;
const addr=document.getElementById('order-addr').value;

if(!name||!phone||!addr){
placingOrder=false;
return alert("Fill all fields");
}

let sub=0;
Object.values(cart).forEach(i=>sub+=i.price*i.qty);

await db.collection("orders").add({
orderId:"VE"+Math.floor(1000+Math.random()*9000),
customer:{name,phone,user_id:currentUser.phone},
address:addr+" | "+gps,
items:cart,
total:sub+15,
status:"PENDING",
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Order placed");

cart={};
localStorage.removeItem('cart');

location.reload();
}
</script>

</body>
</html>
