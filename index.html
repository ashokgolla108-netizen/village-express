<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Village Express</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .auth-screen { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 24px; overflow-y: auto; }
        .auth-screen.active { display: block; }
        input, textarea { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; background: #f8fafc; outline: none; }
        .btn-primary { background: #15803d; color: white; font-weight: 900; text-transform: uppercase; padding: 16px; border-radius: 16px; width: 100%; }
    </style>
</head>

<body class="bg-gray-50 text-slate-900 pb-32">

<!-- ================= AUTH ================= -->
<div id="auth-overlay" class="auth-screen">
    <div id="login-view" class="space-y-6 pt-10 text-center">
        <h1 class="text-4xl font-black italic">Village Express</h1>
        <input type="tel" id="login-phone" placeholder="Mobile Number">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleLogin()" class="btn-primary">Login</button>
    </div>
</div>

<!-- ================= HEADER ================= -->
<header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
    <h1 class="text-lg font-black italic">Village Express</h1>
</header>

<!-- ================= PRODUCTS ================= -->
<main class="p-4">
    <div id="items-grid" class="grid grid-cols-2 gap-4"></div>
</main>

<!-- ================= CART ================= -->
<div id="cart-bar" class="fixed bottom-6 left-4 right-4 hidden">
    <button onclick="openCheckout()" class="w-full bg-green-800 text-white p-5 rounded-2xl font-black">
        Confirm Order
    </button>
</div>

<!-- ================= CHECKOUT ================= -->
<div id="checkout-view" class="fixed inset-0 bg-white z-[150] hidden">
    <div class="p-5 space-y-4">
        <input id="order-name" placeholder="Name">
        <input id="order-phone" placeholder="Mobile">
        <input id="order-building" placeholder="Building">
        <textarea id="order-address" placeholder="Address"></textarea>
        <button onclick="placeOrder()" class="btn-primary">Confirm</button>
    </div>
</div>

<script>
const config = { apiKey: "AIzaSyAVu8...", projectId: "village-quick-commerce-e27f6" };
firebase.initializeApp(config);
const db = firebase.firestore();

let currentUser = JSON.parse(localStorage.getItem('user_session')) || null;
let allProducts = [], cart = {};

// ✅ RIDERS (NEW)
const riders = [
  { name: "Ashok", phone: "8328016917" },
  { name: "Ravi", phone: "9000000001" },
  { name: "Naresh", phone: "9000000002" }
];

// INIT
window.onload = () => {
    if(!currentUser) showAuth();
    else initApp();
};

function showAuth(){
    document.getElementById('auth-overlay').classList.add('active');
}

async function handleLogin(){
    const p = document.getElementById('login-phone').value;
    const pw = document.getElementById('login-pass').value;

    const s = await db.collection("users")
        .where("phone","==",p)
        .where("pass","==",pw)
        .get();

    if(s.empty) return alert("Error");

    currentUser = s.docs[0].data();
    localStorage.setItem('user_session', JSON.stringify(currentUser));
    location.reload();
}

function initApp(){
    document.getElementById('auth-overlay').classList.remove('active');

    db.collection("products").onSnapshot(snap => {
        allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderItems();
    });
}

// PRODUCTS
function renderItems(){
    const grid = document.getElementById('items-grid');
    grid.innerHTML = "";

    allProducts.forEach(p => {
        grid.innerHTML += `
        <div class="bg-white p-3 rounded-2xl">
            <p>${p.name}</p>
            <p>₹${p.price}</p>
            <button onclick="addToCart('${p.id}')" class="bg-green-700 text-white px-3 py-1 mt-2 rounded">ADD</button>
        </div>`;
    });
}

function addToCart(id){
    const p = allProducts.find(x => x.id === id);
    if(!cart[id]) cart[id] = { name:p.name, price:p.price, qty:0 };
    cart[id].qty++;
    document.getElementById('cart-bar').classList.remove('hidden');
}

// CHECKOUT
function openCheckout(){
    document.getElementById('checkout-view').classList.remove('hidden');
    document.getElementById('order-name').value = currentUser.name;
    document.getElementById('order-phone').value = currentUser.phone;
}

// ✅ UPDATED ORDER FUNCTION ONLY
async function placeOrder(){
    const b = document.getElementById('order-building').value;
    const a = document.getElementById('order-address').value;

    if(!b || !a) return alert("Address Required");

    let sub = 0;
    Object.values(cart).forEach(i => sub += i.price * i.qty);

    // ✅ Assign Rider
    const rider = riders[Math.floor(Math.random()*riders.length)];

    const order = {
        orderId: "ORD" + Math.floor(100000 + Math.random()*900000),

        customer: {
            name: document.getElementById('order-name').value,
            phone: document.getElementById('order-phone').value,
            user_phone: currentUser.phone
        },

        rider: rider, // ✅ NEW

        address: `${b}, ${a}`,
        gps: "Not Provided",

        items: cart,
        total: sub + 5,
        deliveryFee: 5,

        payment: "COD", // ✅ for admin

        status: "PENDING", // ✅ FIX

        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection("orders").add(order);

    alert("Order Placed!");
    cart = {};
    document.getElementById('checkout-view').classList.add('hidden');
    document.getElementById('cart-bar').classList.add('hidden');
}
</script>

</body>
</html>
