<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Express - Kalyandurg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .blinkit-yellow { background-color: #F7CB45; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-cat { border-color: #15803d; background-color: #f0fdf4; color: #15803d; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32">

    <header class="blinkit-yellow p-4 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2" onclick="getCurrentLocation()">
                <i class="fa-solid fa-location-dot"></i>
                <div>
                    <h1 class="text-lg font-black italic leading-none">Village Express</h1>
                    <p id="addr-display" class="text-[10px] font-bold">Tap to set current location...</p>
                </div>
            </div>
            <button onclick="openProfile()" class="bg-white/20 p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <div class="relative bg-white rounded-xl flex items-center px-4 py-3 shadow-sm">
            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder='Search "milk" or "tomato"' class="w-full outline-none text-sm font-medium bg-transparent">
        </div>
    </header>

    <nav class="bg-white border-b sticky top-[125px] z-40 overflow-x-auto hide-scroll flex gap-2 p-4">
        <button onclick="filterItems('All')" id="cat-All" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase active-cat">All</button>
        <button onclick="filterItems('Vegetables')" id="cat-Vegetables" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Vegetables</button>
        <button onclick="filterItems('Dairy')" id="cat-Dairy" class="cat-btn shrink-0 px-5 py-2 rounded-full border-2 border-gray-100 text-[11px] font-black uppercase">Dairy & Milk</button>
    </nav>

    <main class="p-4">
        <h3 id="view-title" class="font-black text-sm mb-4">Fresh Items</h3>
        <div id="items-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-[60] hidden">
        <button onclick="showCheckout()" class="w-full bg-green-700 text-white flex justify-between p-4 rounded-2xl font-black shadow-2xl items-center active:scale-95 transition-transform">
            <div class="text-left leading-none">
                <p id="cart-count" class="text-[9px] opacity-80 uppercase mb-1">0 ITEMS</p>
                <p id="cart-total-bar" class="text-sm">₹0</p>
            </div>
            <span class="text-xs">PROCEED TO PAY <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </button>
    </div>

    <div id="checkout-view" class="fixed inset-0 bg-white z-[120] hidden overflow-y-auto">
        <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white">
            <button onclick="hideCheckout()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black">Order summary</h2>
        </div>
        <div class="p-4 pb-12">
            <div id="checkout-items" class="space-y-4 mb-8"></div>
            
            <div class="bg-gray-50 p-6 rounded-3xl mb-6">
                <h3 class="font-black text-sm mb-4">Bill details</h3>
                <div class="space-y-2 text-xs font-bold text-gray-600">
                    <div class="flex justify-between"><span>Item Total</span><span id="bill-sub">₹0</span></div>
                    <div class="flex justify-between"><span>Handling charge</span><span>+₹5</span></div>
                    <div class="flex justify-between text-base font-black text-slate-900 pt-3 border-t border-dashed mt-2">
                        <span>Bill total</span><span id="bill-grand">₹0</span>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl mb-4">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] font-black text-gray-400 uppercase">Deliver to</p>
                    <button onclick="getCurrentLocation()" class="text-[10px] font-black text-blue-600 uppercase"><i class="fa-solid fa-crosshairs mr-1"></i> Use Current Location</button>
                </div>
                <textarea id="manual-address" placeholder="Enter House No, Area..." class="w-full bg-white border border-gray-200 rounded-xl p-3 text-xs font-bold outline-none" rows="2"></textarea>
            </div>

            <div class="space-y-2 mb-8">
                <p class="text-[10px] font-black text-gray-400 uppercase ml-2">Payment Method</p>
                <button id="pay-upi" onclick="setPayment('UPI')" class="w-full p-4 border-2 border-blue-100 rounded-2xl flex items-center gap-3 bg-blue-50/50">
                    <i class="fa-solid fa-mobile-screen-button text-blue-500"></i>
                    <span class="text-xs font-black">Pay via UPI</span>
                </button>
                <button id="pay-cod" onclick="setPayment('COD')" class="w-full p-4 border-2 border-gray-100 rounded-2xl flex items-center gap-3">
                    <i class="fa-solid fa-hand-holding-dollar text-green-600"></i>
                    <span class="text-xs font-black">Cash on Delivery</span>
                </button>
            </div>

            <button onclick="placeOrder()" class="w-full bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest active:scale-95 transition-transform">
                Confirm Order
            </button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAVu8iFrpYfMQvm5sMrT2ufxbpFHM9597A", projectId: "village-quick-commerce-e27f6" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        let allProducts = [], cart = {}, paymentMethod = "UPI";

        window.onload = () => {
            db.collection("products").onSnapshot(snap => {
                allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(allProducts);
            });
        };

        function renderItems(list) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = "";
            list.forEach(p => {
                const qty = cart[p.id]?.qty || 0;
                grid.innerHTML += `
                    <div class="bg-white border rounded-2xl p-3 shadow-sm flex flex-col justify-between">
                        <div class="aspect-square rounded-xl mb-3 overflow-hidden bg-gray-50 flex items-center justify-center">
                            <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-contain p-2">
                        </div>
                        <div>
                            <p class="font-black text-[11px] h-8 overflow-hidden mb-1">${p.name}</p>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-[12px] font-black">₹${p.price}</p>
                                ${qty === 0 ? 
                                `<button onclick="updateQty('${p.id}', 1)" class="border-2 border-green-600 text-green-700 px-4 py-1 rounded-lg text-[10px] font-black uppercase">Add</button>` :
                                `<div class="flex items-center gap-3 bg-green-600 text-white px-2 py-1 rounded-lg">
                                    <button onclick="updateQty('${p.id}', -1)" class="text-xs font-black">-</button>
                                    <span class="text-[10px] font-black">${qty}</span>
                                    <button onclick="updateQty('${p.id}', 1)" class="text-xs font-black">+</button>
                                </div>`}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0, img: p.image };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartUI();
            renderItems(allProducts);
        }

        function updateCartUI() {
            let sub = 0, count = 0;
            Object.values(cart).forEach(i => { sub += i.price * i.qty; count += i.qty; });
            document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total-bar').innerText = `₹${sub + 5}`;
            document.getElementById('cart-count').innerText = `${count} ITEMS`;
        }

        function getCurrentLocation() {
            document.getElementById('addr-display').innerText = "Locating...";
            navigator.geolocation.getCurrentPosition(pos => {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`;
                fetch(url).then(r => r.json()).then(data => {
                    const addr = data.display_name.split(',').slice(0, 3).join(',');
                    document.getElementById('addr-display').innerText = addr;
                    document.getElementById('manual-address').value = addr;
                    localStorage.setItem('last_address', addr);
                });
            }, () => alert("Please enable GPS for better accuracy"));
        }

        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('pay-upi').className = method === 'UPI' ? 'w-full p-4 border-2 border-blue-100 rounded-2xl flex items-center gap-3 bg-blue-50/50' : 'w-full p-4 border-2 border-gray-100 rounded-2xl flex items-center gap-3';
            document.getElementById('pay-cod').className = method === 'COD' ? 'w-full p-4 border-2 border-green-100 rounded-2xl flex items-center gap-3 bg-green-50/50' : 'w-full p-4 border-2 border-gray-100 rounded-2xl flex items-center gap-3';
        }

        function placeOrder() {
            const addr = document.getElementById('manual-address').value;
            if(!addr) return alert("Enter address");
            const oid = "ORD" + Math.floor(Math.random() * 10000000);
            const total = parseInt(document.getElementById('bill-grand').innerText.replace('₹',''));
            
            db.collection("orders").add({
                orderId: oid, items: cart, total: total, address: addr,
                method: paymentMethod, status: "Confirmed", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                if(paymentMethod === "UPI") {
                    window.location.href = `upi://pay?pa=g.ashok14@ibl&pn=VillageExpress&am=${total}&cu=INR&tn=${oid}`;
                } else {
                    alert("Order Placed via Cash on Delivery!");
                    location.reload();
                }
            });
        }

        function showCheckout() {
            const list = document.getElementById('checkout-items');
            list.innerHTML = "";
            let sub = 0;
            Object.values(cart).forEach(i => {
                sub += (i.price * i.qty);
                list.innerHTML += `<div class="flex justify-between items-center text-xs font-black">
                    <p>${i.name} (${i.qty})</p><p>₹${i.price * i.qty}</p>
                </div>`;
            });
            document.getElementById('bill-sub').innerText = `₹${sub}`;
            document.getElementById('bill-grand').innerText = `₹${sub + 5}`;
            document.getElementById('checkout-view').classList.remove('hidden');
        }
        function hideCheckout() { document.getElementById('checkout-view').classList.add('hidden'); }
        function filterItems(c) { renderItems(c === 'All' ? allProducts : allProducts.filter(p => p.category === c)); }
    </script>
</body>
</html>
